<style>
:root{
  /* Princeton-inspired palette: burnt orange + black/gray */
  --bg:#fafaf7;            /* warm off-white page background */
  --surface:#ffffff;       /* card/panel surfaces */
  --surface2:#f3f1ec;      /* secondary panels, inputs */
  --border:#e5e3dc;        /* subtle gray-warm borders */
  --border-strong:#cdc9bf; /* hover/focus borders */
  --accent:#E77500;        /* Princeton orange (PMS 158) */
  --accent-dark:#b85d00;   /* hover/pressed orange */
  --accent2:#5b3a1a;       /* deep brown-orange for secondary accents */
  --text:#1a1a1a;          /* near-black primary text */
  --text-dim:#404040;      /* secondary text */
  --text-muted:#737373;    /* hints, labels */
  --header-bg:#121212;     /* Princeton black header */
  --header-text:#fafaf7;
  --header-text-dim:#a3a3a3;
  --plot-bg:243,241,236;   /* RGB triplet for canvas plot bg (used in mwpi charge plot) */
  --plot-border:229,227,220;
  --plot-text:#737373;
  --plot-text-strong:#404040;
}
:root[data-theme="dark"]{
  --bg:#0f1115;
  --surface:#1a1d23;
  --surface2:#22262e;
  --border:#2e333c;
  --border-strong:#404652;
  --accent:#F08F1F;        /* slightly warmer orange for dark bg */
  --accent-dark:#d97a0a;
  --accent2:#c8946b;
  --text:#e8e6e0;
  --text-dim:#b8b4ab;
  --text-muted:#7a766c;
  --header-bg:#0a0c10;
  --header-text:#fafaf7;
  --header-text-dim:#a3a3a3;
  --plot-bg:34,38,46;
  --plot-border:46,51,60;
  --plot-text:#a3a3a3;
  --plot-text-strong:#cdc9bf;
}
:root.high-contrast{
  --border:#888;
  --border-strong:#555;
  --text-muted:#444;
  --text-dim:#111;
}
:root.high-contrast[data-theme="dark"]{
  --border:#aaa;
  --border-strong:#ccc;
  --text-muted:#cdc9bf;
  --text-dim:#fafaf7;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
body{background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;overflow:hidden;height:100vh;height:100dvh;-webkit-tap-highlight-color:rgba(231,117,0,.18);}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 15% 10%,rgba(231,117,0,.04) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 90% 90%,rgba(91,58,26,.03) 0%,transparent 60%);pointer-events:none;z-index:0;}
header{position:relative;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:0 1.4rem;border-bottom:1px solid #2a2a2a;background:var(--header-bg);height:52px;color:var(--header-text);}
.logo{display:flex;align-items:center;gap:.5rem;cursor:pointer;color:var(--header-text);}
.logo-word{font-family:"DM Serif Display",serif;font-size:1.3rem;letter-spacing:-.02em;color:var(--header-text);line-height:1;}
.logo-word span{color:var(--accent);}
.logo-tag{font-family:"DM Mono",monospace;font-size:.55rem;color:var(--header-text-dim);letter-spacing:.1em;text-transform:uppercase;padding:.2em .5em;border:1px solid #2a2a2a;border-radius:3px;margin-top:.15em;}
.tool-switcher-btn{display:flex;align-items:center;gap:.3rem;padding:.3em .6em;background:transparent;color:var(--header-text-dim);border:1px solid #2a2a2a;border-radius:5px;font-family:'DM Sans',sans-serif;font-size:.68rem;cursor:pointer;transition:all .15s;min-height:24px;font-weight:500;}
.tool-switcher-btn:hover{color:var(--accent);border-color:var(--accent);background:rgba(231,117,0,.1);}
.tool-switcher-btn.tool-active{color:var(--header-text);border-color:#3a3a3a;}
.tool-switcher-btn.tool-active:hover{color:var(--accent);border-color:var(--accent);}
.tool-switcher-chevron{font-size:.55rem;color:var(--header-text-dim);transition:transform .15s;}
.tool-switcher-btn:hover .tool-switcher-chevron{color:var(--accent);}
.header-right{display:flex;align-items:center;gap:.5rem;}
.header-right .vp-btn{background:transparent;color:var(--header-text-dim);border:1px solid #2a2a2a;border-radius:5px;font-family:'DM Sans',sans-serif;font-size:.78rem;padding:.3em .55em;min-height:24px;cursor:pointer;transition:all .15s;line-height:1;}
.header-right .vp-btn:hover{color:var(--accent);border-color:var(--accent);background:rgba(231,117,0,.1);}
.app{position:relative;z-index:auto;display:grid;grid-template-columns:240px 1fr;grid-template-rows:1fr;height:calc(100vh - 52px);height:calc(100dvh - 52px);}
.sidebar{grid-column:1;grid-row:1;border-right:1px solid var(--border);background:var(--surface);overflow-y:auto;padding:.8rem 0 1rem;}
.sidebar-search-wrap{position:relative;margin:.1rem .8rem .65rem;}
.sidebar-search-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.45rem .55rem .45rem 1.7rem;font-family:'DM Sans',sans-serif;font-size:.78rem;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s;}
.sidebar-search-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(231,117,0,.18);}
.sidebar-search-input::placeholder{color:var(--text-muted);}
.sidebar-search-icon{position:absolute;left:.55rem;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;}
.sidebar-search-input:focus + .sidebar-search-clear,.sidebar-search-input:not(:placeholder-shown) ~ .sidebar-search-clear{display:flex;}
.sidebar-search-clear{display:none;position:absolute;right:.4rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;line-height:1;padding:.15rem .35rem;border-radius:3px;align-items:center;justify-content:center;}
.sidebar-search-clear:hover{color:var(--accent);background:rgba(231,117,0,.1);}
.sidebar-label{font-family:"DM Mono",monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);padding:0 1rem;margin:.6rem 0 .35rem;}
.tool-btn{display:flex;align-items:center;gap:.65rem;width:100%;padding:.65rem 1rem;background:none;border:none;cursor:pointer;text-align:left;transition:background .13s;position:relative;font-family:inherit;min-height:48px;color:var(--text);}
.tool-btn:hover{background:rgba(231,117,0,.06);}
.tool-btn.active{background:rgba(231,117,0,.1);}
.tool-btn.active::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);}
.tool-icon{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.tool-name{font-size:.82rem;font-weight:500;color:var(--text);line-height:1.3;}
.tool-btn.active .tool-name{color:var(--accent-dark);}
.tool-sub{font-size:.65rem;color:var(--text-muted);margin-top:.1rem;}
/* CONTENT PANEL — formerly viewer-panel, now the full content area */
.content-panel{grid-column:2;grid-row:1;background:var(--surface);display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.content-panel .vp-header{padding:.95rem 1.4rem .7rem;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface2);}
.content-panel .vp-title{font-family:"DM Serif Display",serif;font-size:1.4rem;color:var(--text);margin-bottom:.25rem;line-height:1.2;}
.content-panel .vp-desc{font-size:.85rem;color:var(--text-muted);line-height:1.5;}
.content-panel .vp-controls{display:flex;gap:.45rem;padding:.65rem 1.4rem;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;align-items:center;background:var(--surface);}
.content-panel .vp-btn{font-family:"DM Sans",sans-serif;font-size:.72rem;padding:.5em .85em;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);cursor:pointer;transition:all .15s;min-height:32px;line-height:1.2;}
.content-panel .vp-btn:hover{border-color:var(--accent);color:var(--accent-dark);background:rgba(231,117,0,.06);}
.content-panel .vp-btn.active{background:rgba(231,117,0,.1);border-color:var(--accent);color:var(--accent-dark);font-weight:500;}
.content-panel input[type="number"]::-webkit-inner-spin-button,.content-panel input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
.content-panel input[type="number"]{-moz-appearance:textfield;}
.content-panel input[type="text"],.content-panel input[type="number"],.content-panel textarea,.content-panel select{background:var(--surface2)!important;border:1px solid var(--border)!important;color:var(--text)!important;}
.content-panel input[type="text"]:focus,.content-panel input[type="number"]:focus,.content-panel textarea:focus,.content-panel select:focus{border-color:var(--accent)!important;outline:none;}
/* Bump the inline padding on the existing tool subsections (which were designed for a 460px panel) so content reads at a comfortable line-length */
.content-panel > div[style*="padding:.4rem .8rem"],
.content-panel > div[style*="padding:.5rem .8rem"],
.content-panel > div[style*="padding:.6rem .8rem"],
.content-panel > div[style*="padding:.7rem .8rem"]{padding-left:1.4rem!important;padding-right:1.4rem!important;}
::-webkit-scrollbar{width:8px;height:8px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}::-webkit-scrollbar-thumb:hover{background:var(--border-strong);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp .28s ease both;}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:3px;}
.skip-nav{position:absolute;top:-100px;left:0;background:var(--accent);color:#fff;padding:.5rem 1rem;z-index:100;font-size:.85rem;font-weight:500;font-family:'DM Sans',sans-serif;border-radius:0 0 6px 0;transition:top .15s;}
.skip-nav:focus{top:0;}
/* Hamburger and overlay (mobile sidebar) */
.hamburger{display:none;background:none;border:none;color:var(--header-text-dim);cursor:pointer;font-size:1.2rem;padding:.4rem .6rem;border-radius:5px;margin-right:.4rem;min-width:40px;min-height:40px;}
.hamburger:hover,.hamburger:active{color:var(--accent);background:rgba(231,117,0,.12);}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:20;display:none;}
.sidebar-overlay.show{display:block;}
/* TABLET / SMALL LAPTOP — sidebar slides in, content fills full width */
@media(max-width:900px){
  .hamburger{display:block;}
  .app{grid-template-columns:1fr !important;height:calc(100vh - 52px) !important;height:calc(100dvh - 52px) !important;}
  .sidebar{position:fixed;left:-280px;top:52px;bottom:0;width:280px;z-index:21;transition:left .25s ease;background:var(--surface);border-right:1px solid var(--border);box-shadow:4px 0 24px rgba(0,0,0,.15);}
  .sidebar.sidebar-open{left:0;}
  .content-panel{grid-row:1;grid-column:1;border-left:none !important;}
  header{padding:0 1rem;}
  .logo-word{font-size:1.15rem;}
  .tool-switcher-btn{font-size:.62rem;padding:.3em .5em;}
  /* Larger tap targets on touch */
  .content-panel .vp-btn{min-height:36px;font-size:.72rem;padding:.5em .85em;}
  .tool-btn{padding:.75rem 1rem;min-height:54px;}
  .tool-icon{width:36px;height:36px;}
}
/* PHONE — single column, larger text, no horizontal overflow */
@media(max-width:600px){
  body{overflow:auto;height:auto;}
  header{height:48px;padding:0 .8rem;}
  .header-right{gap:.35rem;}
  .header-right .vp-btn{font-size:.7rem;padding:.4em .65em;min-height:32px;}
  .tool-switcher-btn{display:none;}
  .content-panel .vp-header{padding:.8rem 1rem .6rem;}
  .content-panel .vp-title{font-size:1.15rem;}
  .content-panel .vp-desc{font-size:.78rem;}
  .content-panel .vp-controls{padding:.55rem 1rem;overflow-x:auto;flex-wrap:nowrap !important;-webkit-overflow-scrolling:touch;}
  .content-panel .vp-controls::-webkit-scrollbar{height:0;}
  .content-panel .vp-btn{font-size:.7rem;}
  /* Tighten tool internal padding on phone */
  .content-panel > div[style*="padding:.4rem .8rem"],
  .content-panel > div[style*="padding:.5rem .8rem"],
  .content-panel > div[style*="padding:.6rem .8rem"],
  .content-panel > div[style*="padding:.7rem .8rem"]{padding-left:1rem!important;padding-right:1rem!important;}
}
/* SMALL PHONE — squeeze further */
@media(max-width:380px){
  header{padding:0 .6rem;}
  .logo-word{font-size:1rem;}
  .header-right{gap:.25rem;}
  .header-right .vp-btn{font-size:.65rem;padding:.35em .55em;}
  .content-panel .vp-header{padding:.65rem .85rem .5rem;}
  .content-panel .vp-title{font-size:1.05rem;}
  .content-panel > div[style*="padding"]{padding-left:.85rem!important;padding-right:.85rem!important;}
}
/* iOS Safari: prevent auto-zoom on input focus.
   iOS zooms in when an input/textarea/select has font-size < 16px on focus.
   We bump form-element font to 16px on touch devices only, so desktop UI is unchanged. */
@media(hover:none) and (pointer:coarse){
  input,textarea,select{font-size:16px !important;}
}
@media print{
  body{overflow:auto;height:auto;background:#fff;color:#000;}
  body::before,header,.sidebar,#mole-zone,#mole-bubble,#mole-idle-bubble,#mole-particles{display:none !important;}
  .app{display:block;height:auto;}
  .content-panel{padding:1rem;}
}
/* High contrast for accessibility */
@media(prefers-contrast:more){
  :root{--border:#999;--border-strong:#666;--text-muted:#555;--text-dim:#222;}
  .vp-btn{border-width:2px;}
}
/* SETTINGS MENU rows */
.settings-row{display:flex;align-items:center;gap:.7rem;width:100%;padding:.65rem .9rem;background:none;border:none;border-radius:6px;cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;color:var(--text);transition:background .12s;min-height:42px;}
/* TOOL SWITCHER dropdown rows */
.ts-row{display:flex;align-items:center;gap:.65rem;width:100%;padding:.55rem .65rem;background:none;border:none;border-radius:7px;cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;color:var(--text);transition:background .12s;min-height:48px;}
.ts-row:hover,.ts-row:focus-visible{background:rgba(231,117,0,.08);outline:none;}
.ts-row.active{background:rgba(231,117,0,.1);}
.ts-icon{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;}
.ts-label{flex:1;display:flex;flex-direction:column;gap:.05rem;min-width:0;}
.ts-name{font-size:.82rem;font-weight:500;color:var(--text);line-height:1.25;}
.ts-row.active .ts-name{color:var(--accent-dark);font-weight:600;}
.ts-sub{font-size:.66rem;color:var(--text-muted);line-height:1.3;}
.ts-active-dot{color:var(--accent);font-size:.55rem;flex-shrink:0;}
.settings-row:hover,.settings-row:focus-visible{background:rgba(231,117,0,.08);}
.settings-icon{font-size:.95rem;width:18px;display:inline-flex;justify-content:center;color:var(--text-dim);flex-shrink:0;}
.settings-label{flex:1;font-size:.82rem;font-weight:500;}
.settings-value{font-family:'DM Mono',monospace;font-size:.65rem;text-transform:lowercase;color:var(--text-muted);letter-spacing:.05em;}
/* SVG sizing inside content panel — make them responsive */
.content-panel svg{max-width:100%;height:auto;}
/* On phone, collapse 1fr 1fr grids inside tools to single column to prevent crowding */
@media(max-width:600px){
  .content-panel div[style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr !important;}
  .content-panel div[style*="grid-template-columns:1fr auto 1fr"]{grid-template-columns:1fr !important;}
  .content-panel div[style*="grid-template-columns:repeat(4"]{grid-template-columns:repeat(2,1fr) !important;}
}
</style>

    <div class="sidebar-label" id="sidebar-about-label" style="margin-top:1rem;">About</div>
    <button class="tool-btn" id="sidebar-home-btn" onclick="showHomePage()" style="font-family:inherit;">
      <div class="tool-icon" style="background:rgba(100,116,139,.12);">&#127968;</div>
      <div><div class="tool-name">Home / About</div><div class="tool-sub">Overview &amp; tips</div></div>
    </button>
    <div class="sidebar-empty" id="sidebar-empty" style="display:none;padding:1rem;font-size:.78rem;color:var(--text-muted);text-align:center;line-height:1.5;">No tools match.</div>
  </aside>
  <main class="content-panel" id="right-panel" tabindex="-1" aria-live="polite" aria-atomic="false"></main>
</div>
<script>
// ============================================================
// MoleBio Toolkit — IIFE wrapper
// Adapted from MoleBio (molebiolab.github.io/MoleBio) by Dylan S. Blohm
// ============================================================
(function(){
'use strict';

// ============================================================
// STORAGE ABSTRACTION — uses window.storage if available,
// falls back to localStorage for standalone deployment
// ============================================================
const _store=(function(){
  if(window.storage&&typeof window.storage.get==='function')return window.storage;
  return {
    async get(k){try{const v=localStorage.getItem(k);return v!==null?{key:k,value:v}:null;}catch(e){return null;}},
    async set(k,v){try{localStorage.setItem(k,typeof v==='string'?v:JSON.stringify(v));return{key:k,value:v};}catch(e){return null;}},
    async delete(k){try{localStorage.removeItem(k);return{key:k,deleted:true};}catch(e){return null;}}
  };
})();

// ============================================================
// TOOLS REGISTRY — single source of truth
// Each tool has: key, label, icon, color, sub, intro card data,
// the renderer function (set later), and a sidebar entry.
// ============================================================
const TOOLS={
  dogma:{
    label:'Central Dogma Flow',
    icon:'\u269B',
    iconBg:'rgba(231,117,0,.12)',
    color:'#E77500',
    sub:'DNA \u2192 RNA \u2192 protein',
    eyebrow:'Transcription & Translation',
    render:()=>renderDogmaPanel()
  },
  codon:{
    label:'Codon Table & Translator',
    icon:'\u{1F9EC}',
    iconBg:'rgba(122,74,28,.10)',
    color:'#7a4a1c',
    sub:'mRNA \u2192 protein',
    eyebrow:'Peptide Synthesis',
    render:()=>renderCodonPanel()
  },
  pipette:{
    label:'Micropipette Viewer',
    icon:'\u{1F50D}',
    iconBg:'rgba(91,58,26,.10)',
    color:'#5b3a1a',
    sub:'P2 / P20 / P200 / P1000',
    eyebrow:'Lab Techniques',
    render:()=>renderPipettePanel()
  },
  units:{
    label:'Units & Molarity',
    icon:'\u2697',
    iconBg:'rgba(168,88,15,.10)',
    color:'#a8580f',
    sub:'Mass, moles, dilutions, and conversions',
    eyebrow:'Lab Math',
    render:()=>renderUnitConvPanel()
  },
  tm:{
    label:'DNA Tm Calculator',
    icon:'\u{1F525}',
    iconBg:'rgba(154,58,58,.10)',
    color:'#9a3a3a',
    sub:'Primer melting temperature',
    eyebrow:'Primer Design',
    render:()=>renderTmPanel()
  },
  mwpi:{
    label:'Protein MW & pI',
    icon:'\u{1F9EA}',
    iconBg:'rgba(61,74,94,.10)',
    color:'#3d4a5e',
    sub:'Molecular weight, charge, extinction coefficient',
    eyebrow:'Protein Biochemistry',
    render:()=>renderMwPiPanel()
  }
};

const TOOL_KEYS=Object.keys(TOOLS);

function trackEvent(name,data){
  if(window.gtag) gtag('event', name, data||{});
}

// ============================================================
// NAVIGATION
// ============================================================
let currentTool=null;

function buildSidebar(){
  const list=document.getElementById('tool-list');
  if(!list)return;
  list.innerHTML=TOOL_KEYS.map(key=>{
    const t=TOOLS[key];
    return `<button class="tool-btn" data-tool-btn="${key}" data-search="${(t.label+' '+t.sub+' '+t.eyebrow).toLowerCase()}" onclick="selectTool('${key}')">
      <div class="tool-icon" style="background:${t.iconBg};">${t.icon}</div>
      <div><div class="tool-name">${t.label}</div><div class="tool-sub">${t.sub}</div></div>
    </button>`;
  }).join('');
}

function filterSidebar(query){
  const q=(query||'').trim().toLowerCase();
  const btns=document.querySelectorAll('#tool-list [data-tool-btn]');
  let matches=0;
  btns.forEach(b=>{
    const hay=b.getAttribute('data-search')||'';
    const show=!q||hay.indexOf(q)>=0;
    b.style.display=show?'':'none';
    if(show)matches++;
  });
  // Hide the About section + Home button when actively searching to keep focus on tools
  const aboutLabel=document.getElementById('sidebar-about-label');
  const homeBtn=document.getElementById('sidebar-home-btn');
  const empty=document.getElementById('sidebar-empty');
  if(q){
    if(aboutLabel)aboutLabel.style.display='none';
    if(homeBtn)homeBtn.style.display='none';
    if(empty)empty.style.display=matches===0?'':'none';
  } else {
    if(aboutLabel)aboutLabel.style.display='';
    if(homeBtn)homeBtn.style.display='';
    if(empty)empty.style.display='none';
  }
}

function selectTool(key){
  if(!TOOLS[key])return;
  currentTool=key;
  // Update active state
  document.querySelectorAll('[data-tool-btn]').forEach(b=>b.classList.remove('active'));
  const btn=document.querySelector(`[data-tool-btn="${key}"]`);
  if(btn)btn.classList.add('active');
  // Make sure layout is in default state (in case we were on home)
  const sb=document.getElementById('sidebar');
  const rp=document.getElementById('right-panel');
  if(sb)sb.style.display='';
  if(rp){rp.style.display='';rp.style.gridColumn='';rp.style.gridRow='';}
  document.querySelector('.app').style.gridTemplateColumns='';
  document.querySelector('.app').style.gridTemplateRows='';
  // Close mobile sidebar if open
  document.getElementById('sidebar')?.classList.remove('sidebar-open');
  document.querySelector('.sidebar-overlay')?.classList.remove('show');
  // Clear sidebar search filter
  const ss=document.getElementById('sidebar-search');
  if(ss&&ss.value){ss.value='';filterSidebar('');}
  // Update URL hash
  try{history.replaceState(null,null,'#'+key);}catch(e){}
  // Render
  TOOLS[key].render();
  updateToolSwitcherLabel();
  trackEvent('tool_open',{tool:key});
  if(typeof moleReact==='function')moleReact('tool');
}

function showHomePage(){
  currentTool=null;
  document.querySelectorAll('[data-tool-btn]').forEach(b=>b.classList.remove('active'));
  updateToolSwitcherLabel();
  try{history.replaceState(null,null,window.location.pathname);}catch(e){}
  // Close mobile sidebar
  document.getElementById('sidebar')?.classList.remove('sidebar-open');
  document.querySelector('.sidebar-overlay')?.classList.remove('show');
  // Clear sidebar search filter
  const ss=document.getElementById('sidebar-search');
  if(ss&&ss.value){ss.value='';filterSidebar('');}
  // Reset any inline grid overrides
  const appEl=document.querySelector('.app');
  if(appEl){appEl.style.gridTemplateColumns='';appEl.style.gridTemplateRows='';}
  // Render the home grid into the content panel
  const rp=document.getElementById('right-panel');
  if(!rp)return;
  rp.style.display='';
  rp.style.overflowY='auto';
  rp.innerHTML=`
    <div style="max-width:980px;margin:0 auto;padding:2rem 1.5rem 3rem;width:100%;" class="fade-in">
      <div style="text-align:center;margin-bottom:2rem;">
        <div style="font-family:'DM Serif Display',serif;font-size:2.4rem;color:var(--text);letter-spacing:-.02em;">Mole<span style="color:var(--accent);">Bio</span> Toolkit</div>
        <div style="font-family:'DM Mono',monospace;font-size:.65rem;color:var(--text-muted);margin-top:.3rem;letter-spacing:.1em;text-transform:uppercase;">Interactive Tools for Molecular Biology Lecture & Lab</div>
        <div style="font-size:.85rem;color:var(--text-dim);margin-top:.7rem;line-height:1.6;max-width:880px;margin-left:auto;margin-right:auto;">A focused set of interactive tools for molecular biology students. Use them during lecture or lab to set up a pipette, design a primer, calculate a dilution, or step through translation in real time.</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:.85rem;" id="home-grid">
        ${TOOL_KEYS.map(k=>{
          const t=TOOLS[k];
          return `<button onclick="selectTool('${k}')" style="background:${t.iconBg};border:1.5px solid ${t.color}55;border-radius:10px;padding:1.1rem 1.2rem;cursor:pointer;text-align:left;transition:all .18s;display:flex;flex-direction:column;gap:.45rem;font-family:'DM Sans',sans-serif;min-height:110px;" onmouseenter="this.style.borderColor='${t.color}';this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 20px ${t.color}25'" onmouseleave="this.style.borderColor='${t.color}55';this.style.transform='none';this.style.boxShadow='none'">
            <div style="display:flex;align-items:center;justify-content:space-between;">
              <span style="font-size:1.6rem;line-height:1;">${t.icon}</span>
              <span style="font-family:'DM Mono',monospace;font-size:.58rem;color:${t.color};text-transform:uppercase;letter-spacing:.08em;font-weight:600;">${t.eyebrow}</span>
            </div>
            <div style="font-size:1rem;font-weight:600;color:var(--text);line-height:1.25;">${t.label}</div>
            <div style="font-size:.76rem;color:var(--text-muted);line-height:1.5;">${t.sub}</div>
          </button>`;
        }).join('')}
      </div>
      <div style="margin-top:1.8rem;padding:1.1rem 1.3rem;background:var(--bg);border:1px solid var(--border);border-radius:10px;">
        <div style="font-family:'DM Mono',monospace;font-size:.6rem;color:var(--accent2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem;font-weight:600;">About</div>
        <div style="font-size:.82rem;color:var(--text-dim);line-height:1.65;margin-bottom:.7rem;text-align:center;">The MoleBio Toolkit is focused on the calculators and viewers most useful in real lecture and lab contexts. It is designed to work offline – on phones, tablets, and laptops – with no installation required.</div>
        <div style="font-size:.75rem;color:var(--text-muted);line-height:1.65;text-align:center;">Built by <a href="https://www.linkedin.com/in/dylan-blohm-416082150" style="color:var(--accent);text-decoration:none;" target="_blank" rel="noopener">Dylan S. Blohm</a>. Press <kbd style="background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:.1em .4em;font-size:.7rem;color:var(--accent);font-family:inherit;">/</kbd> to search the tools.</div>
      </div>
    </div>`;
  rp.scrollTop=0;
}

function showToolSwitcher(){
  document.getElementById('tool-switcher-modal')?.remove();
  const modal=document.createElement('div');
  modal.id='tool-switcher-modal';
  modal.style.cssText='position:fixed;inset:0;z-index:50;display:flex;align-items:flex-start;justify-content:flex-start;background:rgba(0,0,0,.25);';
  modal.onclick=e=>{if(e.target===modal)modal.remove();};
  // Position the dropdown beneath the trigger button — right-anchor since the button lives near the right edge
  const btn=document.getElementById('tool-switcher-btn');
  const rect=btn?btn.getBoundingClientRect():null;
  const vw=window.innerWidth;
  // Compute right offset (distance from right edge of viewport to right edge of button)
  const rightOffset=rect?Math.max(8,vw-rect.right):8;
  const topOffset=rect?rect.bottom+6:58;
  const tools=TOOL_KEYS.map(k=>{
    const t=TOOLS[k];
    const isActive=k===currentTool;
    return `<button class="ts-row${isActive?' active':''}" onclick="(function(){document.getElementById('tool-switcher-modal').remove();selectTool('${k}');})()">
      <span class="ts-icon" style="background:${t.iconBg};color:${t.color};">${t.icon}</span>
      <span class="ts-label">
        <span class="ts-name">${t.label}</span>
        <span class="ts-sub">${t.sub}</span>
      </span>
      ${isActive?'<span class="ts-active-dot" aria-label="Current tool">&#9679;</span>':''}
    </button>`;
  }).join('');
  modal.innerHTML=`<div style="position:absolute;right:${rightOffset}px;top:${topOffset}px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.5rem .35rem;width:280px;max-width:calc(100vw - 16px);box-shadow:0 12px 36px rgba(0,0,0,.22);max-height:calc(100dvh - 80px);overflow-y:auto;">
    <div style="font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);padding:.3rem .85rem .55rem;">Switch tool</div>
    ${tools}
    <div style="height:1px;background:var(--border);margin:.4rem .5rem;"></div>
    <button class="ts-row" onclick="(function(){document.getElementById('tool-switcher-modal').remove();showHomePage();})()">
      <span class="ts-icon" style="background:rgba(100,116,139,.12);color:var(--text-dim);">&#127968;</span>
      <span class="ts-label">
        <span class="ts-name">Home</span>
        <span class="ts-sub">Tile grid &amp; about</span>
      </span>
    </button>
  </div>`;
  document.body.appendChild(modal);
  modal.addEventListener('keydown',e=>{if(e.key==='Escape'){e.preventDefault();modal.remove();}});
  modal.querySelector('button.active')?.focus()||modal.querySelector('button')?.focus();
}

function updateToolSwitcherLabel(){
  const lbl=document.getElementById('tool-switcher-label');
  const btn=document.getElementById('tool-switcher-btn');
  if(!lbl||!btn)return;
  if(currentTool&&TOOLS[currentTool]){
    lbl.textContent=TOOLS[currentTool].label;
    btn.classList.add('tool-active');
  } else {
    lbl.textContent='Select a tool';
    btn.classList.remove('tool-active');
  }
}

function showSettingsMenu(){
  document.getElementById('settings-modal')?.remove();
  const modal=document.createElement('div');
  modal.id='settings-modal';
  modal.style.cssText='position:fixed;inset:0;z-index:50;display:flex;align-items:flex-start;justify-content:flex-end;background:rgba(0,0,0,.35);-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);';
  modal.onclick=e=>{if(e.target===modal)modal.remove();};
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  const isHC=document.documentElement.classList.contains('high-contrast');
  modal.innerHTML=`<div style="background:var(--surface);border:1px solid var(--border);border-left:1px solid var(--border);border-radius:0 0 0 12px;padding:.7rem .35rem 1rem;width:230px;max-width:92%;margin-top:52px;box-shadow:-8px 8px 32px rgba(0,0,0,.18);">
    <div style="font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);padding:.3rem .85rem .55rem;">Settings</div>
    <button class="settings-row" onclick="toggleDarkMode()">
      <span class="settings-icon">&#9728;</span>
      <span class="settings-label">${isDark?'Light mode':'Dark mode'}</span>
      <span class="settings-value">${isDark?'on':'off'}</span>
    </button>
    <button class="settings-row" onclick="toggleHighContrast()">
      <span class="settings-icon">&#9681;</span>
      <span class="settings-label">High contrast</span>
      <span class="settings-value">${isHC?'on':'off'}</span>
    </button>
    <button class="settings-row" onclick="sendMoleHome()">
      <span class="settings-icon" style="font-size:.95rem;">&#128062;</span>
      <span class="settings-label">${(typeof moleHidden!=='undefined'&&moleHidden)?'Bring mole back':'Send mole home'}</span>
      <span class="settings-value" style="color:var(--accent);">${(typeof moleHidden!=='undefined'&&moleHidden)?'hidden':'visible'}</span>
    </button>
    <div style="height:1px;background:var(--border);margin:.5rem .5rem;"></div>
    <button class="settings-row" onclick="document.getElementById('settings-modal').remove();showAboutModal()">
      <span class="settings-icon"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="8" cy="8" r="6.5"/><line x1="8" y1="7.2" x2="8" y2="11.5"/><circle cx="8" cy="4.8" r="0.5" fill="currentColor"/></svg></span>
      <span class="settings-label">About MoleBio Toolkit</span>
    </button>
  </div>`;
  document.body.appendChild(modal);
  modal.addEventListener('keydown',e=>{if(e.key==='Escape'){e.preventDefault();modal.remove();}});
  // close on click outside
  modal.querySelector('button')?.focus();
}

function showAboutModal(){
  document.getElementById('about-modal')?.remove();
  const modal=document.createElement('div');
  modal.id='about-modal';
  modal.style.cssText='position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.55);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);';
  modal.onclick=e=>{if(e.target===modal)modal.remove();};
  const shortcuts=[
    ['/',  'Search tools (mole bubble)'],
    ['?',  'Open settings menu'],
    ['1\u20136','Jump to a specific tool'],
    ['n',  'Next tool'],
    ['p',  'Previous tool'],
    ['h',  'Home page'],
    ['Esc','Close menus / modals'],
  ];
  modal.innerHTML=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.6rem 1.6rem 1.3rem;max-width:440px;width:92%;box-shadow:0 16px 48px rgba(0,0,0,.35);position:relative;max-height:85vh;overflow-y:auto;">
    <button onclick="document.getElementById('about-modal').remove()" style="position:absolute;top:10px;right:14px;background:none;border:none;color:var(--text-muted);font-size:1.4rem;cursor:pointer;line-height:1;" aria-label="Close">&times;</button>
    <div style="text-align:center;font-family:'DM Serif Display',serif;font-size:1.5rem;color:var(--text);margin-bottom:.7rem;">About Mole<span style="color:var(--accent);">Bio</span> Toolkit</div>
    <div style="text-align:center;font-size:.82rem;color:var(--text-dim);line-height:1.65;margin-bottom:1rem;">A focused set of interactive tools for molecular biology students. Use them during lecture or lab to set up a pipette, design a primer, calculate a dilution, or step through translation in real time.</div>
    <div style="text-align:center;font-size:.78rem;color:var(--text-dim);line-height:1.65;margin-bottom:1rem;">Built by <a href="https://www.linkedin.com/in/dylan-blohm-416082150" style="color:var(--accent);text-decoration:none;border-bottom:1px dotted var(--accent);" target="_blank" rel="noopener">Dylan S. Blohm</a>. Designed to work offline – on phones, tablets, and laptops – with no installation required.</div>
    <div style="font-family:'DM Mono',monospace;font-size:.6rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;margin:1rem 0 .55rem;">Keyboard shortcuts</div>
    ${shortcuts.map(([k,d])=>`<div style="display:flex;align-items:center;gap:.7rem;padding:.35rem 0;border-bottom:1px solid var(--border);">
      <kbd style="font-family:'DM Mono',monospace;font-size:.72rem;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:.18rem .45rem;color:var(--accent);min-width:36px;text-align:center;">${k}</kbd>
      <span style="font-size:.78rem;color:var(--text-dim);">${d}</span>
    </div>`).join('')}
    <div style="text-align:center;font-size:.65rem;color:var(--text-muted);margin-top:1rem;">Shortcuts disable while typing in input fields.</div>
  </div>`;
  document.body.appendChild(modal);
  modal.querySelector('button')?.focus();
  modal.addEventListener('keydown',e=>{if(e.key==='Escape'){e.preventDefault();modal.remove();}});
}

function toggleDarkMode(){
  const cur=document.documentElement.getAttribute('data-theme');
  const next=cur==='dark'?null:'dark';
  if(next)document.documentElement.setAttribute('data-theme',next);
  else document.documentElement.removeAttribute('data-theme');
  try{localStorage.setItem('mbtk-theme',next||'light');}catch(e){}
  // Update meta theme-color so iOS/Android URL bars match
  const meta=document.querySelector('meta[name="theme-color"]');
  if(meta)meta.setAttribute('content',next==='dark'?'#0a0c10':'#121212');
  // Re-render any tool that uses canvas/SVG so theme is picked up
  if(currentTool&&TOOLS[currentTool])TOOLS[currentTool].render();
  // Refresh settings menu
  document.getElementById('settings-modal')?.remove();
  showSettingsMenu();
}

function toggleHighContrast(){
  const root=document.documentElement;
  root.classList.toggle('high-contrast');
  try{localStorage.setItem('mbtk-hc',root.classList.contains('high-contrast')?'1':'0');}catch(e){}
  document.getElementById('settings-modal')?.remove();
  showSettingsMenu();
}

function sendMoleHome(){
  // Toggle the mole's hidden state — sends it home if visible, brings it back if not
  if(typeof toggleMoleHidden==='function')toggleMoleHidden();
  // Re-render the settings menu so the row label and value reflect the new state
  document.getElementById('settings-modal')?.remove();
  showSettingsMenu();
}

function loadThemePreferences(){
  try{
    if(localStorage.getItem('mbtk-theme')==='dark')document.documentElement.setAttribute('data-theme','dark');
    if(localStorage.getItem('mbtk-hc')==='1')document.documentElement.classList.add('high-contrast');
  }catch(e){}
}


// ============================================================
// MOBILE HAMBURGER + OVERLAY
// ============================================================
function initMobileUI(){
  const header=document.querySelector('header');
  if(!header)return;
  const logo=header.querySelector('.logo');
  const hamburger=document.createElement('button');
  hamburger.className='hamburger';
  hamburger.setAttribute('aria-label','Toggle navigation');
  hamburger.innerHTML='&#9776;';
  hamburger.onclick=()=>{
    const sb=document.getElementById('sidebar');
    const overlay=document.querySelector('.sidebar-overlay');
    const wasClosed=!sb?.classList.contains('sidebar-open');
    sb?.classList.toggle('sidebar-open');
    overlay?.classList.toggle('show');
    // Focus search when opening
    if(wasClosed)setTimeout(()=>document.getElementById('sidebar-search')?.focus(),250);
  };
  header.insertBefore(hamburger,logo);
  const overlay=document.createElement('div');
  overlay.className='sidebar-overlay';
  overlay.onclick=()=>{
    document.getElementById('sidebar')?.classList.remove('sidebar-open');
    overlay.classList.remove('show');
  };
  document.body.appendChild(overlay);
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
function initKeyboardShortcuts(){
  document.addEventListener('keydown',e=>{
    const tag=document.activeElement?.tagName;
    if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return;
    if(e.ctrlKey||e.metaKey||e.altKey)return;
    if(e.key==='/'){e.preventDefault();toggleMoleSearch();}
    else if(e.key==='?'){e.preventDefault();showSettingsMenu();}
    else if(e.key==='h'){e.preventDefault();showHomePage();}
    else if(e.key==='n'){
      e.preventDefault();
      const idx=currentTool?TOOL_KEYS.indexOf(currentTool):-1;
      if(idx<TOOL_KEYS.length-1)selectTool(TOOL_KEYS[idx+1]);
    }
    else if(e.key==='p'){
      e.preventDefault();
      const idx=currentTool?TOOL_KEYS.indexOf(currentTool):0;
      if(idx>0)selectTool(TOOL_KEYS[idx-1]);
    }
    else if(/^[1-6]$/.test(e.key)){
      const idx=parseInt(e.key,10)-1;
      if(idx<TOOL_KEYS.length){e.preventDefault();selectTool(TOOL_KEYS[idx]);}
    }
    else if(e.key==='Escape'){
      document.getElementById('help-modal')?.remove();
      document.getElementById('settings-modal')?.remove();
      document.getElementById('about-modal')?.remove();
      document.getElementById('tool-switcher-modal')?.remove();
      if(moleSearchOpen)toggleMoleSearch();
      document.getElementById('sidebar')?.classList.remove('sidebar-open');
      document.querySelector('.sidebar-overlay')?.classList.remove('show');
    }
  });
}

function buildCodonTableGrid(){
  const svg=document.getElementById('codon-wheel-svg');if(!svg)return;
  svg.innerHTML='';
  const size=380, cx=size/2, cy=size/2;
  // Scale up the rendered output (viewBox stays at 380, but element renders at 540px) — bigger and more readable
  const renderSize=540;
  svg.setAttribute('viewBox',`0 0 ${size} ${size}`);
  svg.setAttribute('width',renderSize);svg.setAttribute('height',renderSize);
  const NS2='http://www.w3.org/2000/svg';
  function el(tag,attrs,parent){const n=document.createElementNS(NS2,tag);Object.entries(attrs).forEach(([k,v])=>n.setAttribute(k,v));(parent||svg).appendChild(n);return n;}

  const bases=['U','C','A','G'];
  // Base colors for the rings (matching reference image style)
  const baseCol={U:'#f0c674',C:'#81c784',A:'#64b5f6',G:'#e57373'};
  const baseColBg={U:'#f9e4a0',C:'#a8dda8',A:'#90caf9',G:'#ef9a9a'};

  // Drop-shadow glow filter for highlighted slices
  const defs=el('defs',{});
  const filt=el('filter',{id:'cw-glow',x:'-25%',y:'-25%',width:'150%',height:'150%'},defs);
  el('feGaussianBlur',{in:'SourceAlpha',stdDeviation:'2.5',result:'blur'},filt);
  el('feFlood',{'flood-color':'#E77500','flood-opacity':'0.85',result:'flood'},filt);
  el('feComposite',{in:'flood',in2:'blur',operator:'in',result:'shadow'},filt);
  const merge=el('feMerge',{},filt);
  el('feMergeNode',{in:'shadow'},merge);
  el('feMergeNode',{in:'SourceGraphic'},merge);

  // Ring radii: inner(1st base) → middle(2nd) → outer(3rd) → amino acid label ring
  const r0=28, r1=62, r2=104, r3=142, r4=174;

  // ── Center label: 5' ──
  el('circle',{cx,cy,r:r0-2,fill:'rgba(139,92,246,.15)',stroke:'#8b5cf6','stroke-width':1.5});
  const ct=el('text',{x:cx,y:cy+5,'text-anchor':'middle','font-size':14,fill:'#a78bfa','font-family':'DM Mono,monospace','font-weight':'700'});ct.textContent="5'";

  // Helper: arc path for a wedge (annular sector)
  function arcPath(cx,cy,rInner,rOuter,startAngle,endAngle){
    const s1=startAngle*Math.PI/180, e1=endAngle*Math.PI/180;
    const x1=cx+rOuter*Math.cos(s1), y1=cy+rOuter*Math.sin(s1);
    const x2=cx+rOuter*Math.cos(e1), y2=cy+rOuter*Math.sin(e1);
    const x3=cx+rInner*Math.cos(e1), y3=cy+rInner*Math.sin(e1);
    const x4=cx+rInner*Math.cos(s1), y4=cy+rInner*Math.sin(s1);
    const large=(endAngle-startAngle)>180?1:0;
    return `M${x1},${y1} A${rOuter},${rOuter} 0 ${large},1 ${x2},${y2} L${x3},${y3} A${rInner},${rInner} 0 ${large},0 ${x4},${y4} Z`;
  }

  // Helper: text along arc (place at midpoint of arc, rotated)
  function arcText(cx,cy,r,startAngle,endAngle,text,fontSize,fill,fw){
    const midA=((startAngle+endAngle)/2)*Math.PI/180;
    const tx=cx+r*Math.cos(midA), ty=cy+r*Math.sin(midA);
    let rot=(startAngle+endAngle)/2+90;
    // Flip text if it would be upside down
    if(rot>180&&rot<360)rot-=180;
    if(rot>180)rot-=180;
    const t=el('text',{x:tx,y:ty,'text-anchor':'middle','dominant-baseline':'central','font-size':fontSize||10,fill:fill||'#1a1a2e','font-family':'DM Mono,monospace','font-weight':fw||'700',transform:`rotate(${rot},${tx},${ty})`});
    t.textContent=text;
    return t;
  }

  // ── Ring 1: First base (inner, 4 sectors of 90°) ──
  // Layout: starting from top (-90°), going clockwise: U, C, A, G
  const startOffset=-90;
  bases.forEach((b,i)=>{
    const a0=startOffset+i*90, a1=a0+90;
    const p=el('path',{d:arcPath(cx,cy,r0,r1,a0,a1),fill:baseColBg[b],stroke:'#1a1a2e','stroke-width':1.2,opacity:1});
    p.id='cw1-'+b;
    p.setAttribute('data-base',b);
    const t=arcText(cx,cy,(r0+r1)/2,a0,a1,b,18,'#1a1a2e','800');
    t.id='cw1t-'+b;
    t.setAttribute('data-default-size','18');
    t.setAttribute('data-default-weight','800');
  });

  // ── Ring 2: Second base (16 sectors of 22.5°) ──
  bases.forEach((b1,i)=>{
    bases.forEach((b2,j)=>{
      const a0=startOffset+i*90+j*22.5, a1=a0+22.5;
      const p=el('path',{d:arcPath(cx,cy,r1,r2,a0,a1),fill:baseColBg[b2],stroke:'#1a1a2e','stroke-width':0.8,opacity:1});
      p.id='cw2-'+b1+b2;
      p.setAttribute('data-base',b2);
      const t=arcText(cx,cy,(r1+r2)/2,a0,a1,b2,11,'#1a1a2e','700');
      t.id='cw2t-'+b1+b2;
      t.setAttribute('data-default-size','11');
      t.setAttribute('data-default-weight','700');
    });
  });

  // ── Ring 3: Third base (64 sectors of 5.625°) — each is one codon ──
  bases.forEach((b1,i)=>{
    bases.forEach((b2,j)=>{
      bases.forEach((b3,k)=>{
        const idx=i*16+j*4+k;
        const a0=startOffset+idx*5.625, a1=a0+5.625;
        const codon=b1+b2+b3;
        const path=el('path',{d:arcPath(cx,cy,r2,r3,a0,a1),fill:baseColBg[b3],stroke:'#1a1a2e','stroke-width':0.5,opacity:1,cursor:'pointer'});
        path.id='cw-'+codon;
        path.setAttribute('data-base',b3);
        path.onclick=()=>highlightCodon(codon);
        // Third base letter
        const t=arcText(cx,cy,(r2+r3)/2,a0,a1,b3,7,'#1a1a2e','600');
        t.id='cwt-'+codon;
        t.setAttribute('data-default-size','7');
        t.setAttribute('data-default-weight','600');
      });
    });
  });

  // ── Ring 4: Amino acid labels (outermost) ──
  // Group consecutive codons that map to the same AA
  const aaGroups=[];
  let cur=null;
  for(let i=0;i<64;i++){
    const b1i=Math.floor(i/16),b2i=Math.floor((i%16)/4),b3i=i%4;
    const codon=bases[b1i]+bases[b2i]+bases[b3i];
    const aa=CODON_TABLE[codon];
    const c1=AA3TO1[aa];
    if(!cur||cur.aa!==aa||cur.b1i!==b1i||(cur.b2i!==b2i)){
      cur={aa,c1,start:i,count:1,b1i,b2i};aaGroups.push(cur);
    } else {
      cur.count++;
    }
  }

  const aaWedgeColors={
    Phe:'#e8d44d',Leu:'#a8d8a8',Ile:'#a8d8a8',Met:'#a8d8a8',Val:'#a8d8a8',
    Ser:'#f9c784',Pro:'#f9c784',Thr:'#f9c784',Ala:'#f9c784',
    Tyr:'#aed6f1',His:'#aed6f1',Gln:'#aed6f1',Asn:'#aed6f1',Lys:'#aed6f1',Asp:'#f1a9a9',Glu:'#f1a9a9',
    Cys:'#e8d44d',Trp:'#e8d44d',Arg:'#c5b3e6',Gly:'#e8d44d',
    Stop:'#666'
  };

  aaGroups.forEach(g=>{
    const a0=startOffset+g.start*5.625, a1=a0+g.count*5.625;
    const col=aaWedgeColors[g.aa]||'#ccc';
    // Compute every codon belonging to this wedge so we can highlight by codon match
    const wedgeCodons=[];
    for(let k=0;k<g.count;k++){
      const idx=g.start+k;
      const b1i=Math.floor(idx/16),b2i=Math.floor((idx%16)/4),b3i=idx%4;
      wedgeCodons.push(bases[b1i]+bases[b2i]+bases[b3i]);
    }
    const wedge=el('path',{d:arcPath(cx,cy,r3+1,r4,a0,a1),fill:col,stroke:'#1a1a2e','stroke-width':0.8,opacity:1,cursor:'pointer'});
    wedge.setAttribute('data-aa-wedge','1');
    wedge.setAttribute('data-codons',wedgeCodons.join(','));
    wedge.setAttribute('data-aa',g.aa);
    // AA label
    if(g.count>=2||g.aa==='Trp'||g.aa==='Met'){
      const label=g.aa==='Stop'?'■':g.c1;
      const sz=g.count>=3?10:8;
      const t=arcText(cx,cy,(r3+r4)/2+2,a0,a1,label,sz,'#1a1a2e','800');
      t.setAttribute('data-aa-label',wedgeCodons.join(','));
      t.setAttribute('data-default-size',sz);
      t.setAttribute('data-default-weight','800');
    }
  });

  // ── Outer AA name labels (outside the wheel) ──
  // Place full names for multi-codon AAs
  const labelR=r4+14;
  aaGroups.forEach(g=>{
    if(g.count<2&&g.aa!=='Trp'&&g.aa!=='Met')return;
    const midIdx=g.start+g.count/2;
    const midA=(startOffset+midIdx*5.625)*Math.PI/180;
    const lx=cx+labelR*Math.cos(midA), ly=cy+labelR*Math.sin(midA);
    let rot=(startOffset+midIdx*5.625)+90;
    if(rot>180&&rot<360)rot-=180;if(rot>180)rot-=180;
    const name=g.aa==='Stop'?'Stop':`${g.aa} (${g.c1})`;
    const labelColor=document.documentElement.getAttribute('data-theme')==='dark'?'#cdc9bf':'#404040';
    const t=el('text',{x:lx,y:ly,'text-anchor':'middle','dominant-baseline':'central','font-size':7,fill:labelColor,'font-family':'DM Sans,sans-serif','font-weight':'600',transform:`rotate(${rot},${lx},${ly})`});
    t.textContent=name;
  });

  // ── 3' labels at cardinal points ──
  [[cx,8],[cx,size-8]].forEach(([x,y])=>{
    const t=el('text',{x,y,'text-anchor':'middle','dominant-baseline':'central','font-size':10,fill:'#ef4444','font-family':'DM Mono,monospace','font-weight':'700'});t.textContent="3'";
  });

  // Ring divider circles (cleaner look)
  [r0,r1,r2,r3,r4].forEach(r=>{
    el('circle',{cx,cy,r,fill:'none',stroke:'#1a1a2e','stroke-width':r===r3?1.5:0.8});
  });
}

function highlightCodon(codon){
  // Color tables — keep in sync with renderCodonWheel
  const baseCol={U:'#f0c674',C:'#81c784',A:'#64b5f6',G:'#e57373'};
  const baseColBg={U:'#f9e4a0',C:'#a8dda8',A:'#90caf9',G:'#ef9a9a'};
  // Reset all paths — full opacity, default stroke, pastel fill
  document.querySelectorAll('[id^="cw-"],[id^="cw1-"],[id^="cw2-"]').forEach(el=>{
    el.removeAttribute('filter');
    el.setAttribute('stroke-width',el.id.startsWith('cw1-')?'1.2':el.id.startsWith('cw2-')?'0.8':'0.5');
    el.setAttribute('stroke','#1a1a2e');
    el.style.opacity='1';
    const baseLetter=el.getAttribute('data-base');
    if(baseLetter&&baseColBg[baseLetter])el.setAttribute('fill',baseColBg[baseLetter]);
  });
  // Reset AA wedges
  document.querySelectorAll('[data-aa-wedge]').forEach(el=>{
    el.removeAttribute('filter');
    el.setAttribute('stroke','#1a1a2e');
    el.setAttribute('stroke-width','0.8');
    el.style.opacity='1';
  });
  // Reset all text labels to their default size and weight
  document.querySelectorAll('[data-default-size]').forEach(t=>{
    t.setAttribute('font-size',t.getAttribute('data-default-size'));
    t.setAttribute('font-weight',t.getAttribute('data-default-weight'));
    t.setAttribute('fill','#1a1a2e');
  });
  if(!codon||codon.length!==3)return;
  const b1=codon[0],b2=codon[1],b3=codon[2];
  // Helper: bolden a text element by ~25% size + max weight + accent color
  const boldenText=(textEl)=>{
    if(!textEl)return;
    const baseSize=parseFloat(textEl.getAttribute('data-default-size'))||10;
    textEl.setAttribute('font-size',(baseSize*1.25).toFixed(1));
    textEl.setAttribute('font-weight','900');
    textEl.setAttribute('fill','#000000');
  };
  // Highlighted slices: saturated fill, thick orange stroke, soft glow
  // Ring 1
  const r1el=document.getElementById('cw1-'+b1);
  if(r1el){
    r1el.setAttribute('fill',baseCol[b1]);
    r1el.setAttribute('stroke','#E77500');
    r1el.setAttribute('stroke-width','4');
    r1el.setAttribute('filter','url(#cw-glow)');
  }
  boldenText(document.getElementById('cw1t-'+b1));
  // Ring 2
  const r2el=document.getElementById('cw2-'+b1+b2);
  if(r2el){
    r2el.setAttribute('fill',baseCol[b2]);
    r2el.setAttribute('stroke','#E77500');
    r2el.setAttribute('stroke-width','3.5');
    r2el.setAttribute('filter','url(#cw-glow)');
  }
  boldenText(document.getElementById('cw2t-'+b1+b2));
  // Ring 3 (specific codon)
  const r3el=document.getElementById('cw-'+codon);
  if(r3el){
    r3el.setAttribute('fill',baseCol[b3]);
    r3el.setAttribute('stroke','#E77500');
    r3el.setAttribute('stroke-width','3');
    r3el.setAttribute('filter','url(#cw-glow)');
  }
  boldenText(document.getElementById('cwt-'+codon));
  // Ring 4 (AA wedge)
  document.querySelectorAll('[data-aa-wedge]').forEach(el=>{
    const codons=(el.getAttribute('data-codons')||'').split(',');
    if(codons.indexOf(codon)>=0){
      el.setAttribute('stroke','#E77500');
      el.setAttribute('stroke-width','3');
      el.setAttribute('filter','url(#cw-glow)');
    }
  });
  // Bolden the AA wedge label that contains this codon
  document.querySelectorAll('[data-aa-label]').forEach(t=>{
    const codons=(t.getAttribute('data-aa-label')||'').split(',');
    if(codons.indexOf(codon)>=0)boldenText(t);
  });
  const aa=CODON_TABLE[codon]||'?';
  const info=document.getElementById('codon-info');
  if(info)info.innerHTML=`<b style="color:var(--accent)">${codon}</b> → <b style="color:${AA_COLORS[AA3TO1[aa]]||'#94a3b8'}">${aa}</b> (${AA3TO1[aa]}) ${aa==='Stop'?'— Release factor binds, translation terminates':'— '+getAADesc(aa)}`;
}

function getAADesc(aa){
  const descs={Phe:'Aromatic, hydrophobic',Leu:'Aliphatic, hydrophobic',Ile:'Branched-chain, hydrophobic',Met:'Start codon / sulfur-containing',Val:'Branched-chain, hydrophobic',Ser:'Polar, hydroxyl',Pro:'Cyclic imino acid, helix breaker',Thr:'Polar, hydroxyl, branched',Ala:'Small, hydrophobic, helix-favoring',Tyr:'Aromatic, polar hydroxyl',His:'Imidazole, pKa ~6.0, acid-base catalysis',Gln:'Polar amide',Asn:'Polar amide',Lys:'Positive charge at pH 7',Asp:'Negative charge at pH 7',Glu:'Negative charge at pH 7',Cys:'Thiol, disulfide bonds',Trp:'Largest AA, aromatic, only 1 codon',Arg:'Positive charge, guanidinium',Gly:'Smallest AA, side chain is H, very flexible'};
  return descs[aa]||'';
}

function updateCodonDisplay(){
  const mrnaEl=document.getElementById('codon-mrna-display');
  const protEl=document.getElementById('codon-protein-display');
  const counterEl=document.getElementById('codon-counter');
  const infoEl=document.getElementById('codon-info');
  if(!mrnaEl||!protEl)return;

  const seq=codonSeq.replace(/[^AUGC]/g,'');
  // Find first AUG
  let startIdx=-1;
  for(let i=0;i<=seq.length-3;i++){if(seq.substring(i,i+3)==='AUG'){startIdx=i;break;}}

  // Build codon-colored mRNA display
  let html='';
  const codons=[];
  if(startIdx>=0){
    // 5' UTR
    if(startIdx>0)html+=`<span style="color:#475569">${seq.substring(0,startIdx)}</span>`;
    // Reading frame codons
    for(let i=startIdx;i<=seq.length-3;i+=3){
      const codon=seq.substring(i,i+3);
      const aa=CODON_TABLE[codon]||'?';
      const c1=AA3TO1[aa]||'?';
      const col=AA_COLORS[c1]||'#94a3b8';
      const idx=codons.length;
      const isCurrent=(idx===codonPos);
      const isPast=(idx<codonPos);
      const isFuture=(idx>codonPos);
      codons.push({codon,aa,c1,col});
      if(isCurrent){
        html+=`<span style="background:${col}33;color:${col};border-radius:3px;padding:0 2px;font-weight:700;outline:2px solid ${col};outline-offset:1px">${codon}</span>`;
      } else if(isPast&&codonPos>=0){
        html+=`<span style="color:${col};font-weight:600">${codon}</span>`;
      } else {
        html+=`<span style="color:#64748b">${codon}</span>`;
      }
      html+=' ';
      if(aa==='Stop')break;
    }
  } else {
    html=`<span style="color:#475569">${seq}</span>`;
    if(seq.length>0)html+=`<br><span style="color:#f87171;font-size:.65rem">No AUG start codon found</span>`;
  }
  mrnaEl.innerHTML=html;

  // Build protein display
  protEl.innerHTML='';
  const translatedAAs=[];
  const limit=codonPos>=0?codonPos+1:0;
  codons.forEach((c,i)=>{
    if(c.aa==='Stop'&&i<limit){
      const el=document.createElement('span');
      el.style.cssText=`font-family:'DM Mono',monospace;font-size:.7rem;color:#f87171;padding:2px 4px;background:rgba(248,113,113,.1);border-radius:3px;border:1px solid rgba(248,113,113,.3);`;
      el.textContent='STOP';
      protEl.appendChild(el);
      return;
    }
    if(c.aa==='Stop')return;
    if(i<limit){
      translatedAAs.push(c);
      const el=document.createElement('span');
      el.style.cssText=`display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:${c.col}22;border:1.5px solid ${c.col};font-family:'DM Mono',monospace;font-size:.65rem;color:${c.col};font-weight:700;`;
      el.textContent=c.c1;
      el.title=`${c.aa} (${c.c1}) — codon: ${c.codon}`;
      protEl.appendChild(el);
    }
  });

  // Counter
  if(counterEl){
    const totalCodons=codons.filter(c=>c.aa!=='Stop').length;
    if(codonPos>=0){
      counterEl.textContent=`Codon ${codonPos+1}/${codons.length} · ${translatedAAs.length} AA`;
    } else {
      counterEl.textContent=codons.length>0?`${codons.length} codons · ready`:'Enter sequence';
    }
  }

  // Info
  if(infoEl&&translatedAAs.length>0){
    const seq1=translatedAAs.map(c=>c.c1).join('');
    const seq3=translatedAAs.map(c=>c.aa).join('-');
    const mw=translatedAAs.reduce((s,c)=>s+(AA_MW[c.c1]||110),18.02);// +H2O for termini
    // Rough charge at pH 7: side chains + termini (N-term ≈ +0.5, C-term ≈ −1 at pH 7)
    let charge=translatedAAs.reduce((s,c)=>{if(c.c1==='K'||c.c1==='R')return s+1;if(c.c1==='H')return s+0.1;if(c.c1==='D'||c.c1==='E')return s-1;return s;},0);
    charge+=0.5;// N-terminus
    charge-=1;// C-terminus
    infoEl.innerHTML=`<b>1-letter:</b> ${seq1}<br><b>3-letter:</b> ${seq3}<br><b>MW:</b> ~${mw.toFixed(0)} Da · <b>Charge (pH 7):</b> ${charge>=0?'+':''}${charge.toFixed(1)} · <b>Length:</b> ${translatedAAs.length} aa`;
  } else if(infoEl){
    infoEl.innerHTML='Click <b>Step</b> or <b>Play</b> to translate codon-by-codon, or <b>Translate All</b> for the full protein.';
  }
}

function codonStep(){
  const seq=codonSeq.replace(/[^AUGC]/g,'');
  let startIdx=-1;
  for(let i=0;i<=seq.length-3;i++){if(seq.substring(i,i+3)==='AUG'){startIdx=i;break;}}
  if(startIdx<0)return;
  const maxCodons=Math.floor((seq.length-startIdx)/3);
  if(codonPos<maxCodons-1){
    codonPos++;
    // Check if we hit a stop codon
    const codon=seq.substring(startIdx+codonPos*3,startIdx+codonPos*3+3);
    if(CODON_TABLE[codon]==='Stop'){
      // Stay at stop, don't advance further
      updateCodonDisplay();
      highlightCodon(codon);
      return;
    }
    updateCodonDisplay();
    highlightCodon(codon);
  }
}

function translateAll(){
  const seq=codonSeq.replace(/[^AUGC]/g,'');
  let startIdx=-1;
  for(let i=0;i<=seq.length-3;i++){if(seq.substring(i,i+3)==='AUG'){startIdx=i;break;}}
  if(startIdx<0)return;
  const maxCodons=Math.floor((seq.length-startIdx)/3);
  // Set codonPos to last codon or stop
  for(let i=0;i<maxCodons;i++){
    const codon=seq.substring(startIdx+i*3,startIdx+i*3+3);
    codonPos=i;
    if(CODON_TABLE[codon]==='Stop')break;
  }
  updateCodonDisplay();
}

function toggleCodonPlay(){
  if(codonPlaying){
    clearInterval(codonTimer);codonPlaying=false;
    const b=document.getElementById('codon-play-btn');if(b)b.textContent='▶ Play';
  } else {
    codonPlaying=true;
    const b=document.getElementById('codon-play-btn');if(b)b.textContent='⏸ Pause';
    // Respect prefers-reduced-motion: slow auto-advance to 1.5 s/codon (vs 600 ms default)
    const playInterval=(typeof prefersReducedMotion!=='undefined'&&prefersReducedMotion)?1500:600;
    codonTimer=setInterval(()=>{
      const seq=codonSeq.replace(/[^AUGC]/g,'');
      let startIdx=-1;
      for(let i=0;i<=seq.length-3;i++){if(seq.substring(i,i+3)==='AUG'){startIdx=i;break;}}
      if(startIdx<0){clearInterval(codonTimer);codonPlaying=false;return;}
      const maxCodons=Math.floor((seq.length-startIdx)/3);
      if(codonPos<maxCodons-1){
        codonPos++;
        const codon=seq.substring(startIdx+codonPos*3,startIdx+codonPos*3+3);
        updateCodonDisplay();
        highlightCodon(codon);
        if(CODON_TABLE[codon]==='Stop'){
          clearInterval(codonTimer);codonPlaying=false;
          const b2=document.getElementById('codon-play-btn');if(b2)b2.textContent='▶ Play';
        }
      } else {
        clearInterval(codonTimer);codonPlaying=false;
        const b2=document.getElementById('codon-play-btn');if(b2)b2.textContent='▶ Play';
      }
    },playInterval);
  }
}

// ============================================================
// CENTRAL DOGMA FLOW — DNA → mRNA → Protein with live mutation tracking
// ============================================================
const DOGMA_CODON=CODON_TABLE;// reuse existing codon table
const DOGMA_3TO1=AA3TO1;
const DOGMA_COLORS={A:'#3b82f6',T:'#10b981',G:'#8b5cf6',C:'#f59e0b',U:'#ef4444'};
const DOGMA_AA_COL=AA_COLORS;

let dogmaSeq='ATGGTGCACCTGACTCCTGAGGAGAAGTCTGCCGTTACTGCCCTGTGGGGCAAGGTG';// HBB start
let dogmaOrigSeq='';
let dogmaMutPos=-1;
let dogmaInputMode='dna';// 'dna' or 'rna' — affects what user is typing

function renderDogmaPanel(){
  dogmaOrigSeq=dogmaSeq;
  dogmaMutPos=-1;
  const p=document.getElementById('right-panel');
  p.innerHTML=`
<div class="vp-header"><div class="vp-title">Central Dogma Flow</div><div class="vp-desc">Edit DNA or RNA to see transcription and translation propagate forward</div></div>
<div style="padding:.5rem .8rem;border-bottom:1px solid var(--border);flex-shrink:0;">
  <div style="display:flex;gap:.3rem;margin-bottom:.5rem;flex-wrap:wrap;align-items:center;">
    <button class="vp-btn" onclick="setDogmaSeq('ATGGTGCACCTGACTCCTGAGGAGAAGTCTGCCGTTACTGCCCTGTGGGGCAAGGTG')">HBB (normal)</button>
    <button class="vp-btn" onclick="setDogmaSeq('ATGGTGCACCTGACTCCTGTGGAGAAGTCTGCCGTTACTGCCCTGTGGGGCAAGGTG')">HBB (sickle cell)</button>
    <button class="vp-btn" onclick="setDogmaSeq('ATGGCTAGCGATTTTCAGTGGAAATAG')">Short demo</button>
    <span style="flex:1;"></span>
    <span style="font-family:'DM Mono',monospace;font-size:.55rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;">Input:</span>
    <button class="vp-btn${dogmaInputMode==='dna'?' active':''}" data-dim onclick="setDogmaInputMode('dna')">DNA</button>
    <button class="vp-btn${dogmaInputMode==='rna'?' active':''}" data-dim onclick="setDogmaInputMode('rna')">RNA</button>
  </div>
  <label for="dogma-input" style="font-family:'DM Mono',monospace;font-size:.6rem;color:var(--text-muted);display:block;margin-bottom:.25rem;letter-spacing:.05em;"><span id="dogma-input-label">${dogmaInputMode==='rna'?"mRNA (5'→3')":"DNA coding strand (5'→3')"}</span> — type to edit, or click any base below to cycle</label>
  <textarea id="dogma-input" rows="2" spellcheck="false" autocapitalize="characters" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:.4rem .55rem;font-family:'DM Mono',monospace;font-size:.78rem;color:var(--text);outline:none;resize:vertical;line-height:1.5;letter-spacing:.05em;" oninput="onDogmaInputChange(this)">${dogmaInputMode==='rna'?dogmaSeq.replace(/T/g,'U'):dogmaSeq}</textarea>

    <span><span id="dogma-input-meta">${dogmaSeq.length} nt</span> &middot; GC <span id="dogma-gc">${dogmaGC(dogmaSeq)}%</span></span>
    <span style="color:var(--text-muted);"><span id="dogma-allowed">${dogmaInputMode==='rna'?'A U G C':'A T G C'}</span> only &middot; others ignored</span>
  </div>
</div>
<div style="flex:1;overflow-y:auto;padding:.5rem .8rem;" id="dogma-display"></div>`;

function dogmaGC(seq){
  if(!seq)return '0';
  const s=seq.toUpperCase().replace(/[^ATGCU]/g,'');
  if(!s.length)return '0';
  let gc=0;for(const c of s)if(c==='G'||c==='C')gc++;
  return ((gc/s.length)*100).toFixed(1);
}

function setDogmaInputMode(mode){
  if(mode!=='dna'&&mode!=='rna')return;
  dogmaInputMode=mode;
  // Re-render the panel to update toggle states + textarea contents
  renderDogmaPanel();
}

function onDogmaInputChange(ta){
  // In DNA mode allow A/T/G/C; in RNA mode allow A/U/G/C and convert U→T internally
  const raw=ta.value;
  const allowed=dogmaInputMode==='rna'?/[^AUGC]/g:/[^ATGC]/g;
  const cleaned=raw.toUpperCase().replace(allowed,'');
  if(cleaned!==raw){
    const start=ta.selectionStart;
    const before=raw.substring(0,start).toUpperCase().replace(allowed,'').length;
    ta.value=cleaned;
    try{ta.setSelectionRange(before,before);}catch(e){}
  }
  // Store internally as DNA (T not U) for downstream code
  dogmaSeq=dogmaInputMode==='rna'?cleaned.replace(/U/g,'T'):cleaned;
  dogmaMutPos=-1;
  renderDogmaFlow();
  const meta=document.getElementById('dogma-input-meta');
  if(meta)meta.textContent=cleaned.length+' nt';
  const gc=document.getElementById('dogma-gc');
  if(gc)gc.textContent=dogmaGC(cleaned)+'%';
}

function setDogmaSeq(seq){
  dogmaSeq=seq;dogmaOrigSeq=seq;dogmaMutPos=-1;
  // Sync the textarea input if present (display U for RNA mode)
  const ta=document.getElementById('dogma-input');
  if(ta){ta.value=dogmaInputMode==='rna'?seq.replace(/T/g,'U'):seq;}
  const meta=document.getElementById('dogma-input-meta');
  if(meta)meta.textContent=seq.length+' nt';
  const gc=document.getElementById('dogma-gc');
  if(gc)gc.textContent=dogmaGC(seq)+'%';
  renderDogmaFlow();
}

function renderDogmaFlow(){
  const el=document.getElementById('dogma-display');if(!el)return;
  const dna=dogmaSeq.toUpperCase().replace(/[^ATGC]/g,'');
  // Transcribe: coding strand T→U
  const mrna=dna.replace(/T/g,'U');
  // Template strand (complement, shown 3'→5')
  const template=dna.split('').map(c=>({A:'T',T:'A',G:'C',C:'G'}[c])).join('');
  // Translate from first AUG
  let startIdx=-1;
  for(let i=0;i<=mrna.length-3;i++){if(mrna.substring(i,i+3)==='AUG'){startIdx=i;break;}}

  const codons=[];
  if(startIdx>=0){
    for(let i=startIdx;i<=mrna.length-3;i+=3){
      const codon=mrna.substring(i,i+3);
      const aa=DOGMA_CODON[codon]||'?';
      codons.push({codon,aa,c1:DOGMA_3TO1[aa]||'?',dnaIdx:i});
      if(aa==='Stop')break;
    }
  }

  // Compare with original to find mutations
  const origMrna=dogmaOrigSeq.toUpperCase().replace(/[^ATGC]/g,'').replace(/T/g,'U');
  const origCodons=[];
  if(startIdx>=0){
    for(let i=startIdx;i<=origMrna.length-3;i+=3){
      const codon=origMrna.substring(i,i+3);
      const aa=DOGMA_CODON[codon]||'?';
      origCodons.push({codon,aa,c1:DOGMA_3TO1[aa]||'?'});
      if(aa==='Stop')break;
    }
  }

  let html='';

  // ── 1. DNA CODING STRAND ──
  html+=`<div style="margin-bottom:.6rem;">
    <div style="display:flex;align-items:center;gap:.4rem;margin-bottom:.3rem;">
      <span style="font-family:'DM Mono',monospace;font-size:.6rem;color:#3b82f6;font-weight:700;">DNA</span>
      <span style="font-size:.55rem;color:var(--text-muted);">coding strand 5'→3'</span>
    </div>
    <div style="font-family:'DM Mono',monospace;font-size:.8rem;line-height:2;word-break:break-all;">`;
  for(let i=0;i<dna.length;i++){
    const b=dna[i];
    const origB=dogmaOrigSeq[i]||'';
    const isMut=(b!==origB&&dogmaOrigSeq.length>0&&i<dogmaOrigSeq.length);
    const col=DOGMA_COLORS[b]||'#94a3b8';
    const bg=isMut?'rgba(239,68,68,.2)':'transparent';
    const outline=isMut?'outline:2px solid #ef4444;outline-offset:1px;':'';
    html+=`<span onclick="mutateDogmaBase(${i})" style="cursor:pointer;color:${col};padding:0 1px;border-radius:2px;background:${bg};${outline}transition:all .1s;" title="Position ${i+1}: ${b}${isMut?' (mutated from '+origB+')':''}">${b}</span>`;
    // Codon spacing
    if(startIdx>=0&&i>=startIdx&&(i-startIdx)%3===2)html+='<span style="color:var(--border)"> </span>';
  }
  html+=`</div></div>`;

  // ── 2. TEMPLATE STRAND ──
  html+=`<div style="margin-bottom:.6rem;">
    <div style="display:flex;align-items:center;gap:.4rem;margin-bottom:.3rem;">
      <span style="font-family:'DM Mono',monospace;font-size:.6rem;color:#ef4444;font-weight:700;">Template</span>
      <span style="font-size:.55rem;color:var(--text-muted);">3'→5'</span>
    </div>
    <div style="font-family:'DM Mono',monospace;font-size:.65rem;color:var(--text-muted);word-break:break-all;">`;
  for(let i=0;i<template.length;i++){
    html+=template[i];
    if(startIdx>=0&&i>=startIdx&&(i-startIdx)%3===2)html+=' ';
  }
  html+=`</div></div>`;

  // ── Arrow: Transcription ──
  html+=`<div style="display:flex;align-items:center;gap:.4rem;margin:.3rem 0;padding:.3rem .5rem;background:rgba(139,92,246,.06);border-radius:4px;border-left:3px solid #8b5cf6;">
    <span style="font-size:.9rem;">↓</span>
    <span style="font-family:'DM Mono',monospace;font-size:.65rem;color:#a78bfa;font-weight:600;">TRANSCRIPTION</span>
    <span style="font-size:.55rem;color:var(--text-muted);">RNA Polymerase · T→U</span>
  </div>`;

  // ── 3. mRNA ──
  html+=`<div style="margin-bottom:.6rem;">
    <div style="display:flex;align-items:center;gap:.4rem;margin-bottom:.3rem;">
      <span style="font-family:'DM Mono',monospace;font-size:.6rem;color:#f59e0b;font-weight:700;">mRNA</span>
      <span style="font-size:.55rem;color:var(--text-muted);">5'→3'</span>
    </div>
    <div style="font-family:'DM Mono',monospace;font-size:.8rem;line-height:2;word-break:break-all;">`;
  for(let i=0;i<mrna.length;i++){
    const b=mrna[i];
    const origB=origMrna[i]||'';
    const isMut=(b!==origB&&origMrna.length>0&&i<origMrna.length);
    const col=DOGMA_COLORS[b]||'#94a3b8';
    const bg=isMut?'rgba(239,68,68,.2)':'transparent';
    html+=`<span style="color:${col};background:${bg};padding:0 1px;border-radius:2px;">${b}</span>`;
    if(startIdx>=0&&i>=startIdx&&(i-startIdx)%3===2)html+='<span style="color:var(--border)"> </span>';
  }
  html+=`</div></div>`;

  // ── Arrow: Translation ──
  html+=`<div style="display:flex;align-items:center;gap:.4rem;margin:.3rem 0;padding:.3rem .5rem;background:rgba(16,185,129,.06);border-radius:4px;border-left:3px solid #10b981;">
    <span style="font-size:.9rem;">↓</span>
    <span style="font-family:'DM Mono',monospace;font-size:.65rem;color:#34d399;font-weight:600;">TRANSLATION</span>
    <span style="font-size:.55rem;color:var(--text-muted);">Ribosome · Codons → Amino Acids</span>
  </div>`;

  // ── 4. CODONS → AMINO ACIDS ──
  html+=`<div style="margin-bottom:.6rem;">
    <div style="display:flex;align-items:center;gap:.4rem;margin-bottom:.3rem;">
      <span style="font-family:'DM Mono',monospace;font-size:.6rem;color:#10b981;font-weight:700;">Protein</span>
    </div>
    <div style="display:flex;gap:3px;flex-wrap:wrap;">`;
  codons.forEach((c,i)=>{
    const orig=origCodons[i];
    const isMut=orig&&(c.codon!==orig.codon);
    const aaMut=orig&&(c.c1!==orig.c1);
    const col=DOGMA_AA_COL[c.c1]||'#94a3b8';

    let mutType='';
    if(isMut&&!aaMut)mutType='silent';
    else if(isMut&&c.aa==='Stop'&&orig.aa!=='Stop')mutType='nonsense';
    else if(aaMut)mutType='missense';

    const borderCol=mutType==='nonsense'?'#ef4444':mutType==='missense'?'#f59e0b':mutType==='silent'?'#10b981':col;
    const bg=mutType?borderCol+'22':'transparent';

    html+=`<div style="display:flex;flex-direction:column;align-items:center;padding:2px 4px;border-radius:4px;border:1px solid ${mutType?borderCol:col+'33'};background:${bg};min-width:32px;" title="${c.codon} → ${c.aa} (${c.c1})${mutType?' — '+mutType+' mutation':''}">
      <span style="font-family:'DM Mono',monospace;font-size:.55rem;color:var(--text-muted);">${c.codon}</span>
      <span style="font-size:.85rem;font-weight:700;color:${col};">${c.aa==='Stop'?'■':c.c1}</span>
      <span style="font-family:'DM Mono',monospace;font-size:.5rem;color:var(--text-muted);">${c.aa}</span>
      ${mutType?`<span style="font-family:'DM Mono',monospace;font-size:.45rem;color:${borderCol};font-weight:700;">${mutType}</span>`:''}
    </div>`;
  });
  if(startIdx<0)html+=`<span style="font-size:.7rem;color:#f87171;">No AUG start codon found</span>`;
  html+=`</div></div>`;

  // ── Mutation summary ──
  const mutations=[];
  for(let i=0;i<Math.max(dna.length,dogmaOrigSeq.length);i++){
    if(dna[i]!==dogmaOrigSeq[i]&&dogmaOrigSeq[i])mutations.push({pos:i+1,from:dogmaOrigSeq[i],to:dna[i]||'del'});
  }
  if(mutations.length>0){
    html+=`<div style="background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:6px;padding:.5rem .7rem;margin-top:.3rem;">
      <div style="font-family:'DM Mono',monospace;font-size:.6rem;color:#f87171;margin-bottom:.2rem;">MUTATIONS (${mutations.length})</div>`;
    mutations.forEach(m=>{
      html+=`<div style="font-family:'DM Mono',monospace;font-size:.62rem;color:var(--text-dim);">pos ${m.pos}: ${m.from}→${m.to}</div>`;
    });
    // Count mutation types in protein
    let silent=0,missense=0,nonsense=0;
    codons.forEach((c,i)=>{
      const orig=origCodons[i];
      if(!orig||c.codon===orig.codon)return;
      if(c.c1===orig.c1)silent++;
      else if(c.aa==='Stop'&&orig.aa!=='Stop')nonsense++;
      else missense++;
    });
    html+=`<div style="font-size:.6rem;color:var(--text-muted);margin-top:.2rem;">Effect: ${silent} silent · ${missense} missense · ${nonsense} nonsense</div>`;
    html+=`</div>`;
    html+=`<button class="vp-btn" style="margin-top:.3rem;" onclick="setDogmaSeq(dogmaOrigSeq)">Reset to original</button>`;
  }

  // ── Copy / FASTA section ──
  const proteinStr=codons.map(c=>c.aa==='Stop'?'*':c.c1).join('');
  const NL='\n';
  const fastaWrap=s=>{const out=[];for(let i=0;i<s.length;i+=60)out.push(s.substring(i,i+60));return out.join(NL);};
  const fastaDNA='>DNA_coding_strand_5to3'+NL+fastaWrap(dna);
  const fastaRNA='>mRNA_5to3'+NL+fastaWrap(mrna);
  const fastaProtein='>Protein_N_to_C'+NL+fastaWrap(proteinStr);
  // Stash on window for the copy buttons
  window.__dogmaCopyTargets={dna:fastaDNA,rna:fastaRNA,protein:fastaProtein};
  if(dna.length>0){
    html+=`<div style="margin-top:.6rem;padding:.5rem .7rem;background:var(--surface2);border:1px solid var(--border);border-radius:6px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.35rem;flex-wrap:wrap;gap:.4rem;">
        <span style="font-family:'DM Mono',monospace;font-size:.6rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;">Copy sequence</span>
        <span style="font-family:'DM Mono',monospace;font-size:.55rem;color:var(--text-muted);">FASTA format</span>
      </div>
      <div style="display:flex;gap:.3rem;flex-wrap:wrap;">
        <button class="vp-btn" onclick="copyDogmaSeq('dna')">DNA <span style="color:var(--text-muted);">${dna.length} nt</span></button>
        <button class="vp-btn" onclick="copyDogmaSeq('rna')">mRNA <span style="color:var(--text-muted);">${mrna.length} nt</span></button>
        ${proteinStr.length>0?`<button class="vp-btn" onclick="copyDogmaSeq('protein')">Protein <span style="color:var(--text-muted);">${proteinStr.replace(/\\*/g,'').length} aa</span></button>`:''}
      </div>
    </div>`;
  }

  el.innerHTML=html;
}

function copyDogmaSeq(which){
  const t=window.__dogmaCopyTargets;if(!t)return;
  const text=t[which];if(!text)return;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>flashCopyBtn(which));
  } else {
    // Fallback for older browsers
    const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');}catch(e){}
    document.body.removeChild(ta);
    flashCopyBtn(which);
  }
}

function flashCopyBtn(which){
  // Find the button and momentarily show feedback
  const btns=document.querySelectorAll('.content-panel button.vp-btn');
  btns.forEach(b=>{
    const txt=b.textContent.toLowerCase();
    if((which==='dna'&&txt.startsWith('dna'))||(which==='rna'&&txt.startsWith('mrna'))||(which==='protein'&&txt.startsWith('protein'))){
      const orig=b.innerHTML;
      b.innerHTML='Copied ✓';
      b.style.color='var(--accent)';
      setTimeout(()=>{b.innerHTML=orig;b.style.color='';},1400);
    }
  });
}

function mutateDogmaBase(idx){
  const bases=['A','T','G','C'];
  const current=dogmaSeq[idx];
  const options=bases.filter(b=>b!==current);
  // Cycle to next base
  const next=options[0];
  dogmaSeq=dogmaSeq.substring(0,idx)+next+dogmaSeq.substring(idx+1);
  dogmaMutPos=idx;
  // Keep textarea in sync (display U if RNA mode)
  const ta=document.getElementById('dogma-input');
  if(ta)ta.value=dogmaInputMode==='rna'?dogmaSeq.replace(/T/g,'U'):dogmaSeq;
  const meta=document.getElementById('dogma-input-meta');
  if(meta)meta.textContent=dogmaSeq.length+' nt';
  const gc=document.getElementById('dogma-gc');
  if(gc)gc.textContent=dogmaGC(dogmaSeq)+'%';
  renderDogmaFlow();
}

function getMW(){return parseFloat(document.getElementById('uc-mw')?.value)||0;}

const MASS_FACTORS={g:1,mg:1e-3,ug:1e-6,ng:1e-9};
const MOLE_FACTORS={mol:1,mmol:1e-3,umol:1e-6,nmol:1e-9,pmol:1e-12};
const CONC_FACTORS={M:1,mM:1e-3,uM:1e-6,nM:1e-9};
const VOL_FACTORS={L:1,mL:1e-3,uL:1e-6,nL:1e-9};

function fmtNum(n){
  if(n===0)return '0';
  if(Math.abs(n)>=1e6)return n.toExponential(2);
  if(Math.abs(n)>=1000)return n.toLocaleString(undefined,{maximumFractionDigits:1});
  if(Math.abs(n)>=1)return n.toFixed(3);
  if(Math.abs(n)>=0.001)return n.toFixed(4);
  return n.toExponential(2);
}

function bestUnit(valInBase,factors,units){
  // Find the unit that gives a value between 0.1 and 9999
  for(const u of units){
    const v=valInBase/factors[u];
    if(v>=0.1&&v<10000)return {val:v,unit:u};
  }
  return {val:valInBase/factors[units[0]],unit:units[0]};
}

function calcFromMass(){
  const mw=getMW();if(mw<=0)return;
  const mass=Math.max(0,parseFloat(document.getElementById('uc-mass')?.value)||0);
  const unit=document.getElementById('uc-mass-unit')?.value||'mg';
  const massG=mass*MASS_FACTORS[unit];
  const moles=massG/mw;// in mol
  const r=document.getElementById('uc-mass-result');if(!r)return;
  const b1=bestUnit(moles,MOLE_FACTORS,['mol','mmol','umol','nmol','pmol']);
  r.innerHTML=`= <span style="color:var(--accent)">${fmtNum(b1.val)} ${b1.unit}</span>`;
}

function calcFromMoles(){
  const mw=getMW();if(mw<=0)return;
  const moles=Math.max(0,parseFloat(document.getElementById('uc-moles')?.value)||0);
  const unit=document.getElementById('uc-moles-unit')?.value||'umol';
  const molesBase=moles*MOLE_FACTORS[unit];
  const massG=molesBase*mw;
  const r=document.getElementById('uc-moles-result');if(!r)return;
  const b1=bestUnit(massG,MASS_FACTORS,['g','mg','ug','ng']);
  r.innerHTML=`= <span style="color:var(--accent)">${fmtNum(b1.val)} ${b1.unit}</span>`;
}

function calcMgMl(){
  const mw=getMW();if(mw<=0)return;
  const mgml=Math.max(0,parseFloat(document.getElementById('uc-mgml')?.value)||0);
  // mg/mL ÷ MW(g/mol) ÷ 1000 mL/L = mol/L (M)
  const molarM=mgml/(mw*1e-3);
  const r=document.getElementById('uc-mgml-result');if(!r)return;
  const b=bestUnit(molarM,CONC_FACTORS,['M','mM','uM','nM']);
  r.innerHTML=`= <span style="color:var(--accent)">${fmtNum(b.val)} ${b.unit}</span>`;
}

function calcMolar(){
  const mw=getMW();if(mw<=0)return;
  const conc=Math.max(0,parseFloat(document.getElementById('uc-molar')?.value)||0);
  const unit=document.getElementById('uc-molar-unit')?.value||'uM';
  const concM=conc*CONC_FACTORS[unit];
  // M × MW(g/mol) = g/L = mg/mL
  const mgml=concM*mw/1000;
  const r=document.getElementById('uc-molar-result');if(!r)return;
  if(mgml>=0.001){
    r.innerHTML=`= <span style="color:var(--accent)">${fmtNum(mgml)} mg/mL</span> <span style="color:var(--text-muted);">= ${fmtNum(mgml)} µg/µL</span>`;
  } else {
    r.innerHTML=`= <span style="color:var(--accent)">${fmtNum(mgml*1000)} µg/mL</span>`;
  }
}

function calcDilution(){
  const c1=parseFloat(document.getElementById('uc-c1')?.value)||0;
  const c1u=document.getElementById('uc-c1u')?.value||'mM';
  const c2=parseFloat(document.getElementById('uc-c2')?.value)||0;
  const c2u=document.getElementById('uc-c2u')?.value||'uM';
  const v2=parseFloat(document.getElementById('uc-v2')?.value)||0;
  const v2u=document.getElementById('uc-v2u')?.value||'uL';
  const c1M=c1*CONC_FACTORS[c1u];
  const c2M=c2*CONC_FACTORS[c2u];
  const v2L=v2*VOL_FACTORS[v2u];
  const r=document.getElementById('uc-v1-result');if(!r)return;
  if(c1M<=0||c2M<=0||v2L<=0||c2M>c1M){
    r.textContent=c2M>c1M?'C₂ must be < C₁':'—';return;
  }
  const v1L=c2M*v2L/c1M;
  const b=bestUnit(v1L,VOL_FACTORS,['L','mL','uL','nL']);
  r.innerHTML=`<span style="color:var(--accent);font-weight:600;">${fmtNum(b.val)} ${b.unit}</span>`;
}

function calcUnits(){calcFromMass();calcFromMoles();calcMgMl();calcMolar();calcDilution();}
