function getMW(){return parseFloat(document.getElementById('uc-mw')?.value)||0;}

const MASS_FACTORS={g:1,mg:1e-3,ug:1e-6,ng:1e-9};
const MOLE_FACTORS={mol:1,mmol:1e-3,umol:1e-6,nmol:1e-9,pmol:1e-12};
const CONC_FACTORS={M:1,mM:1e-3,uM:1e-6,nM:1e-9};
const VOL_FACTORS={L:1,mL:1e-3,uL:1e-6,nL:1e-9};

function fmtNum(n){
  if(n===0)return '0';
  if(Math.abs(n)>=1e6)return n.toExponential(2);
  if(Math.abs(n)>=1000)return n.toLocaleString(undefined,{maximumFractionDigits:1});
  if(Math.abs(n)>=1)return n.toFixed(3);
  if(Math.abs(n)>=0.001)return n.toFixed(4);
  return n.toExponential(2);
}

function bestUnit(valInBase,factors,units){
  // Find the unit that gives a value between 0.1 and 9999
  for(const u of units){
    const v=valInBase/factors[u];
    if(v>=0.1&&v<10000)return {val:v,unit:u};
  }
  return {val:valInBase/factors[units[0]],unit:units[0]};
}

function calcFromMass(){
  const mw=getMW();if(mw<=0)return;
  const mass=Math.max(0,parseFloat(document.getElementById('uc-mass')?.value)||0);
  const unit=document.getElementById('uc-mass-unit')?.value||'mg';
  const massG=mass*MASS_FACTORS[unit];
  const moles=massG/mw;// in mol
  const r=document.getElementById('uc-mass-result');if(!r)return;
  const b1=bestUnit(moles,MOLE_FACTORS,['mol','mmol','umol','nmol','pmol']);
  r.innerHTML=`= <span style="color:var(--accent)">${fmtNum(b1.val)} ${b1.unit}</span>`;
}

function calcFromMoles(){
  const mw=getMW();if(mw<=0)return;
  const moles=Math.max(0,parseFloat(document.getElementById('uc-moles')?.value)||0);
  const unit=document.getElementById('uc-moles-unit')?.value||'umol';
  const molesBase=moles*MOLE_FACTORS[unit];
  const massG=molesBase*mw;
  const r=document.getElementById('uc-moles-result');if(!r)return;
  const b1=bestUnit(massG,MASS_FACTORS,['g','mg','ug','ng']);
  r.innerHTML=`= <span style="color:var(--accent)">${fmtNum(b1.val)} ${b1.unit}</span>`;
}

function calcMgMl(){
  const mw=getMW();if(mw<=0)return;
  const mgml=Math.max(0,parseFloat(document.getElementById('uc-mgml')?.value)||0);
  // mg/mL ÷ MW(g/mol) ÷ 1000 mL/L = mol/L (M)
  const molarM=mgml/(mw*1e-3);
  const r=document.getElementById('uc-mgml-result');if(!r)return;
  const b=bestUnit(molarM,CONC_FACTORS,['M','mM','uM','nM']);
  r.innerHTML=`= <span style="color:var(--accent)">${fmtNum(b.val)} ${b.unit}</span>`;
}

function calcMolar(){
  const mw=getMW();if(mw<=0)return;
  const conc=Math.max(0,parseFloat(document.getElementById('uc-molar')?.value)||0);
  const unit=document.getElementById('uc-molar-unit')?.value||'uM';
  const concM=conc*CONC_FACTORS[unit];
  // M × MW(g/mol) = g/L = mg/mL
  const mgml=concM*mw/1000;
  const r=document.getElementById('uc-molar-result');if(!r)return;
  if(mgml>=0.001){
    r.innerHTML=`= <span style="color:var(--accent)">${fmtNum(mgml)} mg/mL</span> <span style="color:var(--text-muted);">= ${fmtNum(mgml)} µg/µL</span>`;
  } else {
    r.innerHTML=`= <span style="color:var(--accent)">${fmtNum(mgml*1000)} µg/mL</span>`;
  }
}

function calcDilution(){
  const c1=parseFloat(document.getElementById('uc-c1')?.value)||0;
  const c1u=document.getElementById('uc-c1u')?.value||'mM';
  const c2=parseFloat(document.getElementById('uc-c2')?.value)||0;
  const c2u=document.getElementById('uc-c2u')?.value||'uM';
  const v2=parseFloat(document.getElementById('uc-v2')?.value)||0;
  const v2u=document.getElementById('uc-v2u')?.value||'uL';
  const c1M=c1*CONC_FACTORS[c1u];
  const c2M=c2*CONC_FACTORS[c2u];
  const v2L=v2*VOL_FACTORS[v2u];
  const r=document.getElementById('uc-v1-result');if(!r)return;
  // Reset border to default accent on each call (we mutate it on warnings)
  r.style.borderColor='var(--accent)';
  if(c1M<=0||c2M<=0||v2L<=0||c2M>c1M){
    r.innerHTML=c2M>c1M?'<span style="color:#9a3a3a;">C₂ must be ≤ C₁</span>':'—';
    return;
  }
  const v1L=c2M*v2L/c1M;
  const v1uL=v1L/VOL_FACTORS.uL;  // V₁ expressed in µL (lab unit)
  const b=bestUnit(v1L,VOL_FACTORS,['L','mL','uL','nL']);
  // Pipettability check: P2 min ≈ 0.5 µL (practical accuracy floor); P1000 max = 1000 µL
  const PIP_MIN_uL=0.5, PIP_MAX_uL=1000;
  // Calculate fold dilution for the suggestion
  const fold=c1M/c2M;
  // Suggest a serial dilution scheme — pick the smallest power-of-10 (or 2) factor
  // such that each step's transfer is pipettable
  let suggestion='';
  if(v1uL<PIP_MIN_uL){
    // Pick a step factor and tube count
    let stepFactor, nSteps;
    if(fold<=20){ stepFactor=Math.sqrt(fold); nSteps=2; }
    else if(fold<=100){ stepFactor=10; nSteps=2; }
    else if(fold<=1000){ stepFactor=10; nSteps=3; }
    else if(fold<=10000){ stepFactor=10; nSteps=4; }
    else { stepFactor=10; nSteps=Math.ceil(Math.log10(fold)); }
    nSteps=Math.max(2,Math.min(10,nSteps));
    suggestion=`<div style="margin-top:.45rem;padding:.5rem .6rem;background:rgba(231,117,0,.08);border:1px solid rgba(231,117,0,.35);border-radius:5px;font-family:'DM Mono',monospace;font-size:.65rem;color:var(--text-dim);line-height:1.55;">`

      +`Try a <b style="color:#147888;">${nSteps}-step ~1:${stepFactor%1===0?stepFactor:stepFactor.toFixed(1)} serial dilution</b> instead.`
      +`<br><a href="#serial" onclick="event.preventDefault();selectTool('serial');" style="color:var(--accent);text-decoration:none;font-weight:600;">→ Open Serial Dilution tool</a>`
      +`</div>`;
    r.style.borderColor='#9a3a3a';
  } else if(v1uL>PIP_MAX_uL){

      +`<b style="color:#a8580f;">⚠ Above P1000 maximum (${PIP_MAX_uL} µL)</b> — pipette in multiple aliquots, use a serological pipette/cylinder, or scale down V₂.`

function calcLoadingDye(){
  const result=document.getElementById('lc-result'); if(!result)return;
  const sample=Math.max(0, parseFloat(document.getElementById('lc-sample')?.value)||0);
  const sampleU=document.getElementById('lc-sample-u')?.value||'uL';
  const presetEl=document.getElementById('lc-x-preset');
  const preset=presetEl?.value||'6';
  let X;
  if(preset==='custom'){
    X=Math.max(1.01, parseFloat(document.getElementById('lc-x-custom')?.value)||1.01);
  } else {
    X=parseFloat(preset)||1;
  }
  const topup=document.getElementById('lc-topup')?.checked||false;
  // Convert sample to µL for internal math, present in chosen unit at the end
  const sampleUL = sample * (sampleU==='mL'?1000:1);

  // Reset border
  result.style.borderColor='#147888';

  // Edge cases
  if(sampleUL<=0){
    result.innerHTML='<span style="color:var(--text-muted);">Enter a sample volume to compute the recipe.</span>';
    return;
  }
  if(X<=1.05){
    result.innerHTML='<span style="color:#9a3a3a;">Concentrate strength must be greater than ~1× to make sense. (Real concentrates are typically 2×, 4×, 5×, 6×, or 10×.)</span>';
    result.style.borderColor='#9a3a3a';
    return;
  }

  if(!topup){
    // Simple case: just add concentrated buffer to sample, final volume = sample + buffer
    // V_buffer = V_sample / (X − 1)
    const Vbuf_uL = sampleUL / (X-1);
    const bufStr=_fmtUL(Vbuf_uL);
    let warning='';
    if(Vbuf_uL < 0.5){
      warning='<div style="margin-top:.4rem;font-size:.62rem;color:#a8580f;line-height:1.5;">⚠ '+bufStr+' is below the P2 minimum (0.5 µL). Scale up your sample volume or use the "top up to final volume" option for a more pipettable recipe.</div>';
      result.style.borderColor='#a8580f';
    } else if(Vbuf_uL < 2){
      warning='<div style="margin-top:.4rem;font-size:.6rem;color:var(--text-muted);line-height:1.5;">Use P2 — small volumes pipette best with a fresh tip and slow draw.</div>';
    }
    result.innerHTML=`<span style="color:var(--text-muted);font-size:.7rem;">Add</span> <span style="color:#147888;font-weight:600;">${bufStr}</span> <span style="color:var(--text-muted);font-size:.7rem;">of ${X}× concentrate to ${_fmtUL(sampleUL)} sample</span>${warning}`;
    return;
  }

  // Top-up case: V_final is fixed; V_buffer = V_final / X; V_water = V_final − V_sample − V_buffer
  const Vfinal_input=Math.max(0, parseFloat(document.getElementById('lc-final')?.value)||0);
  const finalU=document.getElementById('lc-final-u')?.value||'uL';
  const Vfinal_uL=Vfinal_input * (finalU==='mL'?1000:1);
  if(Vfinal_uL<=0){
    result.innerHTML='<span style="color:var(--text-muted);">Enter a target final volume.</span>';
    return;
  }
  const Vbuf_uL = Vfinal_uL / X;
  const Vwater_uL = Vfinal_uL - sampleUL - Vbuf_uL;

  // Volume of sample-only is too large to fit at 1× in this final volume
  if(Vwater_uL < -0.001){
    // Sample alone exceeds available "non-buffer" room
    const maxSample = Vfinal_uL - Vbuf_uL;
    result.innerHTML=`<span style="color:#9a3a3a;">⚠ Sample (${_fmtUL(sampleUL)}) is too large for a ${_fmtUL(Vfinal_uL)} final volume at 1×.</span>`
      +`<div style="font-size:.66rem;color:var(--text-muted);margin-top:.25rem;line-height:1.5;">Maximum sample for this final volume: <b style="color:var(--text);">${_fmtUL(maxSample)}</b> (the rest must be ${X}× buffer). Either reduce sample volume or increase target final volume.</div>`;
    result.style.borderColor='#9a3a3a';
    return;
  }

  const sampleStr=_fmtUL(sampleUL);
  const bufStr=_fmtUL(Vbuf_uL);
  const waterStr=_fmtUL(Vwater_uL);
  const finStr=_fmtUL(Vfinal_uL);

  // Pipettability warnings
  let warning='';
  if(Vbuf_uL>0 && Vbuf_uL<0.5){
    warning+='<div style="font-size:.62rem;color:#a8580f;line-height:1.5;margin-top:.4rem;">⚠ '+bufStr+' buffer is below the P2 minimum (0.5 µL). Scale up the recipe.</div>';
    result.style.borderColor='#a8580f';
  }
  if(Vwater_uL>0 && Vwater_uL<0.5){
    warning+='<div style="font-size:.62rem;color:#a8580f;line-height:1.5;margin-top:.4rem;">⚠ '+waterStr+' water is below the P2 minimum. Skip the top-up or use a larger final volume.</div>';
    result.style.borderColor='#a8580f';
  }
  if(Math.abs(Vwater_uL)<0.05){
    // Effectively zero — the topup option is unnecessary
    warning+='<div style="font-size:.62rem;color:var(--text-muted);line-height:1.5;margin-top:.4rem;">No water needed — sample + buffer already hits the target. (Same answer as untoggling "top up".)</div>';
  }

  result.innerHTML=`<div style="display:grid;grid-template-columns:auto 1fr;gap:.15rem .6rem;align-items:baseline;">`
    +`<span style="color:var(--text-muted);font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;">Sample</span>`
    +`<span style="color:var(--text);font-weight:600;">${sampleStr}</span>`
    +`<span style="color:var(--text-muted);font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;">${X}× buffer</span>`
    +`<span style="color:#147888;font-weight:700;">${bufStr}</span>`
    +(Vwater_uL>0.05?`<span style="color:var(--text-muted);font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;">Water (top up)</span>`
      +`<span style="color:#147888;font-weight:700;">${waterStr}</span>`:'')
    +`<span style="color:var(--text-muted);font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;border-top:1px solid var(--border);padding-top:.25rem;margin-top:.15rem;">Total</span>`
    +`<span style="color:var(--text);font-weight:600;border-top:1px solid var(--border);padding-top:.25rem;margin-top:.15rem;">${finStr} at 1×</span>`
    +`</div>`
    +warning;
}

function _fmtUL(uL){
  // Format a volume given in µL, choosing readable unit
  if(uL===0) return '0 µL';
  if(Math.abs(uL)>=1000) return (uL/1000).toFixed(uL>=10000?1:2)+' mL';
  if(Math.abs(uL)>=10) return uL.toFixed(2)+' µL';
  if(Math.abs(uL)>=1) return uL.toFixed(2)+' µL';
  if(Math.abs(uL)>=0.01) return uL.toFixed(2)+' µL';
  return (uL*1000).toFixed(2)+' nL';
}


// ============================================================
// DNA Tm CALCULATOR
// ============================================================
// PCR planner state (persists across renders)
let pcrPolymerase='taq';   // 'taq' | 'phusion' | 'q5' | 'platinum'

let pcrSeqR='ACGTACGTAGCTAGCTAA';  // reverse primer (default = complementary-ish but distinct)
let pcrSalt=500;           // [Na+] mM, shared between both primers

// Polymerase presets: extension rate (s/kb), max amplicon, denaturation temp/time, fidelity notes
const POLYMERASES={
  taq:     {label:'Taq',          rateSecPerKb:60, maxKb:5,  denTemp:95, denTime:30, finalExtTime:300, ext:72, note:'Standard fidelity, ~2.6×10⁻⁵ error rate. Adds 3′-A overhangs (TA cloning friendly).'},
  phusion: {label:'Phusion',      rateSecPerKb:30, maxKb:10, denTemp:98, denTime:10, finalExtTime:300, ext:72, note:'High fidelity (~50× Taq), proofreading. Blunt-ended product.'},
  q5:      {label:'Q5',            rateSecPerKb:30, maxKb:20, denTemp:98, denTime:10, finalExtTime:120, ext:72, note:'Very high fidelity (~280× Taq). Best for cloning long or GC-rich templates.'},
  platinum:{label:'Platinum (HiFi)', rateSecPerKb:60, maxKb:10, denTemp:94, denTime:30, finalExtTime:600, ext:68, note:'Hot-start, balanced fidelity. 68 °C extension. Common for general PCR.'},
};

// Pure Tm computation — given a sequence and [Na+] in M, returns {tmNN, tmBasic, tmWallace, tmOwczarzy, gc, N, dH, dS_salt, ctDivisor, isPalindrome, valid, A, T, G, C}
function _computeTm(rawSeq, saltMolar){
  const seq=rawSeq.toUpperCase().replace(/[^ATGC]/g,'');
  const N=seq.length;
  if(N<2) return {valid:false, N:N, seq:seq};
  const A=seq.split('').filter(c=>c==='A').length;
  const T=seq.split('').filter(c=>c==='T').length;
  const G=seq.split('').filter(c=>c==='G').length;
  const C=seq.split('').filter(c=>c==='C').length;
  const gc=(G+C)/N*100;
  const tmWallace=2*(A+T)+4*(G+C);
  const tmBasic=81.5+16.6*Math.log10(saltMolar)+41*(G+C)/N-675/N;
  const NN_H={AA:-7900,AT:-7200,TA:-7200,CA:-8500,GT:-8400,CT:-7800,GA:-8200,CG:-10600,GC:-9800,GG:-8000,
              TT:-7900,AC:-8400,TG:-8500,AG:-7800,TC:-8200,CC:-8000};
  const NN_S={AA:-22.2,AT:-20.4,TA:-21.3,CA:-22.7,GT:-22.4,CT:-21.0,GA:-22.2,CG:-27.2,GC:-24.4,GG:-19.9,
              TT:-22.2,AC:-22.4,TG:-22.7,AG:-21.0,TC:-22.2,CC:-19.9};
  let dH=0, dS=0;
  const first=seq[0], last=seq[N-1];
  if(first==='G'||first==='C'){dH+=100;dS-=2.8;}else{dH+=2300;dS+=4.1;}
  if(last==='G'||last==='C'){dH+=100;dS-=2.8;}else{dH+=2300;dS+=4.1;}
  let nnValid=true;
  for(let i=0;i<N-1;i++){
    const pair=seq[i]+seq[i+1];
    if(NN_H[pair]!==undefined&&NN_S[pair]!==undefined){
      dH+=NN_H[pair]; dS+=NN_S[pair];
    } else { nnValid=false; break; }
  }
  const revcomp=seq.split('').map(c=>({A:'T',T:'A',G:'C',C:'G'}[c])).reverse().join('');
  const isPalindrome=(seq===revcomp);
  const dS_sym=isPalindrome?dS-1.4:dS;
  const dS_salt=dS_sym+0.368*(N-1)*Math.log(saltMolar);
  const Ct=250e-9, R=1.987;
  const ctDivisor=isPalindrome?1:4;
  const tmNN=nnValid? dH/(dS_salt+R*Math.log(Ct/ctDivisor))-273.15 : null;
  let tmOwczarzy=null;
  if(nnValid){
    const Tm1M_K=dH/(dS_sym+R*Math.log(Ct/ctDivisor));
    const fGC=(G+C)/N;
    const lnNa=Math.log(saltMolar);
    const invTm=1/Tm1M_K+(4.29*fGC-3.95)*1e-5*lnNa+9.4e-6*lnNa*lnNa;
    tmOwczarzy=1/invTm-273.15;
  }
  return {valid:true, seq, N, A, T, G, C, gc, tmNN, tmBasic, tmWallace, tmOwczarzy, dH, dS_salt, ctDivisor, isPalindrome};
}

function calcTm(){
  const seqF=document.getElementById('tm-seq-f')?.value||pcrSeqF;
  const seqR=document.getElementById('tm-seq-r')?.value||pcrSeqR;
  pcrSeqF=seqF; pcrSeqR=seqR;
  const saltMolar=pcrSalt/1000;

  const tmF=_computeTm(seqF, saltMolar);
  const tmR=_computeTm(seqR, saltMolar);

  // Render the two-column primer results
  const pairBox=document.getElementById('tm-pair-results');
  if(pairBox){
    pairBox.innerHTML = renderPrimerColumn('Forward', tmF, '#9a3a3a') + renderPrimerColumn('Reverse', tmR, '#3d4a5e');
  }

  // Render annealing temperature recommendation
  const recBox=document.getElementById('tm-anneal-rec');
  let recommendedAnneal=null;
  if(tmF.valid && tmR.valid && tmF.tmNN!==null && tmR.tmNN!==null){
    const lower=Math.min(tmF.tmNN, tmR.tmNN);
    recommendedAnneal=lower-5;
    if(recBox){
      const diff=Math.abs(tmF.tmNN-tmR.tmNN);
      const diffNote = diff<=2 ? '✓ primers well-matched (Δ ≤ 2°C)'
                     : diff<=5 ? '⚠ slight mismatch (Δ '+diff.toFixed(1)+'°C) — anneal at the lower Tm'
                     :          '✗ poor match (Δ '+diff.toFixed(1)+'°C) — redesign primers for better PCR efficiency';
      const diffColor = diff<=2 ? '#147888' : diff<=5 ? '#a8580f' : '#9a3a3a';
      recBox.innerHTML=`<div style="background:rgba(154,58,58,.06);border:1px solid rgba(154,58,58,.3);border-radius:6px;padding:.5rem .7rem;">
        <div style="font-family:'DM Mono',monospace;font-size:.58rem;color:#9a3a3a;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem;font-weight:600;">Recommended annealing temperature</div>
        <div style="font-family:'DM Mono',monospace;font-size:.95rem;color:#9a3a3a;font-weight:700;line-height:1.2;">${recommendedAnneal.toFixed(1)} °C</div>
        <div style="font-family:'DM Mono',monospace;font-size:.6rem;color:var(--text-muted);margin-top:.25rem;line-height:1.4;">= min(Tm<sub>F</sub>, Tm<sub>R</sub>) − 5 °C = min(${tmF.tmNN.toFixed(1)}, ${tmR.tmNN.toFixed(1)}) − 5</div>
        <div style="font-family:'DM Mono',monospace;font-size:.6rem;color:${diffColor};margin-top:.25rem;font-weight:500;">${diffNote}</div>
      </div>`;
    }
  } else if(recBox){
    recBox.innerHTML='<div style="font-size:.65rem;color:var(--text-muted);padding:.4rem 0;">Enter both primers to get an annealing temperature recommendation.</div>';
  }

  // Render PCR program
  // Live-update the (auto)/(manual) tag next to the ANNEAL label
  const modeTag=document.getElementById('pcr-anneal-mode');
  if(modeTag) modeTag.textContent = pcrAnnealManual===null ? '(auto)' : '(manual)';

  drawPcrProgram(recommendedAnneal);
}

function drawPcrProgram(autoAnneal){
  const container=document.getElementById('pcr-program');
  if(!container) return;
  const poly=POLYMERASES[pcrPolymerase];
  const annealTemp = pcrAnnealManual!==null ? pcrAnnealManual : (autoAnneal!==null ? autoAnneal : 55);
  const annealSrc = pcrAnnealManual!==null ? '(manual)' : (autoAnneal!==null ? '(auto from primers)' : '(default — enter primers)');

  // Extension time = (amplicon kb) × (rate s/kb), rounded up to whole seconds, with a sensible minimum of 10 s
  const ampliconKb = pcrAmpliconBp/1000;
  const extTimeSec = Math.max(10, Math.ceil(ampliconKb * poly.rateSecPerKb));
  // Cycle time
  const cycleTimeSec = poly.denTime + 30 + extTimeSec; // anneal step typically 15-30s, use 30s default
  // Initial denaturation (typically 30s for Taq, longer for hot-start)
  const initDenSec = pcrPolymerase==='platinum' ? 120 : (pcrPolymerase==='phusion'||pcrPolymerase==='q5' ? 30 : 180);
  // Total time
  const totalSec = initDenSec + (cycleTimeSec * pcrCycles) + poly.finalExtTime;

  const fmtTime = (s) => {
    if(s<60) return s+'s';
    const m=Math.floor(s/60), sec=s%60;
    if(sec===0) return m+'m';
    return m+'m '+sec+'s';
  };

  // Length warning
  let lengthWarning='';
  if(ampliconKb > poly.maxKb){
    lengthWarning=`<div style="margin-top:.4rem;padding:.4rem .55rem;background:rgba(168,88,15,.08);border:1px solid rgba(168,88,15,.3);border-radius:5px;font-family:'DM Mono',monospace;font-size:.6rem;color:#a8580f;line-height:1.5;">⚠ ${pcrAmpliconBp.toLocaleString()} bp exceeds the typical ${poly.maxKb} kb max for ${poly.label}. Consider Q5 or LongAmp for longer amplicons.</div>`;
  }

  // Build the program table
  let html=`<div style="overflow-x:auto;border:1px solid var(--border);border-radius:6px;background:var(--surface2);">
    <table style="width:100%;border-collapse:collapse;font-family:'DM Mono',monospace;font-size:.7rem;min-width:440px;">
    <thead><tr style="background:var(--bg);border-bottom:1px solid var(--border);">
      <th style="text-align:left;padding:.4rem .55rem;color:var(--text-muted);font-weight:500;letter-spacing:.05em;">STEP</th>
      <th style="text-align:left;padding:.4rem .55rem;color:var(--text-muted);font-weight:500;letter-spacing:.05em;">TEMP</th>
      <th style="text-align:left;padding:.4rem .55rem;color:var(--text-muted);font-weight:500;letter-spacing:.05em;">TIME</th>
      <th style="text-align:left;padding:.4rem .55rem;color:var(--text-muted);font-weight:500;letter-spacing:.05em;">REPEATS</th>
    </tr></thead><tbody>
    <tr style="border-bottom:1px solid var(--border);">
      <td style="padding:.35rem .55rem;color:var(--text);font-weight:500;">Initial denaturation</td>
      <td style="padding:.35rem .55rem;color:var(--text-dim);">${poly.denTemp} °C</td>
      <td style="padding:.35rem .55rem;color:var(--text-dim);">${fmtTime(initDenSec)}</td>
      <td style="padding:.35rem .55rem;color:var(--text-muted);">1×</td>
    </tr>
    <tr style="border-bottom:1px solid var(--border);background:rgba(154,58,58,.04);">
      <td style="padding:.35rem .55rem;color:var(--text);font-weight:500;">Denaturation</td>
      <td style="padding:.35rem .55rem;color:var(--text-dim);">${poly.denTemp} °C</td>
      <td style="padding:.35rem .55rem;color:var(--text-dim);">${fmtTime(poly.denTime)}</td>
      <td style="padding:.35rem .55rem;color:var(--text-muted);" rowspan="3"><b style="color:var(--text);">${pcrCycles}×</b></td>
    </tr>
    <tr style="border-bottom:1px solid var(--border);background:rgba(154,58,58,.04);">
      <td style="padding:.35rem .55rem;color:var(--text);font-weight:500;">Annealing</td>
      <td style="padding:.35rem .55rem;color:#9a3a3a;font-weight:600;">${annealTemp.toFixed(1)} °C <span style="color:var(--text-muted);font-weight:400;font-size:.55rem;">${annealSrc}</span></td>
      <td style="padding:.35rem .55rem;color:var(--text-dim);">30s</td>
    </tr>
    <tr style="border-bottom:1px solid var(--border);background:rgba(154,58,58,.04);">
      <td style="padding:.35rem .55rem;color:var(--text);font-weight:500;">Extension</td>
      <td style="padding:.35rem .55rem;color:var(--text-dim);">${poly.ext} °C</td>
      <td style="padding:.35rem .55rem;color:var(--text-dim);">${fmtTime(extTimeSec)}</td>
    </tr>
    <tr style="border-bottom:1px solid var(--border);">
      <td style="padding:.35rem .55rem;color:var(--text);font-weight:500;">Final extension</td>
      <td style="padding:.35rem .55rem;color:var(--text-dim);">${poly.ext} °C</td>
      <td style="padding:.35rem .55rem;color:var(--text-dim);">${fmtTime(poly.finalExtTime)}</td>
      <td style="padding:.35rem .55rem;color:var(--text-muted);">1×</td>
    </tr>
    <tr>
      <td style="padding:.35rem .55rem;color:var(--text);font-weight:500;">Hold</td>
      <td style="padding:.35rem .55rem;color:var(--text-dim);">4 °C</td>
      <td style="padding:.35rem .55rem;color:var(--text-dim);">∞</td>
      <td style="padding:.35rem .55rem;color:var(--text-muted);">—</td>
    </tr>
    </tbody></table>
  </div>`;

  // Summary cards
  html+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.45rem;margin-top:.5rem;">
    <div style="background:var(--surface2);border:1px solid var(--border);border-left:3px solid #9a3a3a;border-radius:5px;padding:.4rem .55rem;">
      <div style="font-family:'DM Mono',monospace;font-size:.55rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;">Extension/cycle</div>
      <div style="font-family:'DM Mono',monospace;font-size:.85rem;color:var(--text);font-weight:600;">${fmtTime(extTimeSec)}</div>
      <div style="font-family:'DM Mono',monospace;font-size:.55rem;color:var(--text-muted);margin-top:.15rem;">${ampliconKb.toFixed(2)} kb × ${poly.rateSecPerKb} s/kb</div>
    </div>
    <div style="background:var(--surface2);border:1px solid var(--border);border-left:3px solid #9a3a3a;border-radius:5px;padding:.4rem .55rem;">
      <div style="font-family:'DM Mono',monospace;font-size:.55rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;">Time/cycle</div>
      <div style="font-family:'DM Mono',monospace;font-size:.85rem;color:var(--text);font-weight:600;">${fmtTime(cycleTimeSec)}</div>
      <div style="font-family:'DM Mono',monospace;font-size:.55rem;color:var(--text-muted);margin-top:.15rem;">denat. + anneal + ext.</div>
    </div>
    <div style="background:var(--surface2);border:1px solid var(--border);border-left:3px solid #9a3a3a;border-radius:5px;padding:.4rem .55rem;">
      <div style="font-family:'DM Mono',monospace;font-size:.55rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;">Total run time</div>
      <div style="font-family:'DM Mono',monospace;font-size:.85rem;color:#9a3a3a;font-weight:700;">${fmtTime(totalSec)}</div>
      <div style="font-family:'DM Mono',monospace;font-size:.55rem;color:var(--text-muted);margin-top:.15rem;">${pcrCycles} cycles + init/final</div>
    </div>
  </div>`;

  // Polymerase note
  html+=`<div style="margin-top:.5rem;padding:.45rem .6rem;background:var(--bg);border:1px solid var(--border);border-radius:5px;font-family:'DM Mono',monospace;font-size:.6rem;color:var(--text-dim);line-height:1.55;"><b style="color:var(--text);">${poly.label}:</b> ${poly.note}</div>`;

  html+=lengthWarning;
  container.innerHTML=html;
}

// ============================================================
// PROTEIN MW & pI CALCULATOR
// ============================================================
const AA_PKA={
  Nterm:9.69, Cterm:2.34,
  D:{pKa:3.65,charge:-1}, E:{pKa:4.25,charge:-1}, C:{pKa:8.18,charge:-1}, Y:{pKa:10.07,charge:-1},
  H:{pKa:6.00,charge:1}, K:{pKa:10.53,charge:1}, R:{pKa:12.48,charge:1}
};
const AA_MW_FULL={G:57.05,A:71.08,V:99.13,L:113.16,I:113.16,P:97.12,F:147.18,W:186.21,M:131.20,S:87.08,T:101.10,C:103.14,Y:163.18,N:114.10,Q:128.13,D:115.09,E:129.12,K:128.17,R:156.19,H:137.14};
const AA_EXT={W:5500,Y:1490};// molar extinction coefficients at 280nm

function calcMwPi(){
  const raw=document.getElementById('mwpi-seq')?.value||'';
  const seq=raw.toUpperCase().replace(/[^ACDEFGHIKLMNPQRSTVWY]/g,'');
  const res=document.getElementById('mwpi-results');if(!res)return;
  if(seq.length<1){res.innerHTML='<div style="font-size:.75rem;color:var(--text-muted)">Enter amino acid sequence...</div>';return;}

  // Count residues
  const counts={};
  for(const c of seq){counts[c]=(counts[c]||0)+1;}
  const N=seq.length;

  // MW calculation
  let mw=18.02;// water
  for(const [aa,cnt] of Object.entries(counts)){mw+=(AA_MW_FULL[aa]||110)*cnt;}

  // pI calculation (bisection method)
  function netCharge(pH){
    let charge=0;
    // N-terminus
    charge+=1/(1+Math.pow(10,pH-AA_PKA.Nterm));
    // C-terminus
    charge-=1/(1+Math.pow(10,AA_PKA.Cterm-pH));
    // Side chains
    for(const [aa,props] of Object.entries(AA_PKA)){
      if(aa==='Nterm'||aa==='Cterm')continue;
      const cnt=counts[aa]||0;
      if(cnt===0)continue;
      if(props.charge>0){charge+=cnt/(1+Math.pow(10,pH-props.pKa));}
      else{charge-=cnt/(1+Math.pow(10,props.pKa-pH));}
    }
    return charge;
  }
  let lo=0,hi=14;
  for(let i=0;i<100;i++){
    const mid=(lo+hi)/2;
    if(netCharge(mid)>0)lo=mid;else hi=mid;
  }
  const pI=(lo+hi)/2;

  // Extinction coefficient at 280nm (Pace et al. 1995 method)
  const nW=counts['W']||0, nY=counts['Y']||0, nC=counts['C']||0;
  const nCystine=Math.floor(nC/2);// max possible disulfide bonds
  const ext280_ox=nW*5500+nY*1490+nCystine*125;// all Cys paired
  const ext280_red=nW*5500+nY*1490;// no disulfides (reduced)
  const abs01_ox=ext280_ox>0?(ext280_ox/mw).toFixed(3):'N/A';
  const abs01_red=ext280_red>0?(ext280_red/mw).toFixed(3):'N/A';

  // Charge at pH 7
  const chargeAt7=netCharge(7);

  // Amino acid composition
  const groups={
    nonpolar:['G','A','V','L','I','P','F','W','M'],
    polar:['S','T','C','Y','N','Q'],
    positive:['K','R','H'],
    negative:['D','E']
  };

  function card(title,value,unit,note,col){
    return `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.5rem .7rem;border-left:3px solid ${col};">
      <div style="font-family:'DM Mono',monospace;font-size:.58rem;color:${col};text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem;">${title}</div>
      <div style="font-size:1.2rem;font-weight:600;color:var(--text);">${value}<span style="font-size:.65rem;color:var(--text-muted);margin-left:.25rem;">${unit}</span></div>
      <div style="font-size:.6rem;color:var(--text-dim);">${note}</div>
    </div>`;
  }

  let html=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:.4rem;">
    ${card('Molecular Weight',mw>=10000?(mw/1000).toFixed(2)+'k':''+mw.toFixed(1),'Da',''+N+' residues · Avg MW/residue: '+(mw/N).toFixed(1)+' Da','#3b82f6')}
    ${card('Isoelectric Point (pI)',pI.toFixed(2),'','Net charge at pH 7: '+(chargeAt7>=0?'+':'')+chargeAt7.toFixed(1),'#8b5cf6')}
  </div>`;

  // Extinction coefficient detail section
  html+=`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.5rem .7rem;margin-top:.4rem;border-left:3px solid #f59e0b;">
    <div style="font-family:'DM Mono',monospace;font-size:.58rem;color:#f59e0b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.3rem;">Extinction Coefficient (ε₂₈₀)</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.4rem;margin-bottom:.3rem;">
      <div>
        <div style="font-size:.55rem;color:var(--text-muted);margin-bottom:.1rem;">Oxidized (all Cys paired)</div>
        <div style="font-size:1rem;font-weight:600;color:var(--text);">${ext280_ox>0?ext280_ox:'—'}<span style="font-size:.6rem;color:var(--text-muted);margin-left:.2rem;">M⁻¹cm⁻¹</span></div>
        <div style="font-size:.55rem;color:var(--text-dim);">Abs 0.1% = ${abs01_ox}</div>
      </div>
      <div>
        <div style="font-size:.55rem;color:var(--text-muted);margin-bottom:.1rem;">Reduced (no disulfides)</div>
        <div style="font-size:1rem;font-weight:600;color:var(--text);">${ext280_red>0?ext280_red:'—'}<span style="font-size:.6rem;color:var(--text-muted);margin-left:.2rem;">M⁻¹cm⁻¹</span></div>
        <div style="font-size:.55rem;color:var(--text-dim);">Abs 0.1% = ${abs01_red}</div>
      </div>
    </div>
    <div style="font-family:'DM Mono',monospace;font-size:.55rem;color:var(--text-muted);line-height:1.6;">
      Trp(W) × ${nW} = ${nW*5500} · Tyr(Y) × ${nY} = ${nY*1490} · Cystine × ${nCystine} = ${nCystine*125}<br>
      Pace et al. (1995). Abs 0.1% = ε / MW (for 1 mg/mL in 1 cm path)
    </div>
  </div>`;

  html+=`<div style="display:grid;grid-template-columns:1fr;gap:.4rem;margin-top:.4rem;">
    ${card('Length',''+N,'aa','~'+(N*0.11).toFixed(1)+' kDa estimated','#10b981')}
  </div>`;

  // Charge vs pH plot (canvas)
  html+=`<div style="margin-top:.5rem;"><canvas id="charge-plot" style="width:100%;height:120px;border-radius:6px;"></canvas></div>`;

  // Composition bars
  html+=`<div style="margin-top:.5rem;">
    <div style="font-family:'DM Mono',monospace;font-size:.58rem;color:var(--text-muted);margin-bottom:.3rem;">COMPOSITION</div>`;
  const compCols={nonpolar:'#3b82f6',polar:'#10b981',positive:'#8b5cf6',negative:'#ef4444'};
  for(const [group,aas] of Object.entries(groups)){
    const cnt=aas.reduce((s,a)=>s+(counts[a]||0),0);
    const pct=(cnt/N*100).toFixed(1);
    html+=`<div style="display:flex;align-items:center;gap:.4rem;margin-bottom:.2rem;">
      <span style="font-size:.6rem;color:var(--text-muted);width:58px;">${group}</span>
      <div style="flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:${compCols[group]};border-radius:3px;"></div></div>
      <span style="font-family:'DM Mono',monospace;font-size:.58rem;color:var(--text);width:40px;text-align:right;">${pct}%</span>
    </div>`;
  }
  html+=`</div>`;

  res.innerHTML=html;

  // Draw charge vs pH plot
  setTimeout(()=>{
    const canvas=document.getElementById('charge-plot');if(!canvas)return;
    const dpr=window.devicePixelRatio||1;
    const w=canvas.clientWidth,h=canvas.clientHeight;
    canvas.width=w*dpr;canvas.height=h*dpr;
    const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
    const cssVars=getComputedStyle(document.documentElement);
    const plotBg=cssVars.getPropertyValue('--plot-bg').trim()||'243,241,236';
    const plotBorder=cssVars.getPropertyValue('--plot-border').trim()||'229,227,220';
    const plotText=cssVars.getPropertyValue('--plot-text').trim()||'#737373';
    const plotTextStrong=cssVars.getPropertyValue('--plot-text-strong').trim()||'#404040';
    ctx.fillStyle=`rgba(${plotBg},1)`;
    if(ctx.roundRect){ctx.beginPath();ctx.roundRect(0,0,w,h,4);ctx.fill();}
    else{ctx.fillRect(0,0,w,h);}// fallback for iOS Safari < 16
    ctx.strokeStyle=`rgba(${plotBorder},1)`;ctx.lineWidth=1;ctx.strokeRect(0,0,w,h);
    const ml=36,mr=10,mt=12,mb=20;
    const pw=w-ml-mr,ph=h-mt-mb;
    // Grid
    ctx.strokeStyle='rgba(115,115,115,.18)';ctx.lineWidth=1;
    for(let i=0;i<=14;i+=2){const x=ml+i/14*pw;ctx.beginPath();ctx.moveTo(x,mt);ctx.lineTo(x,mt+ph);ctx.stroke();}
    // Zero line
    const charges=[];for(let pH=0;pH<=14;pH+=0.1)charges.push(netCharge(pH));
    const maxC=Math.max(...charges.map(Math.abs),1);
    const zeroY=mt+ph/2;
    ctx.strokeStyle='rgba(64,64,64,.4)';ctx.beginPath();ctx.moveTo(ml,zeroY);ctx.lineTo(ml+pw,zeroY);ctx.stroke();
    // Curve — use theme-adaptive curve color
    const curveColor=document.documentElement.getAttribute('data-theme')==='dark'?'#9aafd0':'#3d4a5e';
    ctx.strokeStyle=curveColor;ctx.lineWidth=2.5;ctx.beginPath();
    for(let i=0;i<=140;i++){
      const pH=i/10;const c=netCharge(pH);
      const x=ml+pH/14*pw,y=zeroY-c/maxC*(ph/2);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke();
    // pI marker
    const pIx=ml+pI/14*pw;
    ctx.strokeStyle='#E77500';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(pIx,mt);ctx.lineTo(pIx,mt+ph);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#E77500';ctx.font='bold 8px DM Mono,monospace';ctx.textAlign='center';
    ctx.fillText('pI='+pI.toFixed(1),pIx,mt+ph+14);
    // Axis labels
    ctx.fillStyle=plotText;ctx.font='8px DM Mono,monospace';ctx.textAlign='center';
    for(let i=0;i<=14;i+=2)ctx.fillText(''+i,ml+i/14*pw,mt+ph+14);
    ctx.textAlign='right';ctx.fillStyle=plotTextStrong;ctx.fillText('+',ml-4,mt+8);ctx.fillText('0',ml-4,zeroY+3);ctx.fillText('−',ml-4,mt+ph-2);
    ctx.save();ctx.translate(8,mt+ph/2);ctx.rotate(-Math.PI/2);ctx.textAlign='center';ctx.fillStyle=plotText;ctx.fillText('Charge',0,0);ctx.restore();
  },50);
}

let pipVol=1000,pipType='P1000';
const PIP_MAX={P2:2,P20:20,P200:200,P1000:1000};
function renderPipettePanel(){
  // Default to P1000 at its max
  pipVol=PIP_MAX.P1000;pipType='P1000';
  const p=document.getElementById('right-panel');
  p.innerHTML=`<div class="vp-header"><div class="vp-title">Micropipette Viewer</div><div class="vp-desc">Set a volume and see the pipette window</div></div>
<div class="vp-controls">

  <button class="vp-btn" id="pip-p20" onclick="setPipType('P20')">P20</button>
  <button class="vp-btn" id="pip-p200" onclick="setPipType('P200')">P200</button>
  <button class="vp-btn active" id="pip-p1000" onclick="setPipType('P1000')">P1000</button>
</div>
<div style="padding:.5rem .8rem;display:flex;align-items:center;gap:.5rem;border-bottom:1px solid var(--border);flex-shrink:0;">
  <label style="font-family:'DM Mono',monospace;font-size:.65rem;color:var(--text-muted);">Volume (µL):</label>
  <input type="number" id="pip-vol" value="${pipVol}" min="0" step="0.1" style="width:70px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:.2rem .4rem;font-family:'DM Mono',monospace;font-size:.7rem;color:var(--text);outline:none;" oninput="pipVol=Math.max(0,+this.value||0);drawPipette()">
  <span id="pip-range" style="font-family:'DM Mono',monospace;font-size:.55rem;color:var(--text-muted);"></span>
</div>
<div style="flex:1;display:flex;align-items:center;justify-content:center;padding:.5rem;min-height:0;overflow:hidden;" id="pip-area"></div>
<div id="pip-info" style="padding:.4rem .8rem;border-top:1px solid var(--border);flex-shrink:0;font-size:.66rem;line-height:1.55;color:var(--text-muted);"></div>`;
  drawPipette();
}
function setPipType(t){
  pipType=t;
  // Always set the volume to the max of the new pipette type — that lands within its range
  pipVol=PIP_MAX[t]||0;
  const inp=document.getElementById('pip-vol');
  if(inp)inp.value=pipVol;
  document.querySelectorAll('[id^=pip-p]').forEach(function(b){b.classList.remove('active');});
  const btn=document.getElementById('pip-'+t.toLowerCase());
  if(btn)btn.classList.add('active');
  drawPipette();
}
function drawPipette(){
  var area=document.getElementById('pip-area');if(!area)return;area.innerHTML='';
  var s=document.createElementNS('http://www.w3.org/2000/svg','svg');s.setAttribute('viewBox','0 0 260 430');s.style.cssText='max-width:100%;max-height:100%;display:block;';area.appendChild(s);
  var NS2='http://www.w3.org/2000/svg';
  function el(tag,a,parent){var n=document.createElementNS(NS2,tag);if(a)Object.entries(a).forEach(function(e){n.setAttribute(e[0],String(e[1]));});(parent||s).appendChild(n);return n;}
  function txt(x,y,str,c,fs,fw,_unused,parent){var t=el('text',{x:x,y:y,'text-anchor':'middle','font-size':fs||9,fill:c||'#94a3b8','font-family':'DM Mono,monospace','font-weight':fw||'600'},parent);t.textContent=str;}
  var ranges={P2:{min:0.2,max:2},P20:{min:2,max:20},P200:{min:20,max:200},P1000:{min:100,max:1000}};
  var r=ranges[pipType],vol=Math.max(0,Math.min(r.max,pipVol)),outOfRange=pipVol<r.min||pipVol>r.max;
  var rangeEl=document.getElementById('pip-range');if(rangeEl)rangeEl.textContent='Range: '+r.min+'–'+r.max+' µL';
  var d1,d2,d3,dialFrac;
  if(pipType==='P2'){d1=Math.floor(vol);d2=Math.floor((vol*10)%10);d3=Math.floor((vol*100)%10);dialFrac=(vol*1000)%10/10;}
  else if(pipType==='P20'){d1=Math.floor(vol/10);d2=Math.floor(vol%10);d3=Math.floor((vol*10)%10);dialFrac=(vol*100)%10/10;}
  else if(pipType==='P200'){d1=Math.floor(vol/100);d2=Math.floor((vol%100)/10);d3=Math.floor(vol%10);dialFrac=(vol*10)%10/10;}
  else{d1=Math.floor(vol/1000);d2=Math.floor((vol%1000)/100);d3=Math.floor((vol%100)/10);dialFrac=(vol%10)/10;}
  var cx=130,bw=64;
  // Plunger button
  el('rect',{x:cx-16,y:8,width:32,height:42,rx:7,fill:'#334155',stroke:'#475569','stroke-width':1.5});
  // Shaft
  el('rect',{x:cx-12,y:50,width:24,height:75,rx:4,fill:'#1e293b',stroke:'#334155','stroke-width':1.5});
  // Body
  el('rect',{x:cx-bw/2,y:125,width:bw,height:175,rx:10,fill:'#1e293b',stroke:outOfRange?'#ef4444':'#475569','stroke-width':2});
  txt(cx,143,pipType,'#94a3b8',11,'700');
  // Tip ejector button
  el('rect',{x:cx+bw/2-2,y:178,width:14,height:6,rx:2,fill:'#475569'});

  // ── VOLUME WINDOW (3 digits) ──
  // Gilson convention for which digit is the "red" (fractional / smallest-step) digit:
  //   P1000 → top digit (thousands)     — red
  //   P200  → none red                  — pure whole µL display
  //   P20   → bottom digit (tenths)     — red, decimal between middle & bottom
  //   P2    → bottom digit (hundredths) — red, decimal between top & middle
  var redIdx={P1000:0, P200:-1, P20:2, P2:2}[pipType];   // -1 = no red
  var decimalAfter={P1000:-1, P200:-1, P20:1, P2:0}[pipType];  // index after which to draw decimal point (-1 = no decimal)
  var wy=152,ww=50,wh=95;
  el('rect',{x:cx-ww/2,y:wy,width:ww,height:wh,rx:5,fill:'#f8fafc',stroke:'#cbd5e1','stroke-width':1.5});
  [[d1,wy+20],[d2,wy+46],[d3,wy+72]].forEach(function(pair,idx){
    var isRed = idx===redIdx;
    el('rect',{x:cx-20,y:pair[1]-15,width:40,height:22,rx:3,fill:isRed?'#fee2e2':'#f1f5f9',stroke:isRed?'#fca5a5':'#e2e8f0','stroke-width':0.5});
    txt(cx,pair[1]+2,String(pair[0]),isRed?'#dc2626':'#1e293b',20,'700');
    // Decimal point: small dot just after this row's digit cell when this is the row before the decimal
    if(idx===decimalAfter){
      el('circle',{cx:cx+22, cy:pair[1]+8, r:1.6, fill:'#1e293b'});
    }
  });

  // ── HORIZONTAL TICK DIAL (below window, centered ±half scale) ──
  // Real Gilson pipettes work this way: the pointer/indicator is fixed in the
  // center, and as you turn the volume adjuster, the tick wheel rotates underneath
  // — you see the ticks slide past a fixed reference. This mirrors that physical
  // behavior: pointer is locked, ticks slide based on dialOffset.
  var dialY=wy+wh+14,dialW=56,dialH=22;
  el('rect',{x:cx-dialW/2-3,y:dialY-3,width:dialW+6,height:dialH+6,rx:4,fill:'#0f172a',stroke:'#475569','stroke-width':1});
  el('rect',{x:cx-dialW/2,y:dialY,width:dialW,height:dialH,rx:2,fill:'#1e293b'});
  // Half-tick labels per pipette type (the ±5-tick edge label)
  var halfLabels={P2:'0.005',P20:'0.05',P200:'0.5',P1000:'5'};
  var halfLabel=halfLabels[pipType];
  // dialFrac is 0–1 representing position within the sub-digit (0.0 = exactly on digit, 0.5 = halfway)
  // Pointer position: dialFrac 0→center, 0.5→right end, 1.0→center (wraps). Convert to -5..+5 range
  var rawDial=dialFrac*10; // 0 to ~10
  var dialOffset=rawDial<=5?rawDial:rawDial-10; // -5 to +5, 0 = exactly on digit, ±5 = halfway

  // Tick spacing in pixels (one full sub-digit step = (dialW-6)/10 pixels)
  var tickStep=(dialW-6)/10;
  // Build a clipPath so ticks scrolling past the window edges are hidden
  // (this is how the dial "wraps" visually — you only see ~10 ticks at a time)
  var defs=el('defs',{});
  var clip=el('clipPath',{id:'pip-dial-clip'},defs);
  el('rect',{x:cx-dialW/2,y:dialY,width:dialW,height:dialH+18},clip);  // include label area

  // Group for the moving ticks + labels (everything inside scrolls together)
  var dialGroup=el('g',{'clip-path':'url(#pip-dial-clip)'});
  // Render extra ticks on either side so when the wheel scrolls, ticks slide in
  // smoothly from the edges instead of popping in. Drawing 21 ticks (-10 to +10)
  // with the +/-5 ticks being major + labeled — since dialOffset is in [-5,+5],
  // a -dialOffset shift of up to ±5*tickStep pixels will keep both half-labels in view.
  var pixelShift = dialOffset * tickStep;  // ticks slide in the direction of dial rotation
  for(var t=-10;t<=10;t++){
    // Position before shift: tick t at center + t*tickStep
    var tx = cx + t*tickStep + pixelShift;
    var isCenter=(t===0);
    var isHalf=(t===-5||t===5);
    var isMajor=isCenter||isHalf;
    var tickLen=isMajor?14:8;
    var tickCol=isMajor?'#94a3b8':'#586e85';
    el('line',{x1:tx,y1:dialY+2,x2:tx,y2:dialY+2+tickLen,stroke:tickCol,'stroke-width':isMajor?1:0.7},dialGroup);
    // Labels: edge ticks (±5) get the half-label, center gets "0"
    if(t===-5)      txt(tx,dialY+dialH+11,halfLabel,'#64748b',6,'500',null,dialGroup);
    else if(t===5)  txt(tx,dialY+dialH+11,halfLabel,'#64748b',6,'500',null,dialGroup);
    else if(t===0)  txt(tx,dialY+dialH+11,'0','#64748b',6,'600',null,dialGroup);
    // Wrap labels for -10/+10 (these scroll into view as you go past the half-tick)
    else if(t===-10) txt(tx,dialY+dialH+11,'0','#64748b',6,'600',null,dialGroup);
    else if(t===10)  txt(tx,dialY+dialH+11,'0','#64748b',6,'600',null,dialGroup);
  }

  // Red pointer triangle — FIXED in the center, regardless of dial position
  el('polygon',{points:(cx-3)+','+(dialY+dialH+1)+' '+(cx+3)+','+(dialY+dialH+1)+' '+cx+','+(dialY+dialH-4),fill:'#ef4444'});

  // Digit meaning labels — right-aligned just outside the pipette body's left edge
  // (body left edge = cx - bw/2 = cx - 32; labels' right edge sits at cx - 38 with a 6px gap)
  var meanings={P2:['1 µL','0.1 µL','0.01 µL'],P20:['10 µL','1 µL','0.1 µL'],P200:['100 µL','10 µL','1 µL'],P1000:['1000 µL','100 µL','10 µL']};
  var m=meanings[pipType];
  [[wy+22,m[0]],[wy+48,m[1]],[wy+74,m[2]]].forEach(function(pair){
    var t=el('text',{x:cx-38,y:pair[0],'text-anchor':'end','font-size':6,fill:'#64748b','font-family':'DM Mono,monospace','font-weight':'600'});
    t.textContent=pair[1];
  });

  // Nose cone
  el('rect',{x:cx-10,y:300,width:20,height:55,rx:4,fill:'#334155',stroke:'#475569','stroke-width':1});
  // Tip
  el('path',{d:'M'+(cx-8)+',355 L'+(cx+8)+',355 L'+(cx+3)+',420 L'+(cx-3)+',420 Z',fill:'#e2e8f0',stroke:'#94a3b8','stroke-width':1});

  if(outOfRange){el('rect',{x:cx-55,y:360,width:110,height:20,rx:4,fill:'rgba(239,68,68,.12)',stroke:'#ef4444','stroke-width':1});txt(cx,373,'⚠ Out of range!','#ef4444',9,'700');}

  var info=document.getElementById('pip-info');
  if(info){
    // Build readout string with the correct decimal placement per pipette:
    //   P1000/P200 → no decimal
    //   P20        → decimal between d2 and d3 (e.g. "02.5")
    //   P2         → decimal between d1 and d2 (e.g. "1.05")
    var readout;
    if(pipType==='P2')      readout = d1+'.'+d2+''+d3;
    else if(pipType==='P20') readout = d1+''+d2+'.'+d3;
    else                     readout = d1+''+d2+''+d3;
    var dialUnits={P2:'0.001',P20:'0.01',P200:'0.1',P1000:'1'};
    // Round dial display to 1 decimal to avoid float artifacts (e.g. 4.999999... → 5)
    var dialRounded=Math.round(dialOffset*10)/10;
    var dialShow=dialRounded>0?'+'+(Number.isInteger(dialRounded)?dialRounded:dialRounded.toFixed(1)):dialRounded<0?(Number.isInteger(dialRounded)?String(dialRounded):dialRounded.toFixed(1)):'0';
    if(outOfRange)info.innerHTML='<b style="color:#ef4444">⚠ '+pipVol+' µL is outside the '+pipType+' range ('+r.min+'–'+r.max+' µL).</b> Use a different pipette.';
    else info.innerHTML='<b style="color:var(--accent2)">'+pipType+' set to '+pipVol+' µL</b> — Window: <b>'+readout+'</b>, dial: <b>'+dialShow+'</b> (each tick = '+dialUnits[pipType]+' µL)';
  }
}

    <div style="font-size:.65rem;color:var(--text-muted);margin-bottom:.2rem;font-family:'DM Mono',monospace;letter-spacing:.04em;">DNA TRANSFORMED <span style="color:var(--text-muted);text-transform:none;letter-spacing:0;">(opt.)</span></div>
    <div style="display:flex;gap:.3rem;align-items:center;">
      <input id="ser-dna-mass" type="number" value="${serDnaMass===null?'':serDnaMass}" placeholder="e.g. 100" min="0" step="any" style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:.4rem .5rem;font-family:'DM Mono',monospace;font-size:.85rem;color:var(--text);outline:none;" oninput="serDnaMass=this.value===''?null:Math.max(0,+this.value||0);drawSerial()">
      <span style="font-family:'DM Mono',monospace;font-size:.74rem;color:var(--text-muted);">ng</span>
    </div>
  </div>`:''}
</div>
<div style="flex:1;overflow-y:auto;padding:0;min-height:0;">
  <div id="ser-svg-area" style="padding:1rem 1.4rem .4rem;display:flex;align-items:flex-start;justify-content:center;background:var(--surface);"></div>
  <div id="ser-protocol" style="padding:.4rem 1.4rem 1rem;"></div>
</div>
<div id="ser-info" style="padding:.55rem 1.4rem;border-top:1px solid var(--border);flex-shrink:0;font-size:.66rem;line-height:1.55;color:var(--text-muted);"></div>`;
  drawSerial();
}

function setSerialN(n){
  serNTubes=Math.max(4,Math.min(10,n|0));
  document.querySelectorAll('[id^=ser-n-]').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('ser-n-'+serNTubes);
  if(btn)btn.classList.add('active');
  drawSerial();
}

function setSerialMode(m){
  if(serMode===m)return;
  serMode=m;
  // Switch defaults sensibly when changing modes
  if(m==='plating'){
    // Typical microbiology defaults
    if(!['cells/mL','CFU/mL'].includes(serC0Unit)){
      serC0Unit='CFU/mL';
      serC0=1e9;            // ~OD600 ~1 ≈ 8e8 cells/mL — round to 1e9 for an easy default
    }
    // Use 1:10 dilution factor (standard for plating series)
    if(serFactorMode==='preset'&&serFactor!==10){
      serFactor=10;
    }
    serVfinal=900;          // 100 µL transfer + 900 µL diluent → easy 1:10
    serNTubes=6;
    // Note: serCounts NOT reset — user can toggle back and find their counts intact.
    // Use the "Clear all" button to wipe them.
  } else {
    // Restore concentration defaults
    if(['cells/mL','CFU/mL'].includes(serC0Unit)){
      serC0Unit='uM';
      serC0=1000;
    }
    if(serFactor===10 && serVfinal===900) serVfinal=200; // back to compact
  }
  // Re-render entire panel (controls + body) so visibility-dependent inputs appear/disappear
  renderSerialPanel();
}

function setSerialCount(idx, valStr){
  if(valStr===''||valStr==null){ delete serCounts[idx]; }
  else {
    const v=Math.max(0, parseInt(valStr,10)||0);
    serCounts[idx]=v;
  }
  // Don't re-render the inputs (would lose focus); just redraw the analysis panel
  drawSerialPlatingAnalysis();
}

function setSerialFactorPreset(v){
  if(v==='custom'){
    serFactorMode='custom';
    const cust=document.getElementById('ser-factor-custom');
    if(cust){cust.style.display='';cust.focus();cust.select();}
  } else {
    serFactorMode='preset';
    serFactor=+v;
    const cust=document.getElementById('ser-factor-custom');
    if(cust){cust.style.display='none';cust.value=serFactor;}
    serDiluentVol=null;
    drawSerial();
  }
}

function _serFmtConc(c, baseUnit){
  // c is value in baseUnit; auto-rescale for readability for molar units
  if(c===0) return '0 '+baseUnit;
  // Cells and CFU: scientific notation since these span 10^0 to 10^10+
  if(baseUnit==='cells/mL' || baseUnit==='CFU/mL'){
    if(c>=10000) return c.toExponential(2)+' '+baseUnit;
    if(c>=10) return Math.round(c).toLocaleString()+' '+baseUnit;
    if(c>=0.1) return c.toFixed(2)+' '+baseUnit;
    return c.toExponential(2)+' '+baseUnit;
  }
  const molarLadder=['M','mM','uM','nM','pM'];
  const factors={M:1,mM:1e-3,uM:1e-6,nM:1e-9,pM:1e-12};
  const massLadder={'mg/mL':['mg/mL','µg/mL','ng/mL','pg/mL'],'ng/uL':['mg/mL','µg/mL','ng/µL','pg/µL']};
  // Map base concentration to "M-equivalent" for molar; stay-in-unit for mass
  if(molarLadder.includes(baseUnit)){
    const conc_M=c*factors[baseUnit];
    for(const u of molarLadder){
      const v=conc_M/factors[u];
      if(v>=1 && v<1000) return v.toFixed(v>=100?1:v>=10?2:3)+' '+(u==='uM'?'µM':u);
    }
    // outside ladder: scientific
    if(conc_M<1e-12) return (conc_M/1e-15).toFixed(2)+' fM';
    return c.toExponential(2)+' '+(baseUnit==='uM'?'µM':baseUnit);
  }
  // mass-based: scale by powers of 1000
  if(baseUnit==='mg/mL' || baseUnit==='ng/uL'){
    const mgmL = baseUnit==='mg/mL' ? c : c/1000; // ng/µL == µg/mL == mg/mL/1000? No: 1 ng/µL = 1 µg/mL = 0.001 mg/mL
    // Pick best mass-conc unit
    if(mgmL>=1) return mgmL.toFixed(mgmL>=100?1:mgmL>=10?2:3)+' mg/mL';
    if(mgmL>=1e-3) return (mgmL*1000).toFixed(2)+' µg/mL';
    if(mgmL>=1e-6) return (mgmL*1e6).toFixed(2)+' ng/mL';
    return (mgmL*1e9).toFixed(2)+' pg/mL';
  }
  return c.toExponential(2)+' '+baseUnit;
}

function _serFmtVol(uL){
  if(uL>=1000) return (uL/1000).toFixed(uL>=10000?1:2)+' mL';
  if(uL>=1) return (uL>=100?uL.toFixed(1):uL.toFixed(2))+' µL';
  return (uL*1000).toFixed(1)+' nL';
}

function drawSerial(){
  const area=document.getElementById('ser-svg-area');
  const proto=document.getElementById('ser-protocol');
  const info=document.getElementById('ser-info');
  if(!area||!proto)return;

  // Sync custom input
  const cust=document.getElementById('ser-factor-custom');
  if(cust && serFactorMode==='custom') serFactor=Math.max(1.01,+cust.value||2);

  const N=serNTubes;
  const f=serFactor;
  const Vf=serVfinal; // µL final volume per tube
  const Vxfer = Vf/f;   // µL transferred from previous tube
  const Vdil = Vf - Vxfer; // µL diluent added to each tube

  // Concentrations C0..CN  (tube i has Ci = C0 / f^i for i>=1; tube 0 = stock at C0)
  // We'll show N tubes: tube 1..N (each receives transfer from previous)
  // Display tube 0 (stock) on the far left as a labeled source
  const concs=[];
  for(let i=0;i<=N;i++) concs.push(serC0/Math.pow(f,i));

  // ── SVG visualization ──
  const tubeW = 44, tubeH = 110, gap = 32;
  const labelTopH = 36;
  const labelBotH = 32;
  const sideMargin = 18;
  const totalTubes = N+1; // include stock
  const svgW = sideMargin*2 + totalTubes*tubeW + (totalTubes-1)*gap;
  const svgH = labelTopH + tubeH + labelBotH + 26; // extra for arrows row

  const NS='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(NS,'svg');
  svg.setAttribute('viewBox',`0 0 ${svgW} ${svgH}`);
  svg.setAttribute('width','100%');
  svg.style.cssText='max-width:100%;height:auto;display:block;max-height:280px;';
  function el(tag,attrs,parent){
    const n=document.createElementNS(NS,tag);
    if(attrs)Object.entries(attrs).forEach(([k,v])=>n.setAttribute(k,String(v)));
    (parent||svg).appendChild(n);
    return n;
  }
  function txt(x,y,s,color,size,weight,parent){
    const t=el('text',{x,y,'text-anchor':'middle','font-size':size||10,fill:color||'#737373','font-family':'DM Mono,monospace','font-weight':weight||'400'},parent);
    t.textContent=s;return t;
  }

  // Compute color intensity per tube (log-scale opacity from 0.95 down to ~0.04)
  // tube 0 = stock = full intensity; tube N = lightest
  const intensity = (i) => {
    if(N===0) return 0.9;
    // log scale by dilution-fold
    const fold = Math.pow(f,i);
    const minOp = 0.06, maxOp = 0.95;
    // normalize log(fold) over [0, log(f^N)]
    const t = Math.log(fold) / Math.log(Math.pow(f,N));
    return maxOp - t*(maxOp-minOp);
  };

  // Theme accent for liquid color
  const accentRGB='231,117,0'; // Princeton orange — matches accent

  for(let i=0;i<totalTubes;i++){
    const x = sideMargin + i*(tubeW+gap);
    const yTop = labelTopH;
    const yBot = labelTopH + tubeH;

    // Tube top label
    const tubeNum = i===0 ? 'Stock' : 'Tube '+i;
    txt(x+tubeW/2, 14, tubeNum, i===0?'var(--accent2)':'var(--text-dim)', 10, '600');
    txt(x+tubeW/2, 27, i===0 ? 'C\u2080' : 'C'+_subscript(i), i===0?'var(--accent)':'var(--text-muted)', 9, '500');

    // Tube body (rounded bottom)
    // Path: rectangle with semicircle bottom
    const tubeRadius = tubeW/2;
    const bodyH = tubeH - tubeRadius;
    const tubePath = `M ${x} ${yTop} L ${x} ${yTop+bodyH} A ${tubeRadius} ${tubeRadius} 0 0 0 ${x+tubeW} ${yTop+bodyH} L ${x+tubeW} ${yTop} Z`;
    el('path',{d:tubePath, fill:'rgba(255,255,255,.04)', stroke:'var(--border-strong)', 'stroke-width':1.2});

    // Liquid fill (a clipped rounded-bottom shape, nearly filling the tube)
    const liqTopY = yTop + 12; // slight headspace
    const liqBodyH = (yTop+bodyH) - liqTopY;
    const liqOp = intensity(i);
    const liqPath = `M ${x+1.5} ${liqTopY} L ${x+1.5} ${yTop+bodyH} A ${tubeRadius-1.5} ${tubeRadius-1.5} 0 0 0 ${x+tubeW-1.5} ${yTop+bodyH} L ${x+tubeW-1.5} ${liqTopY} Z`;
    el('path',{d:liqPath, fill:`rgba(${accentRGB},${liqOp})`, stroke:'none'});

    // Meniscus highlight
    el('ellipse',{cx:x+tubeW/2, cy:liqTopY, rx:tubeW/2-1.5, ry:1.6, fill:`rgba(${accentRGB},${Math.min(1,liqOp+0.15)})`, stroke:`rgba(${accentRGB},${Math.min(1,liqOp+0.3)})`, 'stroke-width':0.6});

    // Cap on stock (visual differentiator)
    if(i===0){
      el('rect',{x:x-2, y:yTop-5, width:tubeW+4, height:6, rx:2, fill:'var(--accent2)', stroke:'none'});
    }

    // Bottom label: concentration
    const baseUnit = serC0Unit;
    txt(x+tubeW/2, yBot+14, _serFmtConc(concs[i], baseUnit), i===0?'var(--accent)':'var(--text-dim)', 8.5, '600');
    // Dilution fold label (below concentration)
    const foldLabel = i===0 ? 'undiluted' : '1:'+_serFmtFold(Math.pow(f,i));
    txt(x+tubeW/2, yBot+24, foldLabel, 'var(--text-muted)', 7.5, '400');

    // Arrows between tubes (transfer)
    if(i<totalTubes-1){
      const ax = x + tubeW + 2;
      const ax2 = ax + gap - 4;
      const ay = yTop + tubeH/2;
      // Transfer arrow — use --text so it's near-black in light theme, near-white in dark
      el('line',{x1:ax, y1:ay, x2:ax2, y2:ay, stroke:'var(--text)', 'stroke-width':1.6, 'marker-end':'url(#ser-arrow)'});
      // small label "Vxfer"
      txt((ax+ax2)/2, ay-5, _serFmtVol(Vxfer), 'var(--text)', 7.5, '700');
    }
  }
  // Arrow marker def
  const defs=el('defs',{});
  const marker=el('marker',{id:'ser-arrow', markerWidth:7, markerHeight:7, refX:6, refY:3.5, orient:'auto', markerUnits:'strokeWidth'}, defs);
  el('path',{d:'M0,0 L7,3.5 L0,7 Z', fill:'var(--text)'}, marker);

  // Diluent indicator under tubes 1..N
  for(let i=1;i<totalTubes;i++){
    const x = sideMargin + i*(tubeW+gap);
    const ly = labelTopH + tubeH + 32;
    txt(x+tubeW/2, ly+8, '+ '+_serFmtVol(Vdil)+' diluent', 'var(--text-muted)', 7, '400');
  }

  area.innerHTML='';
  area.appendChild(svg);

  // ── Protocol table ──
  const concHeader = serMode==='plating' ? 'CELLS / mL' : 'FINAL CONC.';
  let html='<div style="font-family:\'DM Mono\',monospace;font-size:.62rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem;padding:.3rem 0;">PROTOCOL — '+N+'-step '+_serFmtFactor(f)+(serMode==='plating'?' plating dilution series':' serial dilution')+'</div>';
  html+='<div style="overflow-x:auto;border:1px solid var(--border);border-radius:6px;background:var(--surface2);"><table style="width:100%;border-collapse:collapse;font-family:\'DM Mono\',monospace;font-size:.7rem;min-width:520px;">';
  html+='<thead><tr style="background:var(--bg);border-bottom:1px solid var(--border);">'
       +'<th style="text-align:left;padding:.45rem .6rem;color:var(--text-muted);font-weight:500;letter-spacing:.05em;">TUBE</th>'
       +'<th style="text-align:left;padding:.45rem .6rem;color:var(--text-muted);font-weight:500;letter-spacing:.05em;">DILUENT</th>'
       +'<th style="text-align:left;padding:.45rem .6rem;color:var(--text-muted);font-weight:500;letter-spacing:.05em;">TRANSFER</th>'
       +'<th style="text-align:left;padding:.45rem .6rem;color:var(--text-muted);font-weight:500;letter-spacing:.05em;">'+concHeader+'</th>'
       +'<th style="text-align:left;padding:.45rem .6rem;color:var(--text-muted);font-weight:500;letter-spacing:.05em;">FOLD</th>';
  if(serMode==='plating') html+='<th style="text-align:left;padding:.45rem .6rem;color:var(--text-muted);font-weight:500;letter-spacing:.05em;">EXP. COLONIES</th>';
  html+='</tr></thead><tbody>';
  for(let i=1;i<=N;i++){
    const fromLbl = i===1 ? 'Stock' : 'Tube '+(i-1);
    html+='<tr style="border-bottom:1px solid var(--border);">'
         +'<td style="padding:.4rem .6rem;color:var(--text);font-weight:500;">Tube '+i+'</td>'
         +'<td style="padding:.4rem .6rem;color:var(--text-dim);">'+_serFmtVol(Vdil)+'</td>'
         +'<td style="padding:.4rem .6rem;color:var(--text-dim);">'+_serFmtVol(Vxfer)+' from '+fromLbl+'</td>'
         +'<td style="padding:.4rem .6rem;color:var(--accent);font-weight:600;">'+_serFmtConc(concs[i],serC0Unit)+'</td>'
         +'<td style="padding:.4rem .6rem;color:var(--text-muted);">1:'+_serFmtFold(Math.pow(f,i))+'</td>';
    if(serMode==='plating'){
      // Expected colonies if you plate serPlateVol µL of this tube
      // colonies = (cells/mL) × (plating volume in mL)
      const platedmL = serPlateVol/1000;
      const expCol = concs[i]*platedmL;
      let colColor='var(--text-dim)';
      let colNote='';
      if(expCol>=30 && expCol<=300){ colColor='#147888'; colNote=' \u2713'; }
      else if(expCol<30 && expCol>=1){ colColor='var(--text-muted)'; colNote=' (sparse)'; }
      else if(expCol<1){ colColor='var(--text-muted)'; colNote=' (none likely)'; }
      else if(expCol>300){ colColor='#a8580f'; colNote=' (TNTC)'; }
      html+='<td style="padding:.4rem .6rem;color:'+colColor+';font-weight:500;">'+_serFmtCount(expCol)+colNote+'</td>';
    }
    html+='</tr>';
  }
  html+='</tbody></table></div>';

  // Worked example for tube 1 — show C1V1 = C2V2
  const c1Display=_serFmtConc(concs[0],serC0Unit);
  const c2Display=_serFmtConc(concs[1],serC0Unit);
  html+='<div style="margin-top:.7rem;padding:.65rem .85rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;">'
       +'<div style="font-family:\'DM Mono\',monospace;font-size:.6rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.35rem;">Worked example — Tube 1</div>'
       +'<div style="font-family:\'DM Mono\',monospace;font-size:.78rem;color:var(--text-dim);line-height:1.7;">'
       +'C\u2081 V\u2081 = C\u2082 V\u2082 \u2192 ('+c1Display+')('+_serFmtVol(Vxfer)+') = ('+c2Display+')('+_serFmtVol(Vf)+')'
       +'<br>Add <b style="color:var(--accent2);">'+_serFmtVol(Vdil)+'</b> diluent to tube 1, then transfer <b style="color:var(--accent2);">'+_serFmtVol(Vxfer)+'</b> from stock and mix. Repeat for each subsequent tube.'
       +'</div></div>';

  // Plating section (only in plating mode)
  if(serMode==='plating'){
    html+='<div id="ser-plating-analysis"></div>';
  }

  proto.innerHTML=html;

  // Final fold label
  const finalFold=Math.pow(f,N);
  if(info){
    if(serMode==='plating'){
      info.innerHTML='<b style="color:var(--accent2)">Plating series:</b> '+N+' tubes, '+_serFmtFactor(f)+' steps, '+serPlateVol+' µL plated per plate. '
        +'<span style="color:var(--text-muted)">A plate is "countable" with <b>30–300 colonies</b> — too few = high statistical error, too many = TNTC. Enter your colony counts below to back-calculate the original CFU/mL.</span>';
    } else {
      info.innerHTML='<b style="color:var(--accent2)">Final tube</b> reaches a <b>1:'+_serFmtFold(finalFold)+'</b> dilution ('+_serFmtConc(concs[N],serC0Unit)+'). Each step transfers '+_serFmtVol(Vxfer)+' into '+_serFmtVol(Vdil)+' diluent for a total volume of '+_serFmtVol(Vf)+' per tube. <span style="color:var(--text-muted)">Tip: pre-aliquot diluent into all tubes first, then transfer sequentially with a fresh tip each time.</span>';
    }
  }

  // Render plating analysis (count inputs + back-calculation)
  if(serMode==='plating') drawSerialPlatingAnalysis();
}

function _serFmtCount(n){
  if(n===0) return '0';
  if(n>=1e6) return n.toExponential(1);
  if(n>=10000) return Math.round(n).toLocaleString();
  if(n>=100) return Math.round(n).toString();
  if(n>=10) return n.toFixed(1);
  if(n>=1) return n.toFixed(1);
  if(n>=0.01) return n.toFixed(2);
  return n.toExponential(1);
}

function drawSerialPlatingAnalysis(){
  const container=document.getElementById('ser-plating-analysis');
  if(!container) return;
  const N=serNTubes, f=serFactor;
  const concs=[];
  for(let i=0;i<=N;i++) concs.push(serC0/Math.pow(f,i));
  const platedmL = serPlateVol/1000;

  // Build the "enter your counts" UI: a row of small inputs, one per tube (1..N)
  let html='<div style="margin-top:.85rem;padding:.7rem .85rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;">';
  html+='<div style="font-family:\'DM Mono\',monospace;font-size:.6rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;">'
       +'<span>Plate counts \u2014 enter colonies counted</span>'
       +'<button onclick="clearSerialCounts()" style="font-family:inherit;font-size:.55rem;color:var(--text-muted);background:transparent;border:1px solid var(--border);border-radius:3px;padding:.2rem .5rem;cursor:pointer;letter-spacing:.05em;">Clear all</button>'
       +'</div>';
  html+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:.5rem;">';
  for(let i=1;i<=N;i++){
    const expColi=concs[i]*platedmL;
    let chipColor='var(--text-muted)';
    let chipBg='var(--surface2)';
    if(expColi>=30&&expColi<=300){ chipColor='#147888'; chipBg='rgba(20,120,136,.08)'; }
    else if(expColi>300){ chipColor='#a8580f'; chipBg='rgba(168,88,15,.06)'; }
    const v=serCounts[i]!==undefined?serCounts[i]:'';
    html+='<div style="background:'+chipBg+';border:1px solid var(--border);border-radius:5px;padding:.4rem .5rem;display:flex;flex-direction:column;gap:.2rem;">'
         +'<div style="font-family:\'DM Mono\',monospace;font-size:.55rem;color:'+chipColor+';display:flex;justify-content:space-between;align-items:center;letter-spacing:.05em;">'
         +'<span>Tube '+i+' \u2022 1:'+_serFmtFold(Math.pow(f,i))+'</span>'
         +(expColi>=30&&expColi<=300?'<span title="In countable range">\u2713</span>':'')
         +'</div>'
         +'<input type="number" min="0" step="1" placeholder="exp. ~'+_serFmtCount(expColi)+'" value="'+v+'" oninput="setSerialCount('+i+',this.value)" style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:.3rem .4rem;font-family:\'DM Mono\',monospace;font-size:.78rem;color:var(--text);outline:none;" />'
         +'</div>';
  }
  html+='</div>';

  // Back-calculation block
  // For each tube with a count, CFU/mL_original = colonies / (plating_vol_mL × dilution_factor_at_that_tube)
  // dilution_factor_at_that_tube = 1/f^i (so colonies/(platedmL × f^-i) = colonies × f^i / platedmL)
  const calcs=[];
  for(let i=1;i<=N;i++){
    if(serCounts[i]==null||serCounts[i]<0) continue;
    const cnt=serCounts[i];
    const fold=Math.pow(f,i);
    const cfuPerML = (cnt/platedmL)*fold;
    const inCountable = cnt>=30 && cnt<=300;
    calcs.push({tube:i, count:cnt, fold, cfuPerML, inCountable});
  }
  const countable=calcs.filter(c=>c.inCountable);
  if(calcs.length>0){
    html+='<div style="margin-top:.7rem;padding-top:.65rem;border-top:1px dashed var(--border);">';
    html+='<div style="font-family:\'DM Mono\',monospace;font-size:.6rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem;">Back-calculated CFU / mL</div>';
    html+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:.5rem;">';
    for(const c of calcs){
      const tagColor = c.inCountable ? '#147888' : (c.count<30 ? '#a8580f' : '#9a3a3a');
      const tagText  = c.inCountable ? '\u2713 countable' : (c.count<30 ? 'sparse \u2014 high error' : 'TNTC \u2014 unreliable');
      html+='<div style="background:var(--surface2);border:1px solid var(--border);border-left:3px solid '+tagColor+';border-radius:5px;padding:.5rem .6rem;">'
           +'<div style="font-family:\'DM Mono\',monospace;font-size:.55rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.2rem;">Tube '+c.tube+' \u2022 1:'+_serFmtFold(c.fold)+'</div>'
           +'<div style="font-family:\'DM Mono\',monospace;font-size:.92rem;color:'+tagColor+';font-weight:600;line-height:1.2;">'+_serFmtSci(c.cfuPerML)+'</div>'
           +'<div style="font-family:\'DM Mono\',monospace;font-size:.6rem;color:'+tagColor+';margin-top:.2rem;">'+tagText+'</div>'
           +'<div style="font-family:\'DM Mono\',monospace;font-size:.58rem;color:var(--text-muted);margin-top:.2rem;line-height:1.45;">'+c.count+' col \u00D7 '+_serFmtFold(c.fold)+' / '+platedmL.toFixed(3)+' mL</div>'
           +'</div>';
    }
    html+='</div>';

    // Best estimate from countable plates (geometric mean if >1, else just the one)
    if(countable.length>0){
      let geoMean;
      if(countable.length===1) geoMean=countable[0].cfuPerML;
      else {
        const sumLog=countable.reduce((a,c)=>a+Math.log(c.cfuPerML),0);
        geoMean=Math.exp(sumLog/countable.length);
      }
      // Total CFU in original tube (V₀ = the volume of stock you started from; we'll assume "1 mL" recovery for transformation case
      // but really we don't know V₀, so present per-mL as the canonical answer
      html+='<div style="margin-top:.7rem;padding:.65rem .8rem;background:rgba(20,120,136,.06);border:1px solid rgba(20,120,136,.3);border-radius:5px;">'
           +'<div style="font-family:\'DM Mono\',monospace;font-size:.55rem;color:#147888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.25rem;font-weight:600;">Best estimate '+(countable.length>1?'(geometric mean of '+countable.length+' countable plates)':'(from 1 countable plate)')+'</div>'
           +'<div style="font-family:\'DM Mono\',monospace;font-size:1.1rem;color:#147888;font-weight:700;line-height:1.2;">'+_serFmtSci(geoMean)+' CFU/mL</div>';
      // Transformation efficiency, if DNA mass given
      if(serDnaMass!==null && serDnaMass>0){
        // Conventional: transformation efficiency = total CFU / µg DNA
        // Assume 1 mL of recovery culture (standard for transformation: SOC outgrowth volume)
        // -- but better: students plate FROM the recovery, and CFU/mL × recovery_mL = total CFU
        // We'll show CFU/µg using 1 mL recovery as the assumption, and clearly note it
        const cfuPerUg = geoMean * 1.0 / (serDnaMass/1000); // ×1 mL recovery, ÷ µg DNA
        html+='<div style="margin-top:.45rem;padding-top:.45rem;border-top:1px solid rgba(20,120,136,.2);">'
             +'<div style="font-family:\'DM Mono\',monospace;font-size:.55rem;color:#147888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem;font-weight:600;">Transformation efficiency</div>'
             +'<div style="font-family:\'DM Mono\',monospace;font-size:.92rem;color:#147888;font-weight:700;line-height:1.2;">'+_serFmtSci(cfuPerUg)+' CFU / µg DNA</div>'
             +'<div style="font-family:\'DM Mono\',monospace;font-size:.58rem;color:var(--text-muted);margin-top:.25rem;line-height:1.45;">= '+_serFmtSci(geoMean)+' CFU/mL \u00D7 1.0 mL recovery / '+(serDnaMass/1000)+' µg DNA. <i>Adjust numerator if your recovery volume \u2260 1 mL.</i> Typical chemically-competent <i>E. coli</i>: 10\u2078\u201310\u2079 CFU/µg.</div>'
             +'</div>';
      }
      html+='</div>';
    } else if(calcs.length>0){
      html+='<div style="margin-top:.7rem;padding:.55rem .8rem;background:rgba(168,88,15,.06);border:1px solid rgba(168,88,15,.3);border-radius:5px;font-family:\'DM Mono\',monospace;font-size:.66rem;color:var(--text-dim);line-height:1.5;">'
           +'<b style="color:#a8580f;">\u26A0 No plate in the 30\u2013300 range.</b> Counts outside this range have high statistical error (sparse) or are uncountable (TNTC). Repeat with adjusted dilutions, or use the C\u2080 input above to predict which tubes will land in range.'
           +'</div>';
    }
    html+='</div>';
  }

  html+='</div>';
  container.innerHTML=html;
}

function clearSerialCounts(){
  serCounts={};
  drawSerialPlatingAnalysis();

function _serFmtSci(n){
  // Format CFU/mL etc — always scientific notation (these numbers span many orders of magnitude)
  if(n===0||!isFinite(n)) return '0';
  if(n>=1e4 || n<0.01) return n.toExponential(2);
  if(n>=100) return Math.round(n).toLocaleString();
  return n.toPrecision(3);
}

function _subscript(n){
  const map={0:'\u2080',1:'\u2081',2:'\u2082',3:'\u2083',4:'\u2084',5:'\u2085',6:'\u2086',7:'\u2087',8:'\u2088',9:'\u2089'};
  return String(n).split('').map(d=>map[d]||d).join('');
}
function _serFmtFold(x){
  if(x>=1e6) return x.toExponential(1);
  if(x>=1000) return Math.round(x).toLocaleString();
  if(Number.isInteger(x)) return ''+x;
  return x.toFixed(x>=100?0:x>=10?1:2);
}
function _serFmtFactor(f){
  if(Number.isInteger(f)) return '1:'+f;
  return '1:'+f.toFixed(2);
}
