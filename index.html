function setAbsMode(m){
  absMode=m;
  document.querySelectorAll('[id^=abs-mode-]').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('abs-mode-'+m);
  if(btn)btn.classList.add('active');
  // Toggle E1% input visibility
  const wrap=document.getElementById('abs-protein-ext-wrap');
  if(wrap)wrap.style.display=m==='protein'?'':'none';
  // Set sensible default values per mode (clean preset)
  setAbsPreset('clean');
}

function setAbsPreset(kind){
  const targets=ABS_TARGETS[absMode];
  // Pick a base A260 and derive others from target ratios
  if(absMode==='protein'){
    // For protein, A280 is the dominant. Use a clean ratio of ~0.57 (A260/A280)
    // base on a moderate A280 ~1.0
    if(kind==='clean'){
      absA280=1.0; absA260=0.57; absA230=0.50;
    } else if(kind==='protein'){
      absA280=1.0; absA260=0.55; absA230=0.45;
    } else if(kind==='phenol'){
      absA280=1.0; absA260=0.85; absA230=0.40;   // contamination raises A260
    } else if(kind==='salt'){
      absA280=1.0; absA260=0.60; absA230=0.95;   // salt elevates A230
    }
  } else {
    // Nucleic acids — base on A260 ~ 0.5
    const base=0.5;
    absA260=base;
    if(kind==='clean'){
      absA280=base/targets.a260a280;
      absA230=base/targets.a260a230;
    } else if(kind==='protein'){
      // protein contamination → elevated A280 (lower 260/280 ratio, e.g. ~1.5)
      absA280=base/1.5;
      absA230=base/2.0;
    } else if(kind==='phenol'){
      // phenol/guanidinium → elevated A230 (low 260/230 ratio, e.g. ~1.0)
      absA280=base/targets.a260a280;
      absA230=base/1.0;
    } else if(kind==='salt'){
      // salt/EDTA/sugar → elevated A230, moderate effect
      absA280=base/targets.a260a280;
      absA230=base/1.4;
    }
  }
  // Update slider DOM if visible
  const a260=document.getElementById('abs-a260'); if(a260){a260.value=absA260; document.getElementById('abs-a260-v').textContent=absA260.toFixed(3);}
  const a280=document.getElementById('abs-a280'); if(a280){a280.value=absA280; document.getElementById('abs-a280-v').textContent=absA280.toFixed(3);}
  const a230=document.getElementById('abs-a230'); if(a230){a230.value=absA230; document.getElementById('abs-a230-v').textContent=absA230.toFixed(3);}
  drawAbs();
}

function drawAbs(){
  const area=document.getElementById('abs-svg-area');
  const res=document.getElementById('abs-results');
  const info=document.getElementById('abs-info');
  if(!area||!res)return;

  const ratio280 = absA280>0 ? absA260/absA280 : 0;
  const ratio230 = absA230>0 ? absA260/absA230 : 0;

  // ── Build a simulated spectrum from the three measured points (220–340 nm) ──
  // Strategy: model the spectrum as a weighted sum of smooth basis chromophores
  // (nucleic acid peak ~260, aromatic/Trp peak ~280, salt/phenol peak ~230) plus
  // a low-wavelength end-absorption term. We solve a 3×3 linear system for the
  // basis amplitudes that exactly match the user's A230/A260/A280 sliders, then
  // evaluate the smooth combined curve at every wavelength. This makes a single
  // slider gracefully reshape the entire curve rather than lifting a flat segment.
  const wlMin=220, wlMax=340;

  // Gaussian helper: peak=1 at center, FWHM ~ 2.355*sigma
  function gauss(wl, center, sigma){
    const d=(wl-center)/sigma;
    return Math.exp(-0.5*d*d);
  }
  // Asymmetric peak: wider on the long-wavelength side (more realistic for aromatic peaks)
  function asymGauss(wl, center, sigmaL, sigmaR){
    const sigma = wl<center ? sigmaL : sigmaR;
    const d=(wl-center)/sigma;
    return Math.exp(-0.5*d*d);
  }

  // Basis chromophores — each evaluated as a smooth function of wavelength.
  // Tuned so that pure samples give the canonical diagnostic ratios:
  //   pure NA:      A260/A280 = 1.79,  A260/A230 = 2.04
  //   pure protein: A260/A280 = 0.56
  //   pure salt:    A260/A230 = 0.07
  // B_NA: nucleic acid (peak 260 with broad 240-280 shoulder + 230 component)
  // B_PR: aromatic protein (peak ~278 from Trp/Tyr + 260 contribution + peptide tail)
  // B_SP: salt/phenol/EDTA-like (peak 230, sharp drop)
  function B_NA(wl){
    return gauss(wl,260,15) + 0.20*gauss(wl,283,12) + 0.40*gauss(wl,232,14);
  }
  function B_PR(wl){
    return asymGauss(wl,278,9,11) + 0.40*gauss(wl,260,12) + 0.50*gauss(wl,225,18);
  }
  function B_SP(wl){
    return asymGauss(wl,230,8,10) + 0.08*gauss(wl,250,14);
  }

  // Sample basis functions at the three diagnostic wavelengths to build the matrix
  // [ B_NA(230) B_PR(230) B_SP(230) ] [α]   [A230]
  // [ B_NA(260) B_PR(260) B_SP(260) ] [β] = [A260]
  // [ B_NA(280) B_PR(280) B_SP(280) ] [γ]   [A280]
  const M=[
    [B_NA(230), B_PR(230), B_SP(230)],
    [B_NA(260), B_PR(260), B_SP(260)],
    [B_NA(280), B_PR(280), B_SP(280)],
  ];
  const b=[absA230, absA260, absA280];
  // Solve via Cramer's rule (3×3 — fast and avoids dependencies)
  function det3(m){
    return m[0][0]*(m[1][1]*m[2][2]-m[1][2]*m[2][1])
         - m[0][1]*(m[1][0]*m[2][2]-m[1][2]*m[2][0])
         + m[0][2]*(m[1][0]*m[2][1]-m[1][1]*m[2][0]);
  }
  const D = det3(M);
  let alpha=0, beta=0, gamma=0;
  if(Math.abs(D)>1e-12){
    const Mx = M.map((row,i)=>[b[i], row[1], row[2]]);
    const My = M.map((row,i)=>[row[0], b[i], row[2]]);
    const Mz = M.map((row,i)=>[row[0], row[1], b[i]]);
    alpha = det3(Mx)/D;
    beta  = det3(My)/D;
    gamma = det3(Mz)/D;
  }

  // Evaluate combined curve at every sample wavelength
  const samples=[];
  const sampleN=240;
  for(let i=0;i<=sampleN;i++){
    const wl=wlMin+(wlMax-wlMin)*i/sampleN;
    const A = alpha*B_NA(wl) + beta*B_PR(wl) + gamma*B_SP(wl);
    samples.push({wl, A:Math.max(0,A)});
  }

  // ── SVG plot ──
  const pw=560, ph=190, pad={l:48,r:18,t:14,b:34};
  const NS='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(NS,'svg');
  svg.setAttribute('viewBox',`0 0 ${pw} ${ph}`);
  svg.setAttribute('width','100%');
  svg.style.cssText='max-width:100%;height:auto;display:block;max-height:240px;';
  function el(tag,attrs,parent){
    const n=document.createElementNS(NS,tag);
    if(attrs)Object.entries(attrs).forEach(([k,v])=>n.setAttribute(k,String(v)));
    (parent||svg).appendChild(n); return n;
  }
  function txt(x,y,s,color,size,weight,anchor,parent){
    const t=el('text',{x,y,'text-anchor':anchor||'middle','font-size':size||9,fill:color||'var(--text-muted)','font-family':'DM Mono,monospace','font-weight':weight||'400'},parent);
    t.textContent=s; return t;
  }

  // axes / grid
  const yMax=Math.max(0.5, Math.ceil(Math.max(absA260,absA280,absA230, ...samples.map(s=>s.A))*2)/2);
  const xToPx=wl=>pad.l+(wl-wlMin)/(wlMax-wlMin)*(pw-pad.l-pad.r);
  const yToPx=A=>pad.t+(1-A/yMax)*(ph-pad.t-pad.b);

  // Plot background panel
  el('rect',{x:pad.l,y:pad.t,width:pw-pad.l-pad.r,height:ph-pad.t-pad.b,fill:'rgba(243,241,236,.35)',stroke:'var(--border)','stroke-width':1});

  // y gridlines
  const ySteps=Math.round(yMax/0.25);
  for(let i=0;i<=ySteps;i++){
    const A=i*0.25; if(A>yMax+1e-6) break;
    const y=yToPx(A);
    el('line',{x1:pad.l,y1:y,x2:pw-pad.r,y2:y,stroke:'var(--border)','stroke-width':0.5,'stroke-dasharray':'2,3'});
    txt(pad.l-6,y+3,A.toFixed(2),'var(--text-muted)',8,'400','end');
  }
  // x gridlines (every 20 nm)
  for(let wl=220;wl<=340;wl+=20){
    const x=xToPx(wl);
    el('line',{x1:x,y1:pad.t,x2:x,y2:ph-pad.b,stroke:'var(--border)','stroke-width':0.5,'stroke-dasharray':'2,3'});
    txt(x,ph-pad.b+12,wl,'var(--text-muted)',8,'400');
  }

  // Curve
  let pathD='';
  samples.forEach((s,i)=>{ pathD+=(i===0?'M':'L')+' '+xToPx(s.wl)+' '+yToPx(s.A)+' '; });
  // Fill under curve (subtle)
  const fillD=pathD+' L '+xToPx(samples[samples.length-1].wl)+' '+yToPx(0)+' L '+xToPx(samples[0].wl)+' '+yToPx(0)+' Z';
  el('path',{d:fillD, fill:'rgba(231,117,0,.10)', stroke:'none'});
  el('path',{d:pathD, fill:'none', stroke:'var(--accent)','stroke-width':2,'stroke-linejoin':'round','stroke-linecap':'round'});

  // Markers at 230, 260, 280
  function marker(wl,A,color,label){
    const x=xToPx(wl), y=yToPx(A);
    el('line',{x1:x,y1:y,x2:x,y2:ph-pad.b,stroke:color,'stroke-width':1,'stroke-dasharray':'3,2','opacity':.7});
    el('circle',{cx:x,cy:y,r:4,fill:color,stroke:'var(--surface)','stroke-width':1.5});
    txt(x,pad.t+10,label,color,9.5,'700');
    txt(x,pad.t+22,A.toFixed(3),color,8.5,'500');
  }
  marker(230,absA230,'#147888','230');
  marker(260,absA260,'#E77500','260');
  marker(280,absA280,'#5f378c','280');

  // y-axis label
  txt(14, pad.t+(ph-pad.t-pad.b)/2, 'Absorbance', 'var(--text-muted)',9,'500','middle',svg).setAttribute('transform',`rotate(-90 14 ${pad.t+(ph-pad.t-pad.b)/2})`);
  // x-axis label
  txt(pad.l+(pw-pad.l-pad.r)/2, ph-2, 'Wavelength (nm)', 'var(--text-muted)',9,'500');

  area.innerHTML='';
  area.appendChild(svg);

  // ── Results: ratios + concentration ──
  const tgt280=ABS_TARGETS[absMode].a260a280;
  const tgt230=ABS_TARGETS[absMode].a260a230;
  const purity280=_purityVerdict(ratio280, tgt280, absMode);
  const purity230=tgt230!==null ? _purityVerdict230(ratio230) : {label:'—', color:'var(--text-muted)', detail:'Not typically used for protein samples'};

  // Concentration
  let concStr='', concDetail='';
  if(absMode==='protein'){
    // c (mg/mL) = A280 / (E1% * path)  (using E1% = E0.1% in dL/(g·cm) convention; here using E1% per 1 mg/mL · cm)
    const c_mgml = absA280/(absExtCoef*absPath);
    concStr=c_mgml>=1?c_mgml.toFixed(2)+' mg/mL':(c_mgml*1000).toFixed(2)+' µg/mL';
    concDetail=`A\u2082\u2088\u2080 / (E\u00B9% · path) = ${absA280.toFixed(3)} / (${absExtCoef} · ${absPath} cm)`;
  } else {
    const factor=ABS_FACTORS[absMode]; // µg/mL per A260
    const c_ugml = absA260*factor/absPath;
    concStr=c_ugml>=1000?(c_ugml/1000).toFixed(2)+' mg/mL':c_ugml.toFixed(1)+' µg/mL';
    concDetail=`A\u2082\u2086\u2080 \u00D7 ${factor} / path = ${absA260.toFixed(3)} \u00D7 ${factor} / ${absPath} cm`;
  }

  let html='';
  html+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:.6rem;margin-bottom:.5rem;">';
  // Conc card
  html+='<div style="background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:6px;padding:.55rem .7rem;">'
       +'<div style="font-family:\'DM Mono\',monospace;font-size:.55rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem;">Concentration</div>'
       +'<div style="font-family:\'DM Mono\',monospace;font-size:1.05rem;color:var(--accent);font-weight:600;line-height:1.2;">'+concStr+'</div>'
       +'<div style="font-family:\'DM Mono\',monospace;font-size:.6rem;color:var(--text-muted);margin-top:.25rem;line-height:1.4;">'+concDetail+'</div>'
       +'</div>';
  // A260/A280 card
  html+='<div style="background:var(--surface2);border:1px solid var(--border);border-left:3px solid '+purity280.color+';border-radius:6px;padding:.55rem .7rem;">'
       +'<div style="font-family:\'DM Mono\',monospace;font-size:.55rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem;">A\u2082\u2086\u2080 / A\u2082\u2088\u2080</div>'
       +'<div style="display:flex;align-items:baseline;gap:.4rem;"><span style="font-family:\'DM Mono\',monospace;font-size:1.05rem;color:'+purity280.color+';font-weight:600;line-height:1.2;">'+ratio280.toFixed(2)+'</span><span style="font-family:\'DM Mono\',monospace;font-size:.7rem;color:var(--text-muted);">target ~'+(tgt280?tgt280.toFixed(2):'—')+'</span></div>'
       +'<div style="font-family:\'DM Mono\',monospace;font-size:.62rem;color:'+purity280.color+';margin-top:.25rem;font-weight:500;">'+purity280.label+'</div>'
       +'<div style="font-family:\'DM Mono\',monospace;font-size:.6rem;color:var(--text-muted);margin-top:.15rem;line-height:1.4;">'+purity280.detail+'</div>'
       +'</div>';
  // A260/A230 card
  html+='<div style="background:var(--surface2);border:1px solid var(--border);border-left:3px solid '+purity230.color+';border-radius:6px;padding:.55rem .7rem;">'
       +'<div style="font-family:\'DM Mono\',monospace;font-size:.55rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem;">A\u2082\u2086\u2080 / A\u2082\u2083\u2080</div>'
       +'<div style="display:flex;align-items:baseline;gap:.4rem;"><span style="font-family:\'DM Mono\',monospace;font-size:1.05rem;color:'+purity230.color+';font-weight:600;line-height:1.2;">'+(absA230>0?ratio230.toFixed(2):'—')+'</span><span style="font-family:\'DM Mono\',monospace;font-size:.7rem;color:var(--text-muted);">target &gt; 2.0</span></div>'
       +'<div style="font-family:\'DM Mono\',monospace;font-size:.62rem;color:'+purity230.color+';margin-top:.25rem;font-weight:500;">'+purity230.label+'</div>'
       +'<div style="font-family:\'DM Mono\',monospace;font-size:.6rem;color:var(--text-muted);margin-top:.15rem;line-height:1.4;">'+purity230.detail+'</div>'
       +'</div>';
  html+='</div>';

  // Beer-Lambert reminder
  html+='<div style="padding:.55rem .7rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;font-family:\'DM Mono\',monospace;font-size:.7rem;color:var(--text-dim);line-height:1.65;">'
       +'<span style="color:var(--text-muted);font-size:.55rem;text-transform:uppercase;letter-spacing:.08em;font-weight:600;">Beer\u2013Lambert</span><br>'
       +'A = \u03B5 \u00B7 c \u00B7 \u2113 — '+(absMode==='protein'
         ? 'For protein, c (mg/mL) = A\u2082\u2088\u2080 / (E\u00B9% \u00B7 \u2113). Common E\u00B9% values: BSA \u2248 6.6, IgG \u2248 13.7, generic protein \u2248 10. <a style="color:var(--accent);text-decoration:none;" href="#mwpi" onclick="event.preventDefault();selectTool(\'mwpi\');">Compute E from sequence \u2192</a>'
         : 'For '+absMode+', c (µg/mL) = A\u2082\u2086\u2080 \u00D7 '+ABS_FACTORS[absMode]+' / \u2113. NanoDrop: \u2113 = 0.1 cm; standard cuvette: \u2113 = 1 cm.')
       +'</div>';

  res.innerHTML=html;

  if(info){
    const expectedNote=absMode==='protein'
      ? 'Pure protein has A\u2082\u2086\u2080/A\u2082\u2088\u2080 \u2248 0.57 (low 260 because nucleotide tails are absent). High 260/280 \u2192 nucleic acid contamination.'
      : 'Pure '+absMode+' has A\u2082\u2086\u2080/A\u2082\u2088\u2080 \u2248 '+tgt280.toFixed(2)+' and A\u2082\u2086\u2080/A\u2082\u2083\u2080 &gt; 2.0. Low 260/280 \u2192 protein contamination; low 260/230 \u2192 phenol/guanidinium/EDTA carryover.';
    info.innerHTML='<b style="color:var(--accent2)">Sample:</b> '+absMode+' &middot; '+expectedNote;
  }
}

function _purityVerdict(r, target, mode){
  if(mode==='protein'){
    // For protein: target ~0.57; high ratio = nucleic-acid contamination
    if(r<0.6) return {label:'\u2713 Pure protein', color:'#147888', detail:'A\u2082\u2086\u2080/A\u2082\u2088\u2080 below 0.6 indicates minimal nucleic acid contamination.'};
    if(r<0.8) return {label:'\u26A0 Slight NA contamination', color:'#a8580f', detail:'Elevated 260 absorbance suggests some nucleic acid carryover.'};
    return {label:'\u2717 Significant NA contamination', color:'#9a3a3a', detail:'High A\u2082\u2086\u2080 relative to A\u2082\u2088\u2080 \u2014 nucleic acids are inflating the reading.'};
  }
  // Nucleic acid
  const lo=target-0.1, hi=target+0.15;
  if(r>=lo && r<=hi) return {label:'\u2713 Pure '+mode, color:'#147888', detail:'A\u2082\u2086\u2080/A\u2082\u2088\u2080 in the expected range \u2014 minimal protein contamination.'};
  if(r<lo){
    if(r<1.5) return {label:'\u2717 Significant protein contamination', color:'#9a3a3a', detail:'Low ratio \u2014 protein is absorbing strongly at 280.'};
    return {label:'\u26A0 Some protein contamination', color:'#a8580f', detail:'Slightly low ratio \u2014 trace protein contamination likely.'};
  }
  // r > hi
  return {label:'\u26A0 Possible RNA contamination', color:'#a8580f', detail:'Higher than expected \u2014 RNA contamination or measurement noise at low concentration.'};
}

function _purityVerdict230(r){
  if(r>=2.0 && r<=2.4) return {label:'\u2713 Clean', color:'#147888', detail:'Above 2.0 \u2014 minimal phenol/guanidinium/salt carryover.'};
  if(r>=1.8 && r<2.0) return {label:'\u26A0 Borderline', color:'#a8580f', detail:'Slightly low \u2014 trace phenol, guanidinium, EDTA, or carbohydrate.'};
  if(r<1.8) return {label:'\u2717 Contamination at 230', color:'#9a3a3a', detail:'Low ratio \u2014 phenol, TRIzol, guanidinium thiocyanate, EDTA, or polysaccharides absorbing strongly at 230.'};
  return {label:'\u26A0 Unusually high', color:'#a8580f', detail:'A\u2082\u2083\u2080 may be very low (low concentration) \u2014 ratio less reliable.'};
}

// ============================================================
// BUFFER pH (HENDERSON-HASSELBALCH)
// ============================================================
// Common biological buffer systems with their pKa at 25°C and useful pH range.
// pKa values from Good et al. (1966) and standard biochem references.
// prepStyle: 'mix' = both forms are stable salts/solutions, mix at calculated ratio.
//            'titrate' = one form is dominant in stock, titrate to pH with strong acid/base.
const BUFFER_SYSTEMS={
  tris:      {label:'Tris-HCl',           pKa:8.06, range:[7.0,9.0], acidName:'Tris·HCl',          baseName:'Tris base',        prepStyle:'titrate', titrant:'HCl', stockForm:'base', note:'Most common protein buffer. Note: pKa drops ~0.03/°C with rising temperature — adjust pH at the working temperature.'},
  phosphate: {label:'Sodium Phosphate',   pKa:7.20, range:[6.2,8.2], acidName:'NaH₂PO₄ (monobasic)', baseName:'Na₂HPO₄ (dibasic)', prepStyle:'mix',     note:'Second pKa of phosphoric acid. PBS is a phosphate buffer. Avoid with Ca²⁺/Mg²⁺ (precipitates).'},
  acetate:   {label:'Sodium Acetate',     pKa:4.76, range:[3.6,5.6], acidName:'Acetic acid',        baseName:'Sodium acetate',    prepStyle:'mix',     note:'Standard mildly acidic buffer. Used in nucleic acid precipitation, protein crystallography.'},
  hepes:     {label:'HEPES',              pKa:7.55, range:[6.8,8.2], acidName:'HEPES (free acid)',  baseName:'HEPES sodium salt', prepStyle:'titrate', titrant:'NaOH', stockForm:'acid', note:"Good's buffer — minimal metal binding, biologically inert. Common for cell culture."},
  mes:       {label:'MES',                pKa:6.10, range:[5.5,6.7], acidName:'MES (free acid)',    baseName:'MES sodium salt',   prepStyle:'titrate', titrant:'NaOH', stockForm:'acid', note:"Good's buffer for slightly acidic pH. Common in plant biology, low-pH cell work."},
  bicarbonate:{label:'Bicarbonate (CO₂)', pKa:6.35, range:[5.5,7.5], acidName:'H₂CO₃ / CO₂(aq)',   baseName:'NaHCO₃',           prepStyle:'mix',     note:'Open to atmospheric CO₂; pH drifts unless equilibrated. Cell culture media use ~5% CO₂ atmosphere.'},
  custom:    {label:'Custom',             pKa:7.0,  range:[5.0,9.0], acidName:'HA (acid form)',     baseName:'A⁻ (conjugate base)', prepStyle:'mix',  note:'Enter your own pKa. The useful buffering range is pKa ± 1.'}
};

let bufSystem='tris';        // active buffer key
let bufTargetPH=7.4;          // target pH
let bufTotalConc=50;          // target buffer concentration in mM
let bufVolumeML=500;          // buffer volume in mL
let bufStockM=1.0;            // stock solution concentration (M) — student dilutes from this
let bufCustomPKa=7.0;         // custom pKa when system='custom'

function renderBufferPanel(){
  const p=document.getElementById('right-panel');
  p.innerHTML=`<div class="vp-header"><div class="vp-title">Buffer pH</div><div class="vp-desc">Mix the right ratio of weak acid + conjugate base to hit a target pH using the Henderson–Hasselbalch equation. Pick a buffer system below, set the target pH, and see the recipe.</div></div>
<div class="vp-controls" style="gap:.4rem;flex-wrap:wrap;">
  <span style="font-family:'DM Mono',monospace;font-size:.62rem;color:var(--text-muted);margin-right:.2rem;">Buffer system:</span>
  ${Object.entries(BUFFER_SYSTEMS).map(([k,v])=>`<button class="vp-btn${k===bufSystem?' active':''}" id="buf-sys-${k}" onclick="setBufferSystem('${k}')">${v.label}</button>`).join('')}
</div>
<div style="padding:.8rem 1.4rem;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface);display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:.7rem .9rem;align-items:end;">
  <div>
    <div style="font-size:.65rem;color:var(--text-muted);margin-bottom:.2rem;font-family:'DM Mono',monospace;letter-spacing:.04em;">TARGET pH</div>
    <input id="buf-ph" type="number" min="0" max="14" step="0.1" value="${bufTargetPH}" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:.4rem .5rem;font-family:'DM Mono',monospace;font-size:.85rem;color:var(--text);outline:none;" oninput="bufTargetPH=Math.max(0,Math.min(14,+this.value||0));drawBuffer()">
  </div>
  <div>
    <div style="font-size:.65rem;color:var(--text-muted);margin-bottom:.2rem;font-family:'DM Mono',monospace;letter-spacing:.04em;">TOTAL CONC.</div>
    <div style="display:flex;gap:.3rem;align-items:center;">
      <input id="buf-total" type="number" min="0" step="any" value="${bufTotalConc}" style="flex:1;min-width:0;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:.4rem .5rem;font-family:'DM Mono',monospace;font-size:.85rem;color:var(--text);outline:none;" oninput="bufTotalConc=Math.max(0,+this.value||0);drawBuffer()">
      <span style="font-family:'DM Mono',monospace;font-size:.62rem;color:var(--text-muted);flex-shrink:0;">mM</span>
    </div>
  </div>
  <div>
    <div style="font-size:.65rem;color:var(--text-muted);margin-bottom:.2rem;font-family:'DM Mono',monospace;letter-spacing:.04em;">FINAL VOLUME</div>
    <div style="display:flex;gap:.3rem;align-items:center;">
      <input id="buf-vol" type="number" min="0" step="any" value="${bufVolumeML}" style="flex:1;min-width:0;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:.4rem .5rem;font-family:'DM Mono',monospace;font-size:.85rem;color:var(--text);outline:none;" oninput="bufVolumeML=Math.max(0,+this.value||0);drawBuffer()">
      <span style="font-family:'DM Mono',monospace;font-size:.62rem;color:var(--text-muted);flex-shrink:0;">mL</span>
    </div>
  </div>
  <div>
    <div style="font-size:.65rem;color:var(--text-muted);margin-bottom:.2rem;font-family:'DM Mono',monospace;letter-spacing:.04em;">STOCK CONC.</div>
    <select id="buf-stock" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:.4rem .5rem;font-family:'DM Mono',monospace;font-size:.78rem;color:var(--text);outline:none;" onchange="bufStockM=+this.value;drawBuffer()">
      <option value="0.5"${bufStockM===0.5?' selected':''}>0.5 M</option>
      <option value="1"${bufStockM===1?' selected':''}>1 M</option>
      <option value="2"${bufStockM===2?' selected':''}>2 M</option>
      <option value="3"${bufStockM===3?' selected':''}>3 M</option>
    </select>
  </div>
  <div id="buf-pka-wrap" style="${bufSystem==='custom'?'':'display:none;'}">
    <div style="font-size:.65rem;color:var(--text-muted);margin-bottom:.2rem;font-family:'DM Mono',monospace;letter-spacing:.04em;">CUSTOM pKa</div>
    <input id="buf-pka" type="number" min="0" max="14" step="0.01" value="${bufCustomPKa}" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:.4rem .5rem;font-family:'DM Mono',monospace;font-size:.85rem;color:var(--text);outline:none;" oninput="bufCustomPKa=Math.max(0,Math.min(14,+this.value||0));drawBuffer()">
  </div>
</div>
<div style="flex:1;overflow-y:auto;padding:0;min-height:0;">
  <div id="buf-result" style="padding:.7rem 1.4rem .3rem;"></div>
  <div id="buf-curve" style="padding:.3rem 1.4rem .8rem;background:var(--surface);"></div>
</div>
<div id="buf-info" style="padding:.55rem 1.4rem;border-top:1px solid var(--border);flex-shrink:0;font-size:.66rem;line-height:1.55;color:var(--text-muted);"></div>`;
  drawBuffer();
}

function setBufferSystem(k){
  if(!BUFFER_SYSTEMS[k]) return;
  bufSystem=k;
  document.querySelectorAll('[id^=buf-sys-]').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('buf-sys-'+k);
  if(btn)btn.classList.add('active');
  // Show/hide custom pKa input
  const wrap=document.getElementById('buf-pka-wrap');
  if(wrap) wrap.style.display = k==='custom' ? '' : 'none';
  // Snap target pH to mid-range of new system if it's currently outside the buffer range
  const sys=BUFFER_SYSTEMS[k];
  if(bufTargetPH<sys.range[0] || bufTargetPH>sys.range[1]){
    bufTargetPH=Math.round(sys.pKa*10)/10;
    const phInput=document.getElementById('buf-ph');
    if(phInput) phInput.value=bufTargetPH;
  }
  drawBuffer();
}

function drawBuffer(){
  const sys=BUFFER_SYSTEMS[bufSystem];
  const pKa = bufSystem==='custom' ? bufCustomPKa : sys.pKa;
  const pH = bufTargetPH;
  // Henderson–Hasselbalch: pH = pKa + log10([A⁻]/[HA])
  // ratio R = [A⁻]/[HA] = 10^(pH - pKa)
  const ratio = Math.pow(10, pH - pKa);
  // Mole fractions: f_base = R/(1+R), f_acid = 1/(1+R)
  const fBase = ratio/(1+ratio);
  const fAcid = 1/(1+ratio);
  // Concentrations (mM)
  const cBase = bufTotalConc * fBase;
  const cAcid = bufTotalConc * fAcid;
  // Moles needed in the user's volume
  const volL = bufVolumeML/1000;
  const molBase = cBase/1000 * volL;  // mol
  const molAcid = cAcid/1000 * volL;
  // Convert to mmol for display readability
  const mmolBase = molBase*1000;
  const mmolAcid = molAcid*1000;

  // Buffering capacity zone check: a buffer is "good" within pKa ± 1
  const distance = Math.abs(pH - pKa);
  let qualityLabel, qualityColor, qualityNote;
  if(distance <= 0.5){
    qualityLabel='\u2713 Excellent buffering';
    qualityColor='#147888';
    qualityNote='Within pKa ± 0.5 — maximum buffer capacity. Small additions of acid/base barely shift pH.';
  } else if(distance <= 1.0){
    qualityLabel='\u2713 Good buffering';
    qualityColor='#147888';
    qualityNote='Within pKa ± 1 — the standard "useful range." Most lab protocols target this zone.';
  } else if(distance <= 1.5){
    qualityLabel='\u26A0 Marginal buffering';
    qualityColor='#a8580f';
    qualityNote='Outside pKa ± 1 — buffer capacity is dropping fast. Consider a different buffer system.';
  } else {
    qualityLabel='\u2717 Poor buffering';
    qualityColor='#9a3a3a';
    qualityNote='Far from pKa — the system is mostly one form, with very little capacity to resist pH change.';
  }
  // Out-of-published-range warning
  const outOfPubRange = pH<sys.range[0] || pH>sys.range[1];

  // ── Stock-based recipe ──
  // Mix mode: combine the acid stock + base stock at the right ratio, then top up with water.
  // Titrate mode: take the dominant form's stock alone, titrate to pH with strong acid/base.
  const stockMmM = bufStockM*1000;        // stock in mM for direct comparison
  // Volumes for two-stock mixing (always computed, used by both modes for the math)
  // V_stock × C_stock = V_final × C_final → V_stock = (V_final × C_final) / C_stock
  const volAcidStock_mL = bufVolumeML * cAcid / stockMmM;     // mL of acid stock needed
  const volBaseStock_mL = bufVolumeML * cBase / stockMmM;     // mL of base stock needed
  const volWater_mL     = bufVolumeML - volAcidStock_mL - volBaseStock_mL;
  // Concentration sanity: target conc must be < stock conc, and individual stock vols must be < final vol
  const dilutionTooLow = bufTotalConc >= stockMmM;            // can't make stock >= itself

  // ── Result section ──
  const fmtMl = (v) => v>=100 ? v.toFixed(1)+' mL' : v>=1 ? v.toFixed(2)+' mL' : (v*1000).toFixed(1)+' µL';
  const fmtRatio = (r) => {
    if(r>=100) return r.toExponential(2);
    if(r>=10) return r.toFixed(1);
    if(r>=1) return r.toFixed(2);
    if(r>=0.01) return r.toFixed(3);
    return r.toExponential(2);
  };

  let html='';

  if(dilutionTooLow){
    html+='<div style="background:var(--surface2);border:1px solid #9a3a3a;border-left:3px solid #9a3a3a;border-radius:6px;padding:.6rem .85rem;margin-bottom:.5rem;font-family:\'DM Mono\',monospace;font-size:.75rem;color:#9a3a3a;line-height:1.5;">'
         +'⚠ Target concentration ('+bufTotalConc+' mM) is at or above the stock concentration ('+bufStockM+' M). '
         +'<span style="color:var(--text-muted);">Choose a lower target or a more concentrated stock.</span>'
         +'</div>';
  } else if(sys.prepStyle==='titrate'){
    // Titrate-from-one-form prep
    const dominantStock = sys.stockForm==='base' ? sys.baseName : sys.acidName;
    const volStock_mL = bufVolumeML * bufTotalConc / stockMmM;
    const startVol_mL = bufVolumeML * 0.8;  // dissolve in ~80% of final volume to leave headroom for titrant + topup
    html+='<div style="background:var(--surface2);border:1px solid var(--border);border-left:3px solid #2d785a;border-radius:6px;padding:.7rem .85rem;margin-bottom:.5rem;">'
         +'<div style="font-family:\'DM Mono\',monospace;font-size:.58rem;color:#2d785a;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem;font-weight:600;">Recipe \u2014 '+sys.label+', pH '+pH.toFixed(2)+', '+bufTotalConc+' mM, '+bufVolumeML+' mL</div>'
         +'<div style="font-family:\'DM Mono\',monospace;font-size:.78rem;color:var(--text);line-height:1.7;">'
         +'<b style="color:#2d785a;">1.</b> Add <b style="color:#2d785a;">'+fmtMl(volStock_mL)+'</b> of '+bufStockM+' M '+dominantStock+' to ~'+fmtMl(startVol_mL)+' water<br>'
         +'<b style="color:#2d785a;">2.</b> Titrate to <b style="color:#2d785a;">pH '+pH.toFixed(2)+'</b> with '+sys.titrant+' (drop-wise, with stirring)<br>'
         +'<b style="color:#2d785a;">3.</b> Top up to <b style="color:#2d785a;">'+bufVolumeML+' mL</b> with water and re-check pH'
         +'</div>'
         +'<div style="margin-top:.5rem;padding-top:.4rem;border-top:1px dashed var(--border);font-family:\'DM Mono\',monospace;font-size:.62rem;color:var(--text-muted);line-height:1.5;">'
         +'Henderson\u2013Hasselbalch: pH = pKa + log<sub>10</sub>([A⁻]/[HA]) \u2192 '+pH.toFixed(2)+' = '+pKa.toFixed(2)+' + log<sub>10</sub>('+fmtRatio(ratio)+')'
         +'</div>'
         +'</div>';
  } else {
    // Two-stock mixing prep
    html+='<div style="background:var(--surface2);border:1px solid var(--border);border-left:3px solid #2d785a;border-radius:6px;padding:.7rem .85rem;margin-bottom:.5rem;">'
         +'<div style="font-family:\'DM Mono\',monospace;font-size:.58rem;color:#2d785a;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem;font-weight:600;">Recipe \u2014 '+sys.label+', pH '+pH.toFixed(2)+', '+bufTotalConc+' mM, '+bufVolumeML+' mL</div>'
         +'<div style="display:grid;grid-template-columns:auto auto 1fr;gap:.3rem .8rem;align-items:baseline;font-family:\'DM Mono\',monospace;">'

function drawBufferTitrationCurve(pKa, targetPH, sys){
  const container=document.getElementById('buf-curve');
  if(!container) return;
  // Plot pH (y) vs. fraction-base f_base (x). Sigmoidal curve passes through (0.5, pKa).
  // pH = pKa + log10(f_base / (1 - f_base))
  const pw=560, ph=170, pad={l:40,r:18,t:14,b:36};
  const NS='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(NS,'svg');
  svg.setAttribute('viewBox',`0 0 ${pw} ${ph}`);
  svg.setAttribute('width','100%');
  svg.style.cssText='max-width:100%;height:auto;display:block;max-height:220px;';
  function el(tag,attrs,parent){
    const n=document.createElementNS(NS,tag);
    if(attrs)Object.entries(attrs).forEach(([k,v])=>n.setAttribute(k,String(v)));
    (parent||svg).appendChild(n); return n;
  }
  function txt(x,y,s,color,size,weight,anchor,parent){
    const t=el('text',{x,y,'text-anchor':anchor||'middle','font-size':size||9,fill:color||'var(--text-muted)','font-family':'DM Mono,monospace','font-weight':weight||'400'},parent);
    t.textContent=s; return t;
  }
  // Y range: 4 below pKa to 4 above (cover full sigmoidal)
  const yMin=Math.max(0, pKa-4), yMax=Math.min(14, pKa+4);
  const xToPx = f => pad.l + f*(pw-pad.l-pad.r);
  const yToPx = pH => pad.t + (1-(pH-yMin)/(yMax-yMin))*(ph-pad.t-pad.b);
  // Plot panel
  el('rect',{x:pad.l,y:pad.t,width:pw-pad.l-pad.r,height:ph-pad.t-pad.b,fill:'rgba(243,241,236,.35)',stroke:'var(--border)','stroke-width':1});
  // Y gridlines (integer pH values)
  for(let pHi=Math.ceil(yMin);pHi<=Math.floor(yMax);pHi++){
    const y=yToPx(pHi);
    el('line',{x1:pad.l,y1:y,x2:pw-pad.r,y2:y,stroke:'var(--border)','stroke-width':0.5,'stroke-dasharray':'2,3'});
    txt(pad.l-6,y+3,pHi,'var(--text-muted)',8,'400','end');
  }
  // X gridlines (fraction base)
  for(let i=0;i<=10;i++){
    const f=i/10;
    const x=xToPx(f);
    el('line',{x1:x,y1:pad.t,x2:x,y2:ph-pad.b,stroke:'var(--border)','stroke-width':0.5,'stroke-dasharray':'2,3'});
    if(i%2===0) txt(x,ph-pad.b+12,(f*100)+'%','var(--text-muted)',8,'400');
  }
  // Buffering range shaded zone (pKa ± 1)
  const bandTop=yToPx(Math.min(yMax,pKa+1));
  const bandBot=yToPx(Math.max(yMin,pKa-1));
  el('rect',{x:pad.l,y:bandTop,width:pw-pad.l-pad.r,height:bandBot-bandTop,fill:'rgba(45,120,90,.10)',stroke:'none'});
  txt(pw-pad.r-4,bandTop+10,'pKa ± 1 (buffer zone)','#2d785a',8,'600','end');
  // Titration curve
  let pathD='';
  for(let i=1;i<=199;i++){
    const f=i/200;
    const pHval = pKa + Math.log10(f/(1-f));
    if(pHval>=yMin && pHval<=yMax){
      const x=xToPx(f), y=yToPx(pHval);
      pathD += (pathD===''?'M':'L')+' '+x+' '+y+' ';
    }
  }
  el('path',{d:pathD, fill:'none', stroke:'#2d785a','stroke-width':2,'stroke-linejoin':'round','stroke-linecap':'round'});
  // pKa marker (horizontal line at pH=pKa, hits curve at f=0.5)
  const pKaY=yToPx(pKa);
  el('line',{x1:pad.l,y1:pKaY,x2:xToPx(0.5),y2:pKaY,stroke:'#2d785a','stroke-width':1,'stroke-dasharray':'3,2','opacity':.6});
  el('line',{x1:xToPx(0.5),y1:pKaY,x2:xToPx(0.5),y2:ph-pad.b,stroke:'#2d785a','stroke-width':1,'stroke-dasharray':'3,2','opacity':.6});
  el('circle',{cx:xToPx(0.5),cy:pKaY,r:3.5,fill:'#2d785a',stroke:'var(--surface)','stroke-width':1.2});
  txt(xToPx(0.5)+6, pKaY-4,'pKa = '+pKa.toFixed(2),'#2d785a',9,'700','start');
  // Target pH marker (current setting)
  const fBase = 1/(1+Math.pow(10, pKa-targetPH));
  if(targetPH>=yMin && targetPH<=yMax){
    const tx=xToPx(fBase), ty=yToPx(targetPH);
    el('line',{x1:pad.l,y1:ty,x2:tx,y2:ty,stroke:'#E77500','stroke-width':1.2,'stroke-dasharray':'4,2','opacity':.85});
    el('line',{x1:tx,y1:ty,x2:tx,y2:ph-pad.b,stroke:'#E77500','stroke-width':1.2,'stroke-dasharray':'4,2','opacity':.85});
    el('circle',{cx:tx,cy:ty,r:4.5,fill:'#E77500',stroke:'var(--surface)','stroke-width':1.5});
    // label position depends on which side of pKa
    if(fBase>0.5){
      txt(tx-6, ty-6, 'pH '+targetPH.toFixed(2)+'  ('+(fBase*100).toFixed(0)+'% base)','#E77500',9,'700','end');
    } else {
      txt(tx+6, ty-6, 'pH '+targetPH.toFixed(2)+'  ('+(fBase*100).toFixed(0)+'% base)','#E77500',9,'700','start');
    }
  }
  // Axis labels
  txt(14, pad.t+(ph-pad.t-pad.b)/2, 'pH', 'var(--text-muted)',9,'500','middle',svg).setAttribute('transform',`rotate(-90 14 ${pad.t+(ph-pad.t-pad.b)/2})`);
  txt(pad.l+(pw-pad.l-pad.r)/2, ph-2, 'Fraction in base form ([A⁻] / total)', 'var(--text-muted)',9,'500');

  container.innerHTML='';
  container.appendChild(svg);
}

// State machine, animations, search, particles.

let moleX=60,moleDir=1,moleState='idle',moleFrame=0,moleTick=0,moleSearchOpen=false,moleHidden=false;
// Expanded animator state
let moleEmote='',moleEmoteTick=0,moleEyeState='open',moleBreathPhase=0;
let moleDigFrame=0,moleSniffFrame=0,moleCelebFrame=0,moleYawnFrame=0,molePeekFrame=0,moleSleepZ=0;
let moleParticles=[],moleTrailParticles=[];
let moleStateTimer=0,moleIdleSince=0,moleActionQueue=[];
let moleAnimInterval=null,moleTipInterval=null;
const MOLE_STATES=['idle','walk','dig','sniff','celebrate','yawn','sleep','peek','wave','nod'];
const MOLE_EMOTES=['!','?','♥','★','💡','🧬','⚗','🎯','✓','💤'];

// Reduced motion preference
let prefersReducedMotion=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if(window.matchMedia){
  window.matchMedia('(prefers-reduced-motion: reduce)').addEventListener('change',e=>{
    prefersReducedMotion=e.matches;
    if(prefersReducedMotion){
      // Stop animations, clear particles, freeze mole
      moleState='idle';moleParticles=[];moleFrame=0;
      if(moleAnimInterval){clearInterval(moleAnimInterval);moleAnimInterval=null;}
      if(moleTipInterval){clearInterval(moleTipInterval);moleTipInterval=null;}
      drawMole();// draw static frame
      const pc=document.getElementById('mole-particles');if(pc){const ctx2=pc.getContext('2d');ctx2.clearRect(0,0,pc.width,pc.height);}
    } else {
      // Restart animation
      if(!moleAnimInterval)moleAnimInterval=setInterval(updateMole,80);
      if(!moleTipInterval)moleTipInterval=setInterval(showMoleIdleTip,20000);
    }
  });
}

// Particle system for mole effects
function spawnMoleParticle(type,x,y,count){
  if(prefersReducedMotion)return;// respect reduced motion
  for(let i=0;i<(count||3);i++){
    const p={type,x:x||moleX+16,y:y||28,vx:(Math.random()-.5)*2,vy:-Math.random()*2-1,life:1,maxLife:30+Math.random()*20};
    if(type==='dirt'){p.vy=Math.random()*-3-1;p.vx=(Math.random()-.5)*4;p.color='#8b7355';p.size=2+Math.random()*2;}
    else if(type==='sparkle'){p.vy=-Math.random()*1.5;p.vx=(Math.random()-.5)*3;p.color=['#fbbf24','#f59e0b','#10b981','#3b82f6'][Math.floor(Math.random()*4)];p.size=2+Math.random()*2;}
    else if(type==='zzz'){p.vy=-0.5-Math.random()*.5;p.vx=0.3+Math.random()*.3;p.color='#94a3b8';p.size=6+Math.random()*4;p.char='z';}
    else if(type==='heart'){p.vy=-1-Math.random();p.vx=(Math.random()-.5)*1.5;p.color='#E8A0A0';p.size=6;p.char='♥';}
    else if(type==='note'){p.vy=-1.2;p.vx=(Math.random()-.5)*2;p.color='#10b981';p.size=7;p.char=['♪','♫'][Math.floor(Math.random()*2)];}
    else if(type==='sniff'){p.vy=0;p.vx=moleDir*2;p.color='rgba(148,163,184,.4)';p.size=3;p.maxLife=15;p.life=1;}
    else if(type==='trail'){p.vx=0;p.vy=0;p.color='rgba(74,78,84,.15)';p.size=2;p.maxLife=20;p.life=1;p.y=30;}
    moleParticles.push(p);
  }
}

function updateMoleParticles(){
  for(let i=moleParticles.length-1;i>=0;i--){
    const p=moleParticles[i];
    p.x+=p.vx;p.y+=p.vy;
    p.life-=1/p.maxLife;
    if(p.type==='dirt')p.vy+=0.15; // gravity
    if(p.life<=0)moleParticles.splice(i,1);
  }
}

function drawMoleParticles(){
  const zone=document.getElementById('mole-zone');if(!zone)return;
  let canvas=document.getElementById('mole-particles');
  if(!canvas){
    canvas=document.createElement('canvas');canvas.id='mole-particles';
    canvas.width=zone.offsetWidth;canvas.height=50;
    canvas.style.cssText='position:absolute;bottom:0;left:0;width:100%;height:50px;pointer-events:none;z-index:4;';
    zone.appendChild(canvas);
  }
  if(canvas.width!==zone.offsetWidth)canvas.width=zone.offsetWidth;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  moleParticles.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life);
    if(p.char){
      ctx.font=`${p.size}px "DM Sans",sans-serif`;ctx.fillStyle=p.color;
      ctx.fillText(p.char,p.x,p.y);
    } else {
      ctx.fillStyle=p.color;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();
    }
  });
  ctx.globalAlpha=1;
}

// Mole reacts to user actions
function moleReact(action){
  if(moleHidden)return;
  // In reduced motion: show emote only, no animation state changes
  if(prefersReducedMotion){
    const emoteMap={correct:'✓',wrong:'!',navigate:'🧬',complete:'★',search:'?',tool:'💡'};
    if(emoteMap[action]){moleEmote=emoteMap[action];moleEmoteTick=50;drawMole();}
    return;
  }
  if(action==='correct'){
    moleActionQueue.push({state:'celebrate',duration:80,emote:'✓'});
  } else if(action==='wrong'){
    moleActionQueue.push({state:'nod',duration:40,emote:'!'});
  } else if(action==='navigate'){
    moleActionQueue.push({state:'sniff',duration:50,emote:'🧬'});
  } else if(action==='complete'){
    moleActionQueue.push({state:'celebrate',duration:100,emote:'★'});
    setTimeout(()=>spawnMoleParticle('sparkle',moleX+16,20,8),200);
  } else if(action==='search'){
    moleActionQueue.push({state:'peek',duration:40,emote:'?'});
  } else if(action==='tool'){
    moleActionQueue.push({state:'wave',duration:50,emote:'💡'});
  }
}

function processActionQueue(){
  if(moleActionQueue.length===0||moleSearchOpen)return false;
  if(moleState!=='idle'&&moleState!=='walk')return false;
  const action=moleActionQueue.shift();
  moleState=action.state;moleStateTimer=action.duration;
  if(action.emote){moleEmote=action.emote;moleEmoteTick=50;}
  moleFrame=0;
  return true;
}

// Toolkit-specific tips
const MOLE_TIPS=[
  'Click me to search the tools!',
  'Try setting a P200 to 25 \u00B5L',
  'Press 1\u20136 to jump to a tool',
  'Stuck on Tm? Try nearest-neighbor',
  'Mutate a base in the dogma viewer',

];

function applyMoleVisibility(){
  const moleEl=document.getElementById('mole-char');
  const bubble=document.getElementById('mole-bubble');
  const idleBub=document.getElementById('mole-idle-bubble');
  if(moleEl)moleEl.style.display=moleHidden?'none':'';
  if(moleHidden){
    if(bubble)bubble.style.display='none';
    if(idleBub)idleBub.style.display='none';
    moleSearchOpen=false;
  }
}

function toggleMoleHidden(){
  moleHidden=!moleHidden;
  applyMoleVisibility();
  // Clear/restart intervals to save CPU when mole is hidden
  if(moleHidden){
    if(moleAnimInterval){clearInterval(moleAnimInterval);moleAnimInterval=null;}
    if(moleTipInterval){clearInterval(moleTipInterval);moleTipInterval=null;}
    moleParticles=[];
    const pc=document.getElementById('mole-particles');if(pc){const ctx2=pc.getContext('2d');ctx2.clearRect(0,0,pc.width,pc.height);}
  } else if(!prefersReducedMotion){
    if(!moleAnimInterval)moleAnimInterval=setInterval(updateMole,80);
    if(!moleTipInterval)moleTipInterval=setInterval(showMoleIdleTip,20000);
    drawMole();
  }
  try{_store.set('molebio-mole-hidden',moleHidden?'true':'false');}catch(e){}
  
}
let moleTipIdx=0;

// Position a bubble (search or idle) so it stays inside the mole-zone and never
// extends past the viewport. By default the bubble's left edge sits 10px to the
// left of moleX, but if that would push the right edge past the zone, we clamp.
function positionMoleBubble(bubbleEl){
  if(!bubbleEl)return;
  const zone=document.getElementById('mole-zone');
  if(!zone)return;
  const zoneW=zone.offsetWidth;
  // Need to know bubble width. If hidden (display:none), temporarily measure.
  const wasHidden=bubbleEl.style.display==='none'||getComputedStyle(bubbleEl).display==='none';
  if(wasHidden){bubbleEl.style.visibility='hidden';bubbleEl.style.display='block';}
  const bubbleW=bubbleEl.offsetWidth;
  if(wasHidden){bubbleEl.style.display='none';bubbleEl.style.visibility='';}
  // Preferred position: 10px left of mole
  let left=moleX-10;
  // Clamp: don't let bubble extend past the right edge of the zone
  const maxLeft=zoneW-bubbleW-4;// 4px gutter
  if(left>maxLeft)left=maxLeft;
  // Don't let bubble go past the left edge of the zone
  if(left<4)left=4;
  bubbleEl.style.left=left+'px';
}

function showMoleIdleTip(){
  if(moleSearchOpen||moleHidden||moleState==='sleep')return;
  const b=document.getElementById('mole-idle-bubble');if(!b)return;
  b.textContent=MOLE_TIPS[moleTipIdx%MOLE_TIPS.length];
  moleTipIdx++;
  // Position near mole, clamped to stay in zone
  b.style.display='block';
  positionMoleBubble(b);
  b.style.opacity='1';
  setTimeout(()=>{b.style.opacity='0';setTimeout(()=>{b.style.display='none';},300);},3000);
}

function toggleMoleSearch(){
  moleSearchOpen=!moleSearchOpen;
  if(moleSearchOpen&&typeof moleReact==='function')moleReact('search');
  const bubble=document.getElementById('mole-bubble');
  const idleBub=document.getElementById('mole-idle-bubble');
  if(moleSearchOpen){
    if(bubble){
      bubble.style.display='block';
      positionMoleBubble(bubble);
      setTimeout(()=>document.getElementById('lesson-search')?.focus(),50);
    }
    if(idleBub){idleBub.style.display='none';}
    moleState='idle';// stop walking when searching
  } else {
    if(bubble)bubble.style.display='none';
    document.getElementById('lesson-search')&&(document.getElementById('lesson-search').value='');
    hideSearchResults();
  }
}
function drawMole(){
  const c=document.getElementById('mole-canvas');if(!c)return;
  const ctx=c.getContext('2d');
  ctx.clearRect(0,0,32,44);
  ctx.imageSmoothingEnabled=false;

  // Offset all drawing down 12px to leave emote space at top
  ctx.save();
  ctx.translate(0,12);

  const f=moleFrame%4;
  const flip=(moleDir<0);
  if(flip){ctx.save();ctx.translate(32,0);ctx.scale(-1,1);}

  // Breathing animation (subtle Y oscillation)
  moleBreathPhase=(moleBreathPhase+0.04)%(Math.PI*2);
  const breathOff=(moleState==='sleep')?Math.sin(moleBreathPhase)*1.5:Math.sin(moleBreathPhase)*0.4;

  // Base bounce for walking
  const walkBounce=(moleState==='walk'&&f%2===0)?-1:0;
  // Dig bob
  const digBob=(moleState==='dig')?(f%2===0?-2:1):0;
  // Celebrate jump
  const celebJump=(moleState==='celebrate')?(f%2===0?-3:0):0;
  // Yawn stretch
  const yawnStretch=(moleState==='yawn'&&f<2)?-1:0;
  // Sleep sink
  const sleepSink=(moleState==='sleep')?2:0;
  // Peek crouch
  const peekCrouch=(moleState==='peek')?2:0;
  // Wave bounce
  const waveBob=(moleState==='wave'&&f%2===0)?-1:0;

  const bounce=walkBounce+digBob+celebJump+yawnStretch+sleepSink+peekCrouch+waveBob+Math.round(breathOff);

  // Shadow (bigger during jump)
  const shadowW=(moleState==='celebrate'&&f%2===0)?14:18;
  ctx.fillStyle='rgba(0,0,0,.15)';
  ctx.fillRect(16-shadowW/2,28,(shadowW),2);

  // Body (round, chunky)
  ctx.fillStyle='#888c92';
  ctx.fillRect(8,16+bounce,16,10);
  ctx.fillRect(7,18+bounce,18,6);
  ctx.fillRect(10,15+bounce,12,1);
  // Belly
  ctx.fillStyle='#8b9199';
  ctx.fillRect(11,19+bounce,10,6);
  ctx.fillRect(12,18+bounce,8,1);
  // Sleep belly rise
  if(moleState==='sleep'){
    const bellyPulse=Math.sin(moleBreathPhase)*1;
    ctx.fillStyle='#8b9199';
    ctx.fillRect(11,19+bounce-Math.round(bellyPulse),10,7);
  }

  // Head (big, round)
  ctx.fillStyle='#9aa0a8';
  ctx.fillRect(6,4+bounce,20,12);
  ctx.fillRect(8,3+bounce,16,1);
  ctx.fillRect(5,6+bounce,22,8);
  ctx.fillRect(8,15+bounce,16,2);
  // Forehead highlight
  ctx.fillStyle='#a8aeb6';
  ctx.fillRect(10,5+bounce,12,2);

  // Ears
  ctx.fillStyle='#9aa0a8';
  ctx.fillRect(5,2+bounce,4,4);ctx.fillRect(23,2+bounce,4,4);
  ctx.fillRect(6,1+bounce,2,2);ctx.fillRect(24,1+bounce,2,2);
  // Ear perk for sniff/peek
  if(moleState==='sniff'||moleState==='peek'){
    ctx.fillRect(5,0+bounce,4,3);ctx.fillRect(23,0+bounce,4,3);
  }
  // Inner ear (pink)
  ctx.fillStyle='#E8A0A0';
  ctx.fillRect(6,3+bounce,2,2);ctx.fillRect(24,3+bounce,2,2);

  // Snout (big pink oval)
  ctx.fillStyle='#E8A0A0';
  // Sniff: snout bobs forward
  const snoutXOff=(moleState==='sniff'&&f%2===0)?1:0;
  ctx.fillRect(12+snoutXOff,9+bounce,8,5);
  ctx.fillRect(11+snoutXOff,10+bounce,10,3);
  // Nose (dark, star-shaped)
  ctx.fillStyle='#2a2a3e';
  ctx.fillRect(14+snoutXOff,9+bounce,4,3);
  ctx.fillRect(15+snoutXOff,8+bounce,2,1);
  ctx.fillRect(13+snoutXOff,10+bounce,1,1);ctx.fillRect(18+snoutXOff,10+bounce,1,1);
  // Nose shine
  ctx.fillStyle='#555';
  ctx.fillRect(15+snoutXOff,9+bounce,1,1);
  // Sniff wiggle: small dots near nose
  if(moleState==='sniff'&&f%3===0){
    ctx.fillStyle='rgba(148,163,184,.4)';
    ctx.fillRect(20+snoutXOff,9+bounce,2,1);ctx.fillRect(22+snoutXOff,10+bounce,1,1);
  }

  // Eyes
  if(moleState==='sleep'){
    // Sleeping: closed eyes with curved line
    ctx.fillStyle='#1a1a2e';
    ctx.fillRect(8,9+bounce,4,1);ctx.fillRect(20,9+bounce,4,1);
    ctx.fillRect(9,10+bounce,2,1);ctx.fillRect(21,10+bounce,2,1);
  } else if(moleState==='yawn'&&f>=1&&f<=2){
    // Yawn: squinty eyes
    ctx.fillStyle='#1a1a2e';
    ctx.fillRect(8,9+bounce,4,1);ctx.fillRect(20,9+bounce,4,1);
  } else if(moleState==='celebrate'){
    // Celebrate: happy squint eyes (^ ^)
    ctx.fillStyle='#1a1a2e';
    ctx.fillRect(8,8+bounce,1,1);ctx.fillRect(11,8+bounce,1,1);ctx.fillRect(9,7+bounce,2,1);
    ctx.fillRect(20,8+bounce,1,1);ctx.fillRect(23,8+bounce,1,1);ctx.fillRect(21,7+bounce,2,1);
  } else if(moleState==='peek'){
    // Peek: wide eyes (bigger pupils)
    ctx.fillStyle='#1a1a2e';
    ctx.fillRect(7,6+bounce,5,5);ctx.fillRect(20,6+bounce,5,5);
    ctx.fillStyle='#111';
    ctx.fillRect(9,7+bounce,3,3);ctx.fillRect(21,7+bounce,3,3);
    ctx.fillStyle='#fff';
    ctx.fillRect(8,6+bounce,2,2);ctx.fillRect(20,6+bounce,2,2);
    ctx.fillStyle='rgba(255,255,255,.5)';
    ctx.fillRect(10,9+bounce,1,1);ctx.fillRect(22,9+bounce,1,1);
  } else {
    // Normal eyes
    const blinking=(moleState==='idle'&&f===3)||(moleState==='nod'&&f%2===0);
    if(blinking){
      ctx.fillStyle='#9aa0a8';
      ctx.fillRect(8,7+bounce,4,4);ctx.fillRect(20,7+bounce,4,4);
      ctx.fillStyle='#1a1a2e';
      ctx.fillRect(8,9+bounce,4,1);ctx.fillRect(20,9+bounce,4,1);
    } else {
      // Left eye
      ctx.fillStyle='#1a1a2e';
      ctx.fillRect(8,7+bounce,4,4);
      ctx.fillStyle='#111';
      ctx.fillRect(9,8+bounce,2,2);
      ctx.fillStyle='#fff';
      ctx.fillRect(8,7+bounce,1,1);
      ctx.fillStyle='rgba(255,255,255,.5)';
      ctx.fillRect(10,9+bounce,1,1);
      // Right eye
      ctx.fillStyle='#1a1a2e';
      ctx.fillRect(20,7+bounce,4,4);
      ctx.fillStyle='#111';
      ctx.fillRect(21,8+bounce,2,2);
      ctx.fillStyle='#fff';
      ctx.fillRect(20,7+bounce,1,1);
      ctx.fillStyle='rgba(255,255,255,.5)';
      ctx.fillRect(22,9+bounce,1,1);
    }
  }

  // Mouth variations
  if(moleState==='yawn'&&f>=1&&f<=2){
    // Yawn: open mouth
    ctx.fillStyle='#1a1a2e';
    ctx.fillRect(13,13+bounce,6,3);
    ctx.fillStyle='#E8A0A0';
    ctx.fillRect(14,14+bounce,4,1);
  } else if(moleState==='celebrate'){
    // Happy mouth (smile)
    ctx.fillStyle='#2a2a3e';
    ctx.fillRect(13,14+bounce,6,1);
    ctx.fillRect(12,13+bounce,1,1);ctx.fillRect(19,13+bounce,1,1);
  } else {
    // Tiny teeth
    ctx.fillStyle='#e8e8e8';
    ctx.fillRect(14,14+bounce,2,1);ctx.fillRect(16,14+bounce,2,1);
  }

  // Whiskers
  ctx.fillStyle='#8b9199';
  ctx.fillRect(4,11+bounce,4,1);ctx.fillRect(24,11+bounce,4,1);
  ctx.fillRect(3,9+bounce,4,1);ctx.fillRect(25,9+bounce,4,1);

  // Arms/claws
  ctx.fillStyle='#888c92';
  if(moleState==='walk'){
    if(f<2){ctx.fillRect(4,16+bounce,4,5);ctx.fillRect(24,18+bounce,4,5);}
    else{ctx.fillRect(4,18+bounce,4,5);ctx.fillRect(24,16+bounce,4,5);}
  } else if(moleState==='dig'){
    // Digging: arms flail fast
    if(f%2===0){ctx.fillRect(3,14+bounce,4,4);ctx.fillRect(25,17+bounce,4,4);}
    else{ctx.fillRect(3,17+bounce,4,4);ctx.fillRect(25,14+bounce,4,4);}
  } else if(moleState==='wave'){
    // Wave: one arm up, one normal
    ctx.fillRect(4,17+bounce,4,5);
    // Right arm raised and waving
    if(f%2===0){ctx.fillRect(25,10+bounce,4,5);}
    else{ctx.fillRect(26,8+bounce,4,5);}
  } else if(moleState==='celebrate'){
    // Both arms up!
    if(f%2===0){ctx.fillRect(3,10+bounce,4,5);ctx.fillRect(25,10+bounce,4,5);}
    else{ctx.fillRect(2,8+bounce,4,5);ctx.fillRect(26,8+bounce,4,5);}
  } else {
    ctx.fillRect(4,17+bounce,4,5);ctx.fillRect(24,17+bounce,4,5);
  }

  // Claw fingers
  ctx.fillStyle='#c8ccd2';
  if(moleState==='dig'){
    const clY=f%2===0?18:21;
    ctx.fillRect(1,clY+bounce,3,2);ctx.fillRect(3,clY+1+bounce,2,2);ctx.fillRect(5,clY+bounce,2,2);
    ctx.fillRect(24,clY+bounce+2,2,2);ctx.fillRect(26,clY+1+bounce+2,2,2);ctx.fillRect(28,clY+bounce+2,2,2);
  } else if(moleState==='wave'||moleState==='celebrate'){
    // Claws on raised arms
    const armY=f%2===0?10:8;
    ctx.fillRect(25,armY+bounce,2,2);ctx.fillRect(27,armY+1+bounce,2,2);ctx.fillRect(29,armY+bounce,1,2);
    // Left normal claws for wave, raised for celebrate
    if(moleState==='celebrate'){
      ctx.fillRect(1,armY+bounce,2,2);ctx.fillRect(3,armY+1+bounce,2,2);ctx.fillRect(5,armY+bounce,1,2);
    } else {
      const clawY=22;
      ctx.fillRect(3,clawY+bounce,2,2);ctx.fillRect(5,clawY+1+bounce,2,2);ctx.fillRect(7,clawY+bounce,1,2);
    }
  } else {
    const clawY=moleState==='walk'?(f<2?21:23):22;
    ctx.fillRect(3,clawY+bounce,2,2);ctx.fillRect(5,clawY+1+bounce,2,2);ctx.fillRect(7,clawY+bounce,1,2);
    ctx.fillRect(24,clawY+bounce,1,2);ctx.fillRect(25,clawY+1+bounce,2,2);ctx.fillRect(27,clawY+bounce,2,2);
  }

  // Feet
  ctx.fillStyle='#888c92';
  if(moleState==='walk'){
    if(f<2){ctx.fillRect(10,26,4,2);ctx.fillRect(19,27,4,1);}
    else{ctx.fillRect(10,27,4,1);ctx.fillRect(19,26,4,2);}
  } else if(moleState==='dig'){
    // Dig: feet spread wide for stability
    ctx.fillRect(8,26,5,2);ctx.fillRect(20,26,5,2);
  } else if(moleState==='celebrate'){
    // Celebrate: little hops
    if(f%2===0){ctx.fillRect(10,27,4,1);ctx.fillRect(19,27,4,1);}
    else{ctx.fillRect(10,26,4,2);ctx.fillRect(19,26,4,2);}
  } else if(moleState==='sleep'){
    // Sleep: feet tucked
    ctx.fillRect(11,27,3,1);ctx.fillRect(19,27,3,1);
  } else {
    ctx.fillRect(10,26,4,2);ctx.fillRect(19,26,4,2);
  }
  // Toe claws
  ctx.fillStyle='#c8ccd2';
  ctx.fillRect(9,27,2,1);ctx.fillRect(22,27,2,1);

  // Tail
  ctx.fillStyle='#9aa0a8';
  if(moleState==='celebrate'){
    // Wagging tail
    const tailX=f%2===0?5:7;
    ctx.fillRect(tailX,19+bounce,2,2);ctx.fillRect(tailX-1,18+bounce,1,2);
  } else if(moleState==='sleep'){
    // Curled tail
    ctx.fillRect(6,22+bounce,2,2);ctx.fillRect(5,21+bounce,2,1);
  } else {
    ctx.fillRect(6,20+bounce,2,2);
    ctx.fillRect(5,19+bounce,1,2);
  }

  // Hard hat for dig state
  if(moleState==='dig'){
    ctx.fillStyle='#f59e0b';
    ctx.fillRect(7,1+bounce,18,3);ctx.fillRect(9,0+bounce,14,2);
    ctx.fillStyle='#d97706';
    ctx.fillRect(13,0+bounce,6,1);
  }

  // Sleep cap
  if(moleState==='sleep'){
    ctx.fillStyle='#6366f1';
    ctx.fillRect(8,1+bounce,16,4);ctx.fillRect(10,0+bounce,12,2);
    // Bobble
    ctx.fillStyle='#a5b4fc';
    ctx.fillRect(22,0+bounce,3,3);
  }

  if(flip)ctx.restore();
  ctx.restore(); // restore the translate(0,12)

  // Emote bubble (drawn in top 12px space above mole)
  if(moleEmote&&moleEmoteTick>0){
    const emoteAlpha=Math.min(1,moleEmoteTick/10);
    ctx.globalAlpha=emoteAlpha;
    // Small bubble
    ctx.fillStyle='rgba(30,41,59,.85)';
    const emW=12,emH=10;
    const emX=16-emW/2,emY=1;
    if(ctx.roundRect){ctx.beginPath();ctx.roundRect(emX,emY,emW,emH,3);ctx.fill();}
    else{ctx.fillRect(emX,emY,emW,emH);}
    // Tiny pointer
    ctx.fillRect(15,emY+emH,2,2);
    // Emote character
    ctx.fillStyle='#fbbf24';
    ctx.font='7px sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(moleEmote,16,emY+emH/2+1);
    ctx.globalAlpha=1;
  }
}

function updateMole(){
  if(moleHidden)return;
  moleTick++;
  const zone=document.getElementById('mole-zone');
  const moleEl=document.getElementById('mole-char');
  if(!zone||!moleEl)return;
  const maxX=zone.offsetWidth-40;

  // Emote countdown
  if(moleEmoteTick>0)moleEmoteTick--;
  if(moleEmoteTick<=0)moleEmote='';

  // Process queued actions
  processActionQueue();

  // State timer for timed states
  if(moleStateTimer>0){
    moleStateTimer--;
    if(moleStateTimer<=0&&moleState!=='idle'&&moleState!=='walk'){
      moleState='idle';moleIdleSince=moleTick;
    }
  }

  if(moleState==='idle'){
    // Idle: blink every ~2s, occasionally start other behaviors
    if(moleTick%4===0)moleFrame++;
    moleIdleSince++;
    if(moleTick%80===0&&!moleSearchOpen&&Math.random()>0.3){
      // Pick a random behavior weighted by context
      const r=Math.random();
      if(r<0.45){
        moleState='walk';moleDir=Math.random()>0.5?1:-1;
      } else if(r<0.55){
        moleState='sniff';moleStateTimer=60;moleFrame=0;
      } else if(r<0.62){
        moleState='dig';moleStateTimer=50;moleFrame=0;
      } else if(r<0.68){
        moleState='peek';moleStateTimer=35;moleFrame=0;
      } else if(r<0.73){
        moleState='yawn';moleStateTimer=45;moleFrame=0;
      } else if(r<0.78){
        moleState='wave';moleStateTimer=40;moleFrame=0;
      } else if(r<0.82){
        moleState='nod';moleStateTimer=30;moleFrame=0;
      }
    }
    // After long idle, fall asleep
    if(moleIdleSince>600&&!moleSearchOpen){
      moleState='sleep';moleStateTimer=0;moleFrame=0;moleIdleSince=0;
    }
  } else if(moleState==='walk'){
    if(moleTick%3===0)moleFrame++;
    moleX+=moleDir*1.2;
    if(moleX>maxX){moleX=maxX;moleDir=-1;}
    if(moleX<20){moleX=20;moleDir=1;}
    // Walking trail particles
    if(moleTick%8===0)spawnMoleParticle('trail',moleX+16,0,1);
    // Stop walking after a bit
    if(moleTick%120===0){moleState='idle';moleIdleSince=0;}
  } else if(moleState==='dig'){
    if(moleTick%2===0)moleFrame++;
    // Dirt particles while digging
    if(moleTick%6===0)spawnMoleParticle('dirt',moleX+16,25,2);
  } else if(moleState==='sniff'){
    if(moleTick%4===0)moleFrame++;
    // Sniff particles
    if(moleTick%8===0)spawnMoleParticle('sniff',moleX+(moleDir>0?28:4),20,1);
  } else if(moleState==='celebrate'){
    if(moleTick%3===0)moleFrame++;
    // Sparkle particles
    if(moleTick%10===0)spawnMoleParticle('sparkle',moleX+16,10,2);
  } else if(moleState==='yawn'){
    if(moleTick%5===0)moleFrame++;
  } else if(moleState==='sleep'){
    if(moleTick%6===0)moleFrame++;
    // Zzz particles
    if(moleTick%25===0)spawnMoleParticle('zzz',moleX+24,8,1);
    // Wake up on interaction
    if(moleSearchOpen){moleState='idle';moleIdleSince=0;}
  } else if(moleState==='peek'){
    if(moleTick%4===0)moleFrame++;
  } else if(moleState==='wave'){
    if(moleTick%4===0)moleFrame++;
  } else if(moleState==='nod'){
    if(moleTick%3===0)moleFrame++;
  }

  moleEl.style.left=moleX+'px';
  // Update speech bubble position too — clamped so it stays in the zone
  const bubble=document.getElementById('mole-bubble');
  if(bubble&&moleSearchOpen)positionMoleBubble(bubble);

  // Update particles
  updateMoleParticles();
  drawMoleParticles();
  drawMole();
}

// Toolkit search adapter: searches TOOLS instead of LESSONS.
function filterSearch(query){
  const results=document.getElementById('search-results');
  if(!results)return;
  if(!query||query.length<1){results.innerHTML='<div style="padding:.6rem;font-size:.7rem;color:var(--text-muted)">Type a tool name, e.g. "tm", "pipette", "codon"...</div>';return;}
  const q=query.toLowerCase();
  const matches=[];
  TOOL_KEYS.forEach(key=>{
    const t=TOOLS[key];
    const haystack=((t.label||'')+' '+(t.eyebrow||'')+' '+(t.sub||'')).toLowerCase();
    if(haystack.includes(q)){
      let score=0;
      if((t.label||'').toLowerCase().includes(q))score+=10;
      if((t.eyebrow||'').toLowerCase().includes(q))score+=5;
      if((t.sub||'').toLowerCase().includes(q))score+=3;
      score+=1;
      matches.push({key,tool:t,score});
    }
  });
  matches.sort((a,b)=>b.score-a.score);
  if(matches.length===0){
    results.innerHTML='<div style="padding:.6rem;font-size:.7rem;color:var(--text-muted)">No tools match. Try "Tm", "primer", "codon", "pipette"...</div>';
    return;
  }
  results.innerHTML=matches.map(m=>`<div onclick="selectTool('${m.key}');moleSearchOpen=false;document.getElementById('mole-bubble').style.display='none';document.getElementById('lesson-search').value='';hideSearchResults()" style="padding:.45rem .7rem;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;display:flex;align-items:center;gap:.5rem;" onmouseenter="this.style.background='rgba(231,117,0,.08)'" onmouseleave="this.style.background='none'"><span style="font-size:.95rem;">${m.tool.icon}</span><div style="flex:1;"><div style="font-size:.72rem;color:var(--text);font-weight:500;">${m.tool.label}</div><div style="font-size:.6rem;color:var(--text-muted)">${m.tool.eyebrow}</div></div></div>`).join('');
}

function showSearchResults(){
  const r=document.getElementById('search-results');
  if(!r)return;
  r.style.display='block';
  filterSearch(document.getElementById('lesson-search')?.value||'');
  // Position the dropdown so it never extends past the viewport.
  // The dropdown is absolutely positioned inside the bubble. We compute where
  // the bubble sits in the viewport and flip the dropdown right-anchored if
  // a left-anchored 280px dropdown would overflow.
  const bubble=document.getElementById('mole-bubble');
  if(!bubble)return;
  const bubbleRect=bubble.getBoundingClientRect();
  const vw=window.innerWidth;
  const desiredW=280;
  const margin=8;
  // Available width to the right of bubble's left edge
  const roomRight=vw-bubbleRect.left-margin;
  if(roomRight<desiredW){
    // Either shrink the dropdown to fit, or right-anchor it
    if(bubbleRect.right<=vw-margin){
      // Right-anchor to bubble's right edge (within bubble's coord system)
      r.style.left='auto';
      r.style.right='0';
      r.style.width=Math.min(desiredW,vw-margin*2)+'px';
    } else {
      // Bubble itself is past viewport (shouldn't happen with positionMoleBubble)
      r.style.left='0';r.style.right='auto';
      r.style.width=Math.max(180,roomRight)+'px';
    }
  } else {
    r.style.left='0';r.style.right='auto';r.style.width=desiredW+'px';
  }
}
function hideSearchResults(){
  const r=document.getElementById('search-results');if(r)r.style.display='none';
}

function initMole(){
  const zone=document.getElementById('mole-zone');
  if(!zone)return;

  const moleEl=document.createElement('div');
  moleEl.id='mole-char';
  moleEl.style.cssText='position:absolute;bottom:4px;left:60px;cursor:pointer;z-index:5;transition:none;';
  moleEl.innerHTML=`<canvas id="mole-canvas" width="32" height="44" style="width:32px;height:44px;image-rendering:-webkit-optimize-contrast;image-rendering:pixelated;margin-top:-12px;" aria-label="Mole mascot \u2014 click to search tools"></canvas>`;
  moleEl.setAttribute('role','button');
  moleEl.setAttribute('tabindex','0');
  moleEl.setAttribute('aria-label','Click to search tools');
  moleEl.onclick=toggleMoleSearch;
  moleEl.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggleMoleSearch();}});
  moleEl.title='Click me to search the tools!';
  zone.appendChild(moleEl);

  const bubble=document.createElement('div');
  bubble.id='mole-bubble';
  bubble.style.cssText='position:absolute;top:48px;left:40px;display:none;background:var(--surface);border:1.5px solid var(--accent);border-radius:2px 10px 10px 10px;padding:.4rem .55rem;z-index:30;box-shadow:0 6px 20px rgba(0,0,0,.12);white-space:nowrap;max-width:calc(100vw - 16px);transition:opacity .15s;';
  bubble.innerHTML=`<input id="lesson-search" type="text" placeholder="Search tools..." autocomplete="off" style="width:170px;background:transparent;border:none;font-family:'DM Mono',monospace;font-size:.65rem;color:var(--text);outline:none;" oninput="filterSearch(this.value)" onfocus="showSearchResults()" onblur="setTimeout(hideSearchResults,200)"><div id="search-results" style="display:none;position:absolute;top:100%;left:0;width:280px;max-height:320px;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-top:4px;z-index:30;box-shadow:0 8px 24px rgba(0,0,0,.4);"></div>`;
  zone.appendChild(bubble);

  const idleBubble=document.createElement('div');
  idleBubble.id='mole-idle-bubble';
  idleBubble.style.cssText='position:absolute;top:48px;left:40px;display:none;background:var(--surface);border:1px solid var(--border);border-radius:2px 8px 8px 8px;padding:.3rem .55rem;z-index:25;font-family:"DM Mono",monospace;font-size:.6rem;color:var(--text-dim);pointer-events:none;opacity:0;transition:opacity .3s;max-width:min(220px,calc(100vw - 16px));line-height:1.4;box-shadow:0 2px 8px rgba(0,0,0,.08);';
  zone.appendChild(idleBubble);

  drawMole();
  if(!prefersReducedMotion){
    moleAnimInterval=setInterval(updateMole,80);
    moleTipInterval=setInterval(showMoleIdleTip,20000);
    setTimeout(()=>showMoleIdleTip(),2000);
  } else {
    setTimeout(()=>showMoleIdleTip(),2000);
  }

  window.addEventListener('resize',()=>{
    const pc=document.getElementById('mole-particles');
    const z=document.getElementById('mole-zone');
    if(pc&&z)pc.width=z.offsetWidth;
    // Keep bubble inside the (possibly resized) zone — also catches iPhone rotate
    if(moleSearchOpen){
      const bubble=document.getElementById('mole-bubble');
      if(bubble)positionMoleBubble(bubble);
      // Re-run dropdown positioning if open
      const r=document.getElementById('search-results');
      if(r&&getComputedStyle(r).display!=='none')showSearchResults();
    }
  });

  (async()=>{
    try{const r=await _store.get('molebio-mole-hidden');if(r&&r.value==='true'){moleHidden=true;applyMoleVisibility();}}catch(e){}
  })();
}


// ============================================================
// BOOTSTRAP
// ============================================================
function init(){
  // Each subsystem is wrapped: if one throws (e.g. canvas issue on a restrictive
  // browser), we still want the rest of the page to render. The page MUST always
  // get to showHomePage() / selectTool() so users see something other than a header.
  try{buildSidebar();}catch(e){console.warn('buildSidebar failed:',e);}
  try{initMobileUI();}catch(e){console.warn('initMobileUI failed:',e);}
  try{initKeyboardShortcuts();}catch(e){console.warn('initKeyboardShortcuts failed:',e);}
  try{initMole();}catch(e){console.warn('initMole failed:',e);}
  // Determine starting view based on URL hash
  try{
    const hash=window.location.hash.replace('#','');
    if(hash&&TOOLS[hash]){
      selectTool(hash);
    } else {
      showHomePage();
    }
  }catch(e){
    console.error('Initial render failed:',e);
    // Fallback: write a minimal page directly to right-panel so user sees SOMETHING
    const rp=document.getElementById('right-panel');
    if(rp){
      rp.innerHTML='<div style="padding:2rem;text-align:center;font-family:sans-serif;"><h2>MoleBio Toolkit</h2><p>Unable to initialize the page in this browser. Try refreshing, or open in Safari/Chrome on a desktop or laptop.</p></div>';
    }
  }
  // Hashchange navigation
  window.addEventListener('hashchange',()=>{
    const h=window.location.hash.replace('#','');
    if(h&&TOOLS[h]){selectTool(h);}
    else if(!h){showHomePage();}
  });
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',init);
} else {
  init();
}

// Buffer pH
_w.setBufferSystem=setBufferSystem;_w.drawBuffer=drawBuffer;_w.drawBufferTitrationCurve=drawBufferTitrationCurve;
// Inline state vars referenced via property descriptors
[
  ['codonSeq',()=>codonSeq,v=>{codonSeq=v;}],
  ['codonPos',()=>codonPos,v=>{codonPos=v;}],
  ['dogmaSeq',()=>dogmaSeq,v=>{dogmaSeq=v;}],
  ['dogmaOrigSeq',()=>dogmaOrigSeq,v=>{dogmaOrigSeq=v;}],
  ['pipVol',()=>pipVol,v=>{pipVol=v;}],
  ['pipType',()=>pipType,v=>{pipType=v;}],
  ['moleSearchOpen',()=>moleSearchOpen,v=>{moleSearchOpen=v;}],
  ['serNTubes',()=>serNTubes,v=>{serNTubes=v;}],
  ['serC0',()=>serC0,v=>{serC0=v;}],
  ['serC0Unit',()=>serC0Unit,v=>{serC0Unit=v;}],
  ['serFactor',()=>serFactor,v=>{serFactor=v;}],
  ['serFactorMode',()=>serFactorMode,v=>{serFactorMode=v;}],
  ['serVfinal',()=>serVfinal,v=>{serVfinal=v;}],
  ['serDiluentVol',()=>serDiluentVol,v=>{serDiluentVol=v;}],
  ['serMode',()=>serMode,v=>{serMode=v;}],
  ['serPlateVol',()=>serPlateVol,v=>{serPlateVol=v;}],
  ['serDnaMass',()=>serDnaMass,v=>{serDnaMass=v;}],
  ['serCounts',()=>serCounts,v=>{serCounts=v;}],
  ['absMode',()=>absMode,v=>{absMode=v;}],
  ['absPath',()=>absPath,v=>{absPath=v;}],
  ['absA260',()=>absA260,v=>{absA260=v;}],
  ['absA280',()=>absA280,v=>{absA280=v;}],
  ['absA230',()=>absA230,v=>{absA230=v;}],
  ['absExtCoef',()=>absExtCoef,v=>{absExtCoef=v;}],
  ['pcrPolymerase',()=>pcrPolymerase,v=>{pcrPolymerase=v;}],
  ['pcrAmpliconBp',()=>pcrAmpliconBp,v=>{pcrAmpliconBp=v;}],
  ['pcrCycles',()=>pcrCycles,v=>{pcrCycles=v;}],
  ['pcrAnnealManual',()=>pcrAnnealManual,v=>{pcrAnnealManual=v;}],

  ['bufVolumeML',()=>bufVolumeML,v=>{bufVolumeML=v;}],
  ['bufStockM',()=>bufStockM,v=>{bufStockM=v;}],
  ['bufCustomPKa',()=>bufCustomPKa,v=>{bufCustomPKa=v;}],
].forEach(([name,getter,setter])=>{
  Object.defineProperty(_w,name,{get:getter,set:setter,configurable:true});
});

})(); // end IIFE
</script>
